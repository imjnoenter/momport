        <div id="sdTxEmpty" style="color:var(--muted);text-align:center;padding:20px;display:none">No transactions recorded</div>
      </div>
    </div>
  </div>`;
  overlay.classList.add('open');

  setTimeout(async () => {
    const positions = currentModel.positions;
    const catPos    = positions.filter(p => (p.category||'Other') === (pos.category||'Other'));
    const mkChart   = (id, items) => {
      const el = document.getElementById(id);
      if (!el || !items.length) return null;
      const total  = items.reduce((s,p) => s + (p.currentValue||0), 0);
      const bg     = items.map(p => p.symbol === sym ? colorFor(p.symbol) : colorFor(p.symbol) + '55');
      const border = items.map(p => p.symbol === sym ? '#fff' : 'transparent');
      const bw     = items.map(p => p.symbol === sym ? 2 : 0);
      return new Chart(el.getContext('2d'), {
        type: 'doughnut',
        data: { labels: items.map(p=>p.symbol), datasets: [{ data: items.map(p=>p.currentValue||0), backgroundColor: bg, borderColor: border, borderWidth: bw, hoverBorderWidth: 0 }] },
        options: { responsive:true, maintainAspectRatio:false, cutout:'65%', animation:false,
          plugins: { legend:{display:false}, tooltip:{ callbacks:{ label: c=>`  ${c.label}: ${total>0?(c.raw/total*100).toFixed(1):0}%` },
            backgroundColor:css('--tooltip-bg'), bodyColor:'#faf3e0', padding:8, cornerRadius:8 }}}
      });
    };
    const c1 = mkChart('sdChart1', positions);
    const c2 = mkChart('sdChart2', catPos.length ? catPos : positions);
    symbolDetailCharts = [c1, c2].filter(Boolean);

    // ── TradingView Lightweight Chart ────────────────────────────────────────
    const tvEl = document.getElementById('sdTvChart');
    if (tvEl && typeof LightweightCharts !== 'undefined') {
      // Fetch history if not cached yet
      let priceMap = historyCache?.prices?.[sym];
      if (!priceMap) {
        const fresh = await readHistory();
        if (fresh?.prices?.[sym]) { historyCache = fresh; priceMap = fresh.prices[sym]; }
      }
      // Fallback: fetch 2Y of daily closes from Yahoo Finance
      if (!priceMap) {
        const p2 = Math.floor(Date.now() / 1000);
        const p1 = p2 - 2 * 365 * 86400;
        priceMap = await fetchYahooPrices(sym, p1, p2);
      }

      const st = getComputedStyle(document.documentElement);
      const clrInk    = st.getPropertyValue('--ink').trim();
      const clrTrack  = st.getPropertyValue('--track').trim();
      const clrCard   = st.getPropertyValue('--card').trim();
      const clrMuted  = st.getPropertyValue('--ink-soft').trim();
      const clrGain   = st.getPropertyValue('--gain').trim();
      const symColor  = colorFor(sym);

      // Legend overlay (clear any leftover content from a previous open)
      tvEl.innerHTML = '';
      tvEl.style.position = 'relative';
      tvEl.style.touchAction = 'none';
      const legend = document.createElement('div');
      legend.style.cssText = 'position:absolute;top:8px;left:10px;z-index:10;pointer-events:none;line-height:1.4';
      legend.innerHTML = `<span style="font-size:13px;font-weight:700;color:${symColor}">${sym}</span>`;
      tvEl.appendChild(legend);

      const tvChart = LightweightCharts.createChart(tvEl, {
        width:  tvEl.clientWidth,
        height: 260,
        layout: { background: { color: 'transparent' }, textColor: clrMuted, fontSize: 11 },
        grid:   { vertLines: { color: clrTrack }, horzLines: { color: clrTrack } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        rightPriceScale: { borderColor: clrTrack },
        timeScale: { borderColor: clrTrack, timeVisible: false },
        handleScroll: true,
        handleScale: true,
      });

      const areaSeries = tvChart.addAreaSeries({
        lineColor:      symColor,
        topColor:       symColor + '55',
        bottomColor:    symColor + '00',
        lineWidth:      2,
        priceLineVisible: false,
        lastValueVisible: true,
      });

      let seriesData = [];
      if (priceMap && Object.keys(priceMap).length) {
        seriesData = Object.entries(priceMap)
          .map(([date, value]) => ({ time: date, value }))
          .sort((a, b) => a.time.localeCompare(b.time));
        const livePrice = findPos(sym)?.price;
        const todayStr  = new Date().toLocaleDateString('en-CA', {timeZone:'Asia/Bangkok'});
        if (livePrice && todayStr >= (seriesData[seriesData.length-1]?.time || '')) {
          seriesData = [...seriesData.filter(d => d.time !== todayStr), { time: todayStr, value: livePrice }];
        }
        areaSeries.setData(seriesData);
        tvChart.timeScale().fitContent();

        // Tranche & SL price lines
        const available = TRANCHE_COLORS.filter(c => c !== symColor);
        tranches.forEach((t, i) => {
          if (!t.price || t.price <= 0) return;
          areaSeries.createPriceLine({
            price: t.price,
            color: available[i % available.length],
            lineWidth: 1,
            lineStyle: LightweightCharts.LineStyle.Dashed,
            axisLabelVisible: true,
            title: `T${i + 1}`,
          });
        });
        if (sl) {
          areaSeries.createPriceLine({
            price: sl,
            color: '#bb4d3c',
            lineWidth: 1,
            lineStyle: LightweightCharts.LineStyle.Dashed,
            axisLabelVisible: true,
            title: 'SL',
          });
        }
        if (pos?.avgPrice > 0) {
          areaSeries.createPriceLine({
            price: pos.avgPrice,
            color: '#ffffff',
            lineWidth: 1,
            lineStyle: LightweightCharts.LineStyle.Dashed,
            axisLabelVisible: true,
            title: 'Avg',
          });
        }

        // Show last price in legend by default
        const lastPoint = seriesData[seriesData.length - 1];
        if (lastPoint) legend.innerHTML =
          `<span style="font-size:13px;font-weight:700;color:${symColor}">${sym}</span>` +
          `<span style="font-size:12px;font-weight:600;color:${clrInk};margin-left:8px">${fmtCurr(lastPoint.value)}</span>`;

        // Update legend on crosshair move
        tvChart.subscribeCrosshairMove(param => {
          if (!param.time || !param.seriesData?.size) {
            const last = seriesData[seriesData.length - 1];
            legend.innerHTML =
              `<span style="font-size:13px;font-weight:700;color:${symColor}">${sym}</span>` +
              `<span style="font-size:12px;font-weight:600;color:${clrInk};margin-left:8px">${fmtCurr(last?.value)}</span>`;
            return;
          }
          const d = param.seriesData.get(areaSeries);
          if (d) legend.innerHTML =
            `<span style="font-size:13px;font-weight:700;color:${symColor}">${sym}</span>` +
            `<span style="font-size:12px;font-weight:600;color:${clrInk};margin-left:8px">${fmtCurr(d.value)}</span>`;
        });
      } else {
        tvEl.insertAdjacentHTML('beforeend',
          `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted)">${t('no_price_data')}</div>`);
      }

      // Resize observer
      const ro = new ResizeObserver(() => tvChart.resize(tvEl.clientWidth, 260));
      ro.observe(tvEl);

      // Range switcher
      window._sdTvChart     = tvChart;
      window._sdTvSeries    = areaSeries;
      window._sdTvPriceMap  = priceMap || {};
      sdSetRange('1Y');

      symbolDetailCharts.push({ destroy: () => { try { ro.disconnect(); tvChart.remove(); } catch(_) {} } });
    }

    // Populate transactions table
    const txs  = txList.filter(t => t.ticker === sym).sort((a,b) => b.date.localeCompare(a.date));
    const body = document.getElementById('sdTxBody');
    const empty = document.getElementById('sdTxEmpty');
    if (body) {
      if (txs.length) {
        body.innerHTML = txs.map(t => `<tr style="border-bottom:1px solid var(--line-soft)">
          <td style="padding:5px 8px;color:var(--muted);font-size:11px">${fmtDate(t.date)}</td>
          <td style="padding:5px 8px"><span class="${t.type==='Sell'?'tx-badge-sell':'tx-badge-buy'}">${t.type}</span></td>
          <td style="padding:5px 8px;text-align:right">${t.shares}</td>
          <td style="padding:5px 8px;text-align:right">${fmtCurr(t.price)}</td>
          <td style="padding:5px 8px;text-align:right">${fmtCurr(t.tradeValue)}</td>
          <td style="padding:5px 8px;text-align:right;font-weight:600">${fmtCurr(t.total||t.tradeValue)}</td>
        </tr>`).join('');
      } else {
        body.innerHTML = '';
        if (empty) empty.style.display = 'block';
      }
    }
  }, 0);
};

window.sdSetRange = function(range) {
  const chart    = window._sdTvChart;
  const priceMap = window._sdTvPriceMap;
  if (!chart || !priceMap) return;

  // Highlight active button
  ['1M','3M','6M','YTD','1Y','ALL'].forEach(r => {
    const btn = document.getElementById('sdRange_' + r);
    if (!btn) return;
    const active = r === range;
    btn.style.background  = active ? 'var(--ink)' : 'transparent';
    btn.style.color       = active ? 'var(--card)' : 'var(--muted)';
    btn.style.borderColor = active ? 'var(--ink)'  : 'var(--line)';
  });

  if (range === 'ALL') { chart.timeScale().fitContent(); return; }

  const now   = new Date();
  let   from;
  if (range === 'YTD') {
    from = new Date(now.getFullYear(), 0, 1);
  } else {
    const months = { '1M': 1, '3M': 3, '6M': 6, '1Y': 12 };
    from = new Date(now);
    from.setMonth(from.getMonth() - months[range]);
  }
  const fromStr = from.toISOString().slice(0,10);
  const toStr   = now.toISOString().slice(0,10);

  const dates = Object.keys(priceMap).sort();
  const clipped = dates.filter(d => d >= fromStr && d <= toStr);
  if (clipped.length < 2) { chart.timeScale().fitContent(); return; }

  chart.timeScale().setVisibleRange({ from: clipped[0], to: clipped[clipped.length - 1] });
};

    else actionTvChart.timeScale().fitContent();

    const last = seriesData[seriesData.length - 1];
    const setLegend = val => {
      legend.innerHTML = `<span style="font-size:12px;font-weight:700;color:${symColor}">${sym}</span>`
        + `<span style="font-size:11px;font-weight:600;color:${clrInk};margin-left:8px">${fmtCurr(val)}</span>`;
    };
    if (last) setLegend(last.value);
    actionTvChart.subscribeCrosshairMove(param => {
      const d = param.seriesData?.get(actionTvSeries);
      setLegend(d ? d.value : last?.value);
    });
  } else {
    legend.innerHTML = `<span style="font-size:12px;font-weight:700;color:${symColor}">${sym}</span>`
      + `<span style="font-size:10px;color:var(--muted);margin-left:8px">${t('no_history_msg')}</span>`;
  }

  actionTvRo = new ResizeObserver(() => { if (actionTvChart) actionTvChart.resize(el.clientWidth, 220); });
  actionTvRo.observe(el);
  updateActionTvLines();
}

function updateActionTvLines() {
  if (!actionTvSeries) return;
  actionTvLines.forEach(l => { try { actionTvSeries.removePriceLine(l); } catch(_) {} });
  actionTvLines = [];
  const available = TRANCHE_COLORS.filter(c => c !== colorFor(planState.symbol));
  (planState.tranches || []).forEach((t, i) => {
    if (!t.price || t.price <= 0) return;
    actionTvLines.push(actionTvSeries.createPriceLine({
      price: t.price, color: available[i % available.length],
      lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: true, title: `T${i+1}`,
    }));
  });
  if (planState.sl) {
    actionTvLines.push(actionTvSeries.createPriceLine({
      price: planState.sl, color: '#bb4d3c',
      lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: true, title: 'SL',
    }));
  }
  const _avgPos = findPos(planState.symbol);
  if (_avgPos?.avgPrice > 0) {
    actionTvLines.push(actionTvSeries.createPriceLine({
      price: _avgPos.avgPrice, color: '#ffffff',
      lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: true, title: 'Avg',
    }));
  }
}

// previewValue: optional override for currentValue; overrideCat: optional category for chart 2
function renderActionCharts(sym, previewValue, overrideCat) {
  if (!currentModel) return;
  destroyActionCharts();
  const pos = findPos(sym);
  if (!pos) return;

  const isAllocMode = actionModalTab === 'allocation';
  const category    = overrideCat ?? pos.category ?? 'Other';
  const t2el = document.getElementById('actionChart2Title');
  if (t2el) t2el.textContent = category;

  if (isAllocMode) {
    // ── Allocation mode: use target % values ──────────────────────────────
    const investable = currentModel.investable;
    const editedTgt  = previewValue != null && investable > 0
      ? previewValue / investable * 100
      : (pos.target || 0) * 100;

    // Build items: each stock's target %, override edited symbol + its category
    // Include watchlist item if it's not already in positions
    const inPositions = currentModel.positions.some(p => p.symbol === sym);
    let allItems = currentModel.positions.map(p => ({
      symbol:   p.symbol,
      tgtPct:   p.symbol === sym ? editedTgt : (p.target || 0) * 100,
      category: p.symbol === sym ? category  : (p.category || 'Other'),
    }));
    if (!inPositions && editedTgt > 0) {
      allItems.push({ symbol: sym, tgtPct: editedTgt, category });
    }
    allItems = allItems.filter(p => p.tgtPct > 0);

    const totalPct  = allItems.reduce((s,p) => s + p.tgtPct, 0);
    const available = Math.max(0, 100 - totalPct);

    // Chart 1: all stocks by target + Available slice
    const c1items = [...allItems, ...(available > 0.01 ? [{symbol:'Available', tgtPct:available, category:''}] : [])];
    const c2items = allItems.filter(p => p.category === category);

    const editedPct1 = editedTgt.toFixed(1);
    const c2tot = c2items.reduce((s,p) => s+p.tgtPct, 0);
    const editedPct2 = c2tot > 0 ? (editedTgt/c2tot*100).toFixed(1) : editedTgt.toFixed(1);

    const lbl1 = document.getElementById('actionLbl1');
    const lbl2 = document.getElementById('actionLbl2');
    const avEl = document.getElementById('actionChart1Avail');
    if (lbl1) lbl1.textContent = `${sym}  ${editedPct1}%`;
    if (lbl2) lbl2.textContent = `${sym}  ${editedPct2}%`;
    if (avEl) {
      const color = available > 0.01 ? 'var(--gain)' : 'var(--loss)';
      avEl.innerHTML = `Available: <strong style="color:${color}">${available.toFixed(1)}%</strong>`;
    }

    const mkAllocChart = (id, items) => {
      const el = document.getElementById(id);
      if (!el) return null;
      const total  = items.reduce((s,p) => s+p.tgtPct, 0);
      const labels = items.map(p => p.symbol);
      const data   = items.map(p => p.tgtPct);
      const bg     = items.map(p => p.symbol==='Available' ? 'rgba(100,116,139,0.25)' : p.symbol===sym ? colorFor(p.symbol) : colorFor(p.symbol)+'55');
      const border = items.map(p => p.symbol===sym ? '#fff' : 'transparent');
      const bw     = items.map(p => p.symbol===sym ? 3 : 0);
      return new Chart(el.getContext('2d'), {
        type: 'doughnut',
        data: { labels, datasets: [{ data, backgroundColor: bg, borderColor: border, borderWidth: bw, hoverBorderWidth:0 }] },
        options: { responsive:true, maintainAspectRatio:false, cutout:'62%', animation:false,
          plugins: { legend:{display:false},
            tooltip: { callbacks:{ label: c => ` ${c.label}: ${c.raw.toFixed(1)}% of portfolio` },
              backgroundColor:'#0f172a', bodyColor:'#fff', padding:8, cornerRadius:8 }}}
      });
    };
    actionChart1 = mkAllocChart('actionChart1', c1items);
    actionChart2 = mkAllocChart('actionChart2', c2items.length ? c2items : c1items);
    return;
  }

  // ── Edit mode: use current value ─────────────────────────────────────────
  const usedValue = previewValue != null ? previewValue : (pos.currentValue ?? 0);
  const positions = currentModel.positions.map(p =>
    p.symbol === sym ? { ...p, currentValue: usedValue, category } : p
  );
  const catPos = positions.filter(p => (p.category||'Other') === category);
  const total1 = positions.reduce((s,p) => s + p.currentValue, 0);
  const total2 = catPos.reduce((s,p) => s + p.currentValue, 0);
  const lbl1 = document.getElementById('actionLbl1');
  const lbl2 = document.getElementById('actionLbl2');
  if (lbl1) lbl1.textContent = `${sym}  ${total1>0?(usedValue/total1*100).toFixed(1):0}%`;
  if (lbl2) lbl2.textContent = `${sym}  ${total2>0?(usedValue/total2*100).toFixed(1):0}%`;

  const mkChart = (id, items) => {
    const el = document.getElementById(id);
    if (!el) return null;
    const total  = items.reduce((s,p) => s + p.currentValue, 0);
    const labels = items.map(p => p.symbol);
    const data   = items.map(p => p.currentValue);
    const bg     = items.map(p => p.symbol===sym ? colorFor(p.symbol) : colorFor(p.symbol)+'55');
    const border = items.map(p => p.symbol===sym ? '#ffffff' : 'transparent');
    const bw     = items.map(p => p.symbol===sym ? 3 : 0);
    return new Chart(el.getContext('2d'), {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: bg, borderColor: border, borderWidth: bw, hoverBorderWidth:0 }] },
      options: { responsive:true, maintainAspectRatio:false, cutout:'62%', animation:false,
        plugins: { legend:{display:false},
          tooltip: { callbacks:{ label: c => ` ${c.label}: ${total>0?(c.raw/total*100).toFixed(1):0}%` },
            backgroundColor:'#0f172a', bodyColor:'#fff', padding:8, cornerRadius:8 }}}
    });
  };
  actionChart1 = mkChart('actionChart1', positions);
  actionChart2 = mkChart('actionChart2', catPos);
}

window.updateActionCategoryChange = function() {
  const sym = actionModalSym;
  const pos = findPos(sym);
  if (!pos) return;
  const newCat  = document.getElementById('editCategory')?.value || pos.category || 'Other';
  const tgt     = parseFloat(document.getElementById('editTargetPct')?.value);
  const planned = (!isNaN(tgt) && currentModel?.investable > 0)
    ? (tgt / 100) * currentModel.investable : (pos.currentValue ?? 0);
  renderActionCharts(sym, planned, newCat);
};

window.updateActionChartsPreview = function() {
  const sym = actionModalSym;
  const pos = findPos(sym);
  if (!pos || !actionChart1) return;

  if (actionModalTab === 'allocation') {
    // Allocation mode: full re-render (Available slice must update too)
    const tgt = parseFloat(document.getElementById('editTargetPct')?.value);
    const planned = (!isNaN(tgt) && currentModel?.investable > 0)
      ? (tgt / 100) * currentModel.investable : null;
    renderActionCharts(sym, planned);
    return;
  }

  // Edit mode: in-place patch (no Available slice to worry about)
  const qty = parseFloat(document.getElementById('editQty')?.value);
  const usedValue = !isNaN(qty) ? qty * (pos.price || 0) : (pos.currentValue ?? 0);
  [actionChart1, actionChart2].forEach(chart => {
    if (!chart) return;
    const idx = chart.data.labels.indexOf(sym);
    if (idx < 0) return;
    chart.data.datasets[0].data[idx] = usedValue;
    chart.update('none');
  });
  const allItems = currentModel.positions.map(p => p.symbol===sym ? {...p,currentValue:usedValue} : p);
  const catItems = allItems.filter(p => (p.category||'Other') === (pos.category||'Other'));
  const t1 = allItems.reduce((s,p) => s+p.currentValue, 0);
  const t2 = catItems.reduce((s,p) => s+p.currentValue, 0);
  const lbl1 = document.getElementById('actionLbl1');
  const lbl2 = document.getElementById('actionLbl2');
  if (lbl1) lbl1.textContent = `${sym}  ${t1>0?(usedValue/t1*100).toFixed(1):0}%`;
  if (lbl2) lbl2.textContent = `${sym}  ${t2>0?(usedValue/t2*100).toFixed(1):0}%`;
};

            ${pos.avgPrice > 0  ? `<span>Avg&nbsp;<strong style="color:var(--ink)">${fmtCurr(pos.avgPrice)}</strong></span>` : ''}

window.onPlanTargetChange = function(val) {
  const tgt = parseFloat(val);
  planState.pendingTarget = !isNaN(tgt) ? tgt / 100 : null;
  const sym = planState.symbol;
  const pos = findPos(sym);
  const dollarEl = document.getElementById('planTargetDollar');
  if (dollarEl) dollarEl.textContent = planState.pendingTarget && planState.model
    ? fmtCurr(getTargetDollar(pos, planState.model)) : '— set % to calculate';
  syncTrancheRow(0);
  renderPlanBar();
};

function saveTabDraft() {
  const tab = actionModalTab;
  if (tab === 'plan') {
    // Store directly into planState so re-render picks them up
    const sl = parseFloat(document.getElementById('planSL')?.value);
    planState.sl   = isNaN(sl) ? null : sl;
    planState.note = document.getElementById('planNote')?.value?.trim() || '';
  } else if (tab === 'transaction') {
    tabDraft.transaction = {
      date:   document.getElementById('txDate')?.value   || '',
      time:   document.getElementById('txTime')?.value   || '',
      shares: document.getElementById('txShares')?.value || '',
      price:  document.getElementById('txPrice')?.value  || '',
      noComm: document.getElementById('txNoCommission')?.checked || false,
    };
  } else if (tab === 'edit') {
    tabDraft.edit = {
      qty: document.getElementById('editQty')?.value     || '',
      avg: document.getElementById('editAvgCost')?.value || '',
    };
  } else if (tab === 'allocation') {
    const tgt = document.getElementById('editTargetPct')?.value || '';
    const cat = document.getElementById('editCategory')?.value  || '';
    tabDraft.allocation = { tgt, cat };
    // Mirror into planState so plan tab calculations use the new target
    const tgtNum = parseFloat(tgt);
    planState.pendingTarget   = !isNaN(tgtNum) ? tgtNum / 100 : null;
    planState.pendingCategory = cat || null;
  }
}

function restoreTabDraft() {
  const tab = actionModalTab;
  const d = tabDraft[tab];
  if (!d) return;
  const set = (id, val) => { if (val) { const el = document.getElementById(id); if (el) el.value = val; } };
  if (tab === 'transaction') {
    set('txDate',   d.date);
    set('txTime',   d.time);
    set('txShares', d.shares);
    set('txPrice',  d.price);
    const nc = document.getElementById('txNoCommission');
    if (nc) nc.checked = d.noComm;
    updateTxCalc();
  } else if (tab === 'edit') {
    set('editQty',     d.qty);
    set('editAvgCost', d.avg);
  } else if (tab === 'allocation') {
    set('editTargetPct', d.tgt);
    if (d.cat !== undefined) { const el = document.getElementById('editCategory'); if (el) el.value = d.cat; }
    updateActionChartsPreview();
  }
}

window.switchActionTab = function(tab) {
  saveTabDraft();
  destroyActionCharts();
  actionModalTab = tab;
  document.querySelectorAll('.action-tab-btn').forEach(b =>
    b.className = 'action-tab-btn' + (b.dataset.tab === tab ? ' active' : ''));
  renderActionTabContent();
  setTimeout(restoreTabDraft, 0);
};

// Plan save/clear from within action modal
const TRIM_COLORS = ['#6b8e5a','#c79038','#6b7eb8'];

function _trimCalcData() {
  const { symbol, trimTranches = [{},{},{}], model } = planState;
  const pos = model ? (model.positions.find(p=>p.symbol===symbol) || (model.sgovPos?.symbol===symbol?model.sgovPos:null) || model.watchlist.find(w=>w.symbol===symbol)) : null;
  const qty  = pos?.qty || 0, avg = pos?.avgPrice || 0, curPx = pos?.price || 0;
  const invest = model?.investable || 0;
  const target = (planState.pendingTarget ?? pos?.target) || 0;
  const targetDollar = target * invest;
  const curPctOfTarget = targetDollar > 0 ? qty * curPx / targetDollar * 100 : 0;
  let totalSharesSold = 0, totalNetPnL = 0, anyValid = false;
  const rows = trimTranches.map((t, i) => {
    const P = t.price || 0, afterPct = t.pct || 0;
    const qtyRemaining = Math.max(0, qty - totalSharesSold);
    const pctAtP = targetDollar > 0 && P > 0 ? qtyRemaining * P / targetDollar * 100 : curPctOfTarget;
    const sellPct = Math.max(0, pctAtP - afterPct);
    const shares = (P > 0 && afterPct > 0 && targetDollar > 0 && sellPct > 0) ? (sellPct / 100 * targetDollar) / P : 0;
    const tv = shares * P, fees = tv * 0.0015 * 1.07;
    const gross = shares > 0 && avg > 0 ? (P - avg) * shares : 0;
    const net = gross - fees;
    const hasData = P > 0 && afterPct > 0;
    if (hasData) { totalSharesSold += shares; totalNetPnL += net; anyValid = true; }
    return { net, hasData, pctAtP, afterPct, sellPct, shares };
  });
  const remQty = Math.max(0, qty - totalSharesSold);
  const remVal = remQty * curPx;
  const remPct = targetDollar > 0 ? remVal / targetDollar * 100 : 0;
  return { curPctOfTarget, rows, totalNetPnL, anyValid, remVal, remPct, scaleMax: Math.max(curPctOfTarget, remPct, 100), targetDollar, curPx, symbol };
}

// Called once when tab renders — builds input HTML
function renderTrimSection() {
  const { symbol, trimTranches = [{},{},{}], model } = planState;
  const pos = model ? (model.positions.find(p=>p.symbol===symbol) || (model.sgovPos?.symbol===symbol?model.sgovPos:null) || model.watchlist.find(w=>w.symbol===symbol)) : null;
  const curPx = pos?.price || 0;
  const { curPctOfTarget } = _trimCalcData();

  const rowsEl = document.getElementById('planTrimRows');
  if (rowsEl) rowsEl.innerHTML = trimTranches.map((t, i) => {
    const color = TRIM_COLORS[i];
    return `<div class="tranche-row" data-idx="${i}">
      <div class="tranche-label" style="color:${color}"><span class="tl-dot" style="background:${color}"></span>TP${i+1}</div>
      <div class="tranche-input-wrap has-prefix"><span class="ti-prefix">$</span>
        <input class="tranche-input" id="trimPrice_${i}" type="number" step="any" min="0"
          placeholder="${curPx ? (curPx*1.1).toFixed(2) : ''}"
          value="${t.price || ''}" oninput="onTrimPrice(${i},this.value)">
      </div>
      <div class="tranche-input-wrap has-suffix">
        <input class="tranche-input" id="trimPct_${i}" type="number" step="any" min="0"
          placeholder="remaining % (now: ${curPctOfTarget.toFixed(1)})"
          value="${t.pct || ''}" oninput="onTrimPct(${i},this.value)">
        <span class="ti-suffix">%</span>
      </div>
      <div class="tranche-input-wrap">
        <input class="tranche-input" id="trimQty_${i}" type="number" step="any" min="0"
          placeholder="shares" value="" oninput="onTrimQty(${i},this.value)">
      </div>
      <div id="trimPnl_${i}" style="display:flex;align-items:center;justify-content:center"><span style="color:var(--muted)">—</span></div>
    </div>`;

// Called on every input — updates P&L cells, bar, summary WITHOUT touching input elements
function updateTrimCalcs() {
  const d = _trimCalcData();
  const { curPctOfTarget, rows, totalNetPnL, anyValid, remVal, remPct, scaleMax, symbol } = d;

  rows.forEach((r, i) => {
    const el = document.getElementById(`trimPnl_${i}`);
    if (el) el.innerHTML = r.hasData
      ? `<div style="text-align:center">
           <span style="font-size:11px;font-weight:700;color:${r.net>=0?'var(--gain)':'var(--loss)'}">${r.net>=0?'+':''}${fmtCurr(r.net)}</span>
           <div style="font-size:9px;color:var(--muted)">${r.pctAtP.toFixed(1)}% → ${r.afterPct.toFixed(1)}%</div>
         </div>`
      : '<span style="color:var(--muted)">—</span>';
    const qEl = document.getElementById(`trimQty_${i}`);
    if (qEl && document.activeElement !== qEl) {
      qEl.value = r.hasData && r.shares > 0 ? +(r.shares).toFixed(4) : '';
    }
  });

  const fillW    = (remPct / scaleMax * 100).toFixed(1);
  const tickL    = (100 / scaleMax * 100).toFixed(1);
  const barColor = remPct > 100 ? 'var(--gain)' : 'var(--loss)';
  const barEl = document.getElementById('trimBar');
  if (barEl) barEl.innerHTML = `
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:3px">
      <span>Now: <strong>${curPctOfTarget.toFixed(1)}%</strong> of target</span>
      ${anyValid ? `<span>After trim: <strong style="color:${barColor}">${remPct.toFixed(1)}%</strong> of target</span>` : ''}
    </div>
    <div style="position:relative;height:6px;background:var(--line);border-radius:4px;overflow:visible">
      <div style="height:100%;width:${Math.min(curPctOfTarget/scaleMax*100,100).toFixed(1)}%;background:${colorFor(symbol)};opacity:.3;border-radius:4px"></div>
      <div style="position:absolute;left:0;top:0;height:100%;width:${fillW}%;background:${barColor};border-radius:4px;transition:width .15s"></div>
      <div style="position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink);opacity:.7;left:${tickL}%;border-radius:1px"></div>
    </div>`;

  const sumEl = document.getElementById('planTrimSummary');
  if (sumEl) sumEl.innerHTML = anyValid
    ? `Total P&L <strong style="color:${totalNetPnL>=0?'var(--gain)':'var(--loss)'}">${totalNetPnL>=0?'+':''}${fmtCurr(totalNetPnL)}</strong> · ${fmtCurr(remVal)} remaining`
    : `<span style="color:var(--muted)">Now: <strong>${curPctOfTarget.toFixed(1)}%</strong> of target · enter exit price and remaining % after TP</span>`;
}

window.onTrimPrice = function(idx, val) {
  if (!planState.trimTranches) planState.trimTranches = [{},{},{}];
  planState.trimTranches[idx].price = parseFloat(val) || null;
  updateTrimCalcs();
};
window.onTrimPct = function(idx, val) {
  if (!planState.trimTranches) planState.trimTranches = [{},{},{}];
  planState.trimTranches[idx].pct = parseFloat(val) || 0;
  updateTrimCalcs();
};

window.onTrimQty = function(idx, val) {
  const sharesInput = parseFloat(val); if (isNaN(sharesInput) || sharesInput <= 0) return;
  if (!planState.trimTranches) planState.trimTranches = [{},{},{}];
  const { symbol, trimTranches, model } = planState;
  const pos = model ? (model.positions.find(p=>p.symbol===symbol) || (model.sgovPos?.symbol===symbol?model.sgovPos:null) || model.watchlist.find(w=>w.symbol===symbol)) : null;
  if (!pos) return;
  const qty = pos.qty || 0;
  const invest = model?.investable || 0;
  const target = (planState.pendingTarget ?? pos?.target) || 0;
  const targetDollar = target * invest;
  const P = trimTranches[idx]?.price || 0;
  if (P <= 0 || targetDollar <= 0) return;
  // Compute shares already sold before this tranche
  let totalSharesSoldBefore = 0;
  for (let i = 0; i < idx; i++) {
    const t = trimTranches[i];
    const tP = t.price || 0, afterP = t.pct || 0;
    if (!tP || !afterP) continue;
    const qtyRem = Math.max(0, qty - totalSharesSoldBefore);
    const pctAtTp = qtyRem * tP / targetDollar * 100;
    const sellP = Math.max(0, pctAtTp - afterP);
    totalSharesSoldBefore += (sellP / 100 * targetDollar) / tP;
  }
  const qtyRemaining = Math.max(0, qty - totalSharesSoldBefore);
  const pctAtP = qtyRemaining * P / targetDollar * 100;
  const afterPct = Math.max(0, pctAtP - (sharesInput * P / targetDollar * 100));
  planState.trimTranches[idx].pct = afterPct;
  const pctEl = document.getElementById(`trimPct_${idx}`);
  if (pctEl && document.activeElement !== pctEl) pctEl.value = afterPct.toFixed(1);
  updateTrimCalcs();
};

window.savePlanInAction = function() {
  const { symbol, tranches } = planState;
  if (!symbol) return;
  // SL is kept live in planState.sl via oninput — read directly
  // Note has no oninput so read from DOM, then sync
  planState.note = document.getElementById('planNote')?.value?.trim() || '';
  const sl   = planState.sl;
  const note = planState.note;
  // Read target from plan tab input if present
  const tgtEl = document.getElementById('planTargetPct');
  if (tgtEl) {
    const tgt = parseFloat(tgtEl.value);
    if (!isNaN(tgt)) planState.pendingTarget = tgt / 100;
  }
  const tp = planState.trimTranches || [{},{},{}];
  planCache[symbol] = { tranches, sl, note, trimTranches: tp };
  savePlanToSheet(symbol, tranches, sl, note, tp);
  // Also save pending allocation/category if changed
  const params = new URLSearchParams({ action: 'updateSymbol', symbol });
  let hasAlloc = false;
  if (planState.pendingTarget !== null)   { params.set('target',   planState.pendingTarget.toFixed(6)); hasAlloc = true; }
  if (planState.pendingCategory !== null) { params.set('category', planState.pendingCategory);          hasAlloc = true; }
  if (hasAlloc) recordFetch(params);
  document.getElementById('actionModal')?.classList.remove('open');
  if (currentModel) { renderTable(currentModel); renderPlansPanel(); }
};
window.clearPlanInAction = function() {
  const { symbol } = planState;
  if (!symbol) return;
  planState.note = document.getElementById('planNote')?.value?.trim() || '';
  const sl   = planState.sl;
  const note = planState.note;
  if (!sl && !note) {
    clearPlanFromSheet(symbol);
    delete planCache[symbol];
  } else {
    planCache[symbol] = { tranches: [], sl, note };
    savePlanToSheet(symbol, [], sl, note);
  }
  planState.tranches = [{cumPct:0}];
  renderActionTabContent();
  renderPlansPanel();
};

// ── Plan modal ────────────────────────────────────────────────────────────────
const TRANCHE_COLORS = ['#6b7eb8','#8a5a7e','#b56a8a','#c79038','#6b8e5a','#7aa3b8','#9a7aa3','#9ca85a'];
let planState = { symbol: null, name: '', tranches: [], model: null, sl: null, note: '', pendingTarget: null, pendingCategory: null };
let planCache = {}; // { sym: { tranches, sl, note } } — loaded from sheet at startup

function planKey(sym) { return `plan_${sym}`; }
function hasSavedPlan(sym) {
  const d = planCache[sym];
  if (!d) return false;
  const hasEntries = d.tranches?.some(tr => (tr.price != null && tr.price !== '') || (tr.cumPct ?? 0) > 0);
  const hasTp = d.trimTranches?.some(t => t.price > 0);
  return !!(hasEntries || hasTp || d.sl || d.note);
}

// ── Plan sheet helpers ────────────────────────────────────────────────────────
function parsePlanTable(table) {
  if (!table?.rows?.length) return {};
  const result = {};
  for (const row of table.rows) {
    const c = row.c || [];
    const sym = c[0]?.v || null;
    if (!sym || sym === 'Symbol') continue; // skip header row
    const tranches = [];
    for (let i = 3; i <= 15; i++) {
      const val = c[i]?.v;
      if (val == null || val === '') break;
      const parts = String(val).split(':');
      tranches.push({ price: parts[0] ? parseFloat(parts[0]) : null, cumPct: parseFloat(parts[parts.length-1]) || 0 });
    }
    const trimTranches = [16, 17, 18].map(col => {
      const cell = c[col];
      if (!cell || (cell.v == null && !cell.f)) return {};
      // Sheets auto-converts "70:50" → duration numeric. Use formatted string (f) to recover.
      const raw = (typeof cell.v === 'number') ? (cell.f || '') : String(cell.v || '');
      if (!raw) return {};
      const parts = raw.split(/[:/]/);  // handle "70:50:00" (old) or "70/50" (new)
      const price = parseFloat(parts[0]), pct = parseFloat(parts[1]);
      return { price: isNaN(price) ? null : price, pct: isNaN(pct) ? 0 : pct };
    });
    result[sym] = { tranches, sl: c[1]?.v || null, note: c[2]?.v || '', trimTranches };
  }
  return result;
}

async function loadAllPlansFromSheet() {
  try {
    const res  = await fetch(PLAN_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(text.indexOf('(') + 1, text.lastIndexOf(')')));
    planCache = parsePlanTable(json.table);
  } catch(e) { console.error('loadAllPlansFromSheet:', e); }
}

async function savePlanToSheet(sym, tranches, sl, note, trimTranches = []) {
  const realTranches = tranches.filter(t => (t.price != null && t.price !== '') || (t.cumPct ?? 0) > 0);
  const realTrims    = trimTranches.filter(t => t.price > 0 || t.pct > 0);
  if (!realTranches.length && !sl && !note && !realTrims.length) {
    return clearPlanFromSheet(sym);
  }
  const pos     = currentModel?.positions.find(p => p.symbol === sym);
  const td      = getTargetDollar(pos, currentModel);
  const currPct = getCurrentPct(pos, currentModel);
  const trancheStr = realTranches.map((t, i) => {
    const dollar = getTrancheDollar(i, realTranches, currPct, td);
    return `${t.price??''}:${dollar.toFixed(2)}:${t.cumPct??0}`;
  }).join(',');
  // Pad trimTranches to 3 slots
  const tp3 = [{},{},{}].map((_, i) => trimTranches[i] || {});
  const params = new URLSearchParams({
    action: 'savePlan', symbol: sym, tranches: trancheStr, sl: sl ?? '', note: note ?? '',
    tp1: tp3[0].price ? `${tp3[0].price}/${tp3[0].pct||0}` : '',
    tp2: tp3[1].price ? `${tp3[1].price}/${tp3[1].pct||0}` : '',
    tp3: tp3[2].price ? `${tp3[2].price}/${tp3[2].pct||0}` : '',
  });
  await recordFetch(params, true);
}

async function clearPlanFromSheet(sym) {
  const params = new URLSearchParams({ action: 'clearPlan', symbol: sym });
  await recordFetch(params, true);
}
function getTargetDollar(pos, model) {
  const pending = (planState.symbol === pos?.symbol && planState.pendingTarget != null)
    ? planState.pendingTarget : null;
  return (pending ?? pos?.target ?? 0) * (model?.investable ?? 0);
}
function getCurrentPct(pos, model) { const td = getTargetDollar(pos, model); return td > 0 ? (pos.currentValue ?? 0) / td * 100 : 0; }
function getPrevEndPct(idx, tranches, currPct) { return idx === 0 ? currPct : Math.max(currPct, tranches[idx-1]?.cumPct ?? currPct); }
function getTrancheDollar(idx, tranches, currPct, td) { const prev = getPrevEndPct(idx, tranches, currPct); return Math.max(0, ((tranches[idx]?.cumPct ?? 0) - prev) / 100 * td); }
function trancheColor(i) {
  const stockColor = planState.symbol ? colorFor(planState.symbol) : null;
  const available  = stockColor ? TRANCHE_COLORS.filter(c => c !== stockColor) : TRANCHE_COLORS;
  return available[i % available.length];
}

function calcNewAvg(pos, tranches, upToIdx) {
  const { model } = planState;
  const td = getTargetDollar(pos, model);
  const currPct = getCurrentPct(pos, model);
  let cumCost = pos.costBasis ?? 0, cumShares = pos.qty ?? 0;
  for (let i = 0; i <= upToIdx; i++) {
    const t = tranches[i];
    const dollar = getTrancheDollar(i, tranches, currPct, td);
    if (dollar <= 0) continue;
    if (!t.price || t.price <= 0) return null;
    cumCost  += dollar;
    cumShares += dollar / t.price;
  }
  return cumShares > 0 ? cumCost / cumShares : null;
}

function updateNewAvgs() {
  const { symbol, tranches, model } = planState;
  if (!symbol || !model) return;
  const pos = model.positions.find(p => p.symbol === symbol)
           || (model.sgovPos?.symbol === symbol ? model.sgovPos : null)
           || model.watchlist.find(w => w.symbol === symbol);
  if (!pos) return;
  tranches.forEach((_, i) => {
    const el = document.getElementById(`tranche-avg-${i}`);
    if (!el) return;
    const avg = calcNewAvg(pos, tranches, i);
    let label;
    if (avg != null) {
      const baseAvg = pos.avgPrice ?? 0;
      const diff$ = avg - baseAvg;
      const diffPct = baseAvg > 0 ? diff$ / baseAvg * 100 : 0;
      const up = diff$ >= 0;
      const col = `var(${up ? '--loss' : '--gain'})`;
      const sign = up ? '+' : '';
      label = `New avg: <strong>${fmtCurr(avg)}</strong>`
        + (baseAvg > 0 ? ` <span style="color:${col}">(${sign}${fmtCurr(diff$)} / ${sign}${diffPct.toFixed(2)}%)</span>` : '');
    } else {
      label = `New avg: <span style="color:var(--muted)">— (enter Entry Price)</span>`;
    }
    el.innerHTML = `T${i+1}: ${label}`;
  });
}

window.openPlan = async function(sym) {

           || (currentModel.sgovPos?.symbol === sym ? currentModel.sgovPos : null);

    await loadAllPlansFromSheet();

};

function renderPlanBar() {
  const { symbol, tranches, model } = planState;
  if (!symbol || !model) return;
  const pos = model.positions.find(p => p.symbol === symbol)
           || (model.sgovPos?.symbol === symbol ? model.sgovPos : null)
           || model.watchlist.find(w => w.symbol === symbol);
  if (!pos) return;
  const td = getTargetDollar(pos, model);
  const currPct = getCurrentPct(pos, model);
  const color = colorFor(symbol);

  const segs = [{ from: 0, to: currPct, color }];
  let prevEnd = currPct;
  tranches.forEach((t, i) => {
    const cum = Math.max(prevEnd, t.cumPct ?? prevEnd);
    if (cum > prevEnd) segs.push({ from: prevEnd, to: cum, color: trancheColor(i) });
    prevEnd = cum;
  });

  const lastEnd = segs[segs.length-1]?.to ?? 100;
  const scaleMax = lastEnd > 100 ? lastEnd * 1.1 : 100;

  const track = document.getElementById('planBarTrack');
  if (!track) return;
  track.innerHTML = segs.map(s => {
    const l = (s.from / scaleMax * 100).toFixed(2);
    const w = ((s.to - s.from) / scaleMax * 100).toFixed(2);
    return `<div class="plan-bar-seg" style="left:${l}%;width:${w}%;background:${s.color}"></div>`;
  }).join('') + `<div class="plan-bar-tick" style="left:${(100/scaleMax*100).toFixed(2)}%" title="Target: ${fmtCurr(td)}"></div>`;

  const labels = [{ color, text: `Current: ${currPct.toFixed(1)}%` }];
  let cumLbl = currPct;
  tranches.forEach((t, i) => {
    const end = Math.max(cumLbl, t.cumPct ?? cumLbl);
    labels.push({ color: trancheColor(i), text: `After T${i+1}: ${end.toFixed(1)}%` });
    cumLbl = end;
  });
  labels.push({ color: 'var(--muted)', text: `Target: ${fmtCurr(td)}` });
  document.getElementById('planBarLabels').innerHTML = labels.map(l =>
    `<span class="pbl-item"><span class="pbl-dot" style="background:${l.color}"></span>${l.text}</span>`
  ).join('');
  updateNewAvgs();
}

window.onTranchePrice = function(idx, val) {
  const num = parseFloat(val);
  planState.tranches[idx].price = isNaN(num) ? null : num;
  updateNewAvgs();
  updateActionTvLines();
  // Update qty display for this row based on current dollar amount
  const qIn = document.getElementById(`trancheQty_${idx}`);
  if (qIn && document.activeElement !== qIn) {
    const { symbol, tranches, model } = planState;
    const pos = model.positions.find(p => p.symbol === symbol)
             || (model.sgovPos?.symbol === symbol ? model.sgovPos : null)
             || model.watchlist.find(w => w.symbol === symbol);
    if (pos) {
      const td = getTargetDollar(pos, model);
      const currPct = getCurrentPct(pos, model);
      const dollar = getTrancheDollar(idx, tranches, currPct, td);
      qIn.value = (!isNaN(num) && num > 0 && dollar > 0) ? +(dollar / num).toFixed(4) : '';
    }
  }
};

window.onTranchePct = function(idx, val) {
  const num = parseFloat(val); if (isNaN(num)) return;
  planState.tranches[idx].cumPct = num;
  syncTrancheRow(idx);
  renderPlanBar();
};

window.onTrancheDollar = function(idx, val) {
  const dollar = parseFloat(val); if (isNaN(dollar)) return;
  const { symbol, tranches, model } = planState;
  const pos = model.positions.find(p => p.symbol === symbol)
           || (model.sgovPos?.symbol === symbol ? model.sgovPos : null)
           || model.watchlist.find(w => w.symbol === symbol);
  if (!pos) return;
  const td = getTargetDollar(pos, model);
  const currPct = getCurrentPct(pos, model);
  const prev = getPrevEndPct(idx, tranches, currPct);
  planState.tranches[idx].cumPct = td > 0 ? prev + (dollar / td * 100) : prev;
  syncTrancheRow(idx);
  renderPlanBar();
};

window.onTrancheQty = function(idx, val) {
  const qty = parseFloat(val); if (isNaN(qty) || qty <= 0) return;
  const { symbol, tranches, model } = planState;
  const pos = model.positions.find(p => p.symbol === symbol)
           || (model.sgovPos?.symbol === symbol ? model.sgovPos : null)
           || model.watchlist.find(w => w.symbol === symbol);
  if (!pos) return;
  const price = tranches[idx]?.price || 0;
  if (price <= 0) return;
  const dollar = qty * price;
  const td = getTargetDollar(pos, model);
  const currPct = getCurrentPct(pos, model);
  const prev = getPrevEndPct(idx, tranches, currPct);
  planState.tranches[idx].cumPct = td > 0 ? prev + (dollar / td * 100) : prev;
  syncTrancheRow(idx);
  renderPlanBar();
  updateNewAvgs();
};

function syncTrancheRow(idx) {
  const { symbol, tranches, model } = planState;
  const pos = model.positions.find(p => p.symbol === symbol)
           || (model.sgovPos?.symbol === symbol ? model.sgovPos : null)
           || model.watchlist.find(w => w.symbol === symbol);
  if (!pos) return;
  const td = getTargetDollar(pos, model);
  const currPct = getCurrentPct(pos, model);
  const active = document.activeElement;
  for (let j = idx; j < tranches.length; j++) {
    const row = document.querySelector(`.tranche-row[data-idx="${j}"]`); if (!row) continue;
    const dIn = row.querySelector('[data-role="dollar"]');
    const pIn = row.querySelector('[data-role="pct"]');
    const qIn = document.getElementById(`trancheQty_${j}`);
    const t = tranches[j];
    const prev = getPrevEndPct(j, tranches, currPct);
    const dollar = Math.max(0, ((t.cumPct ?? 0) - prev) / 100 * td);
    const warn = (t.cumPct ?? 0) <= prev;
    if (active !== dIn) dIn.value = dollar > 0 ? dollar.toFixed(2) : '0';
    if (active !== pIn) pIn.value = (t.cumPct ?? 0).toFixed(1);
    if (qIn && active !== qIn) {
      const price = t.price || 0;
      qIn.value = (price > 0 && dollar > 0) ? +(dollar / price).toFixed(4) : '';
    }
    dIn.classList.toggle('warn', warn); pIn.classList.toggle('warn', warn);
  }
}

window.addTranche = function() {

  planState.tranches.push({ cumPct: 0 });

window.removeTranche = function(idx) {

window.savePlan = function() {
  const { symbol, tranches } = planState;
  if (!symbol) return;
  const sl   = parseFloat(document.getElementById('planSL')?.value)   || null;
  const note = document.getElementById('planNote')?.value?.trim()     || '';

  savePlanToSheet(symbol, tranches, sl, note);
  closePlan();
  if (currentModel) { renderTable(currentModel); renderPlansPanel(); }

window.clearPlan = function() {
  const { symbol } = planState;
  if (!symbol) return;
  const sl   = parseFloat(document.getElementById('planSL')?.value)   || null;
  const note = document.getElementById('planNote')?.value?.trim()     || '';
  if (!sl && !note) {
    clearPlanFromSheet(symbol);
    delete planCache[symbol];
  } else {
    // Keep SL/Note but clear tranches
    planCache[symbol] = { tranches: [], sl, note };
    savePlanToSheet(symbol, [], sl, note);
  }
  planState.tranches = [{ cumPct: 0 }];
  renderPlanModal();
  renderPlansPanel();
  if (currentModel) renderTable(currentModel);
};

// ── Utilities ─────────────────────────────────────────────────────────────────
// Yahoo Finance uses BRK-B style, portfolio sheet uses BRK.B
const yahooTicker = s => s.replace(/\./g, '-');
// Display dates as DD-MM-YYYY
const fmtDate = d => d ? d.split('-').reverse().join('-') : '—';
const fmt    = n => n == null ? '—' : n.toLocaleString('en-US',{style:'currency',currency:'USD',maximumFractionDigits:2});
const fmtPct = (n, plus=true) => n == null ? '—' : (plus && n >= 0 ? '+' : '') + n.toFixed(2) + '%';
const css    = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();

function fmtCurr(n) {
  if (n == null) return '—';
  if (currency === 'THB') return '฿' + Math.round(n * fxRate).toLocaleString('en-US');
  return n.toLocaleString('en-US', {style:'currency', currency:'USD', maximumFractionDigits:2});
}

async function fetchFxRate() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    const d = await r.json();
    return d.rates?.THB ?? 33;
  } catch { return 33; }
}

function colorFor(key) {
  if (key === 'SGOV' || key === 'Cash') return '#8a7458';
  let h = 0;
  for (const ch of (key||'?')) h = (h * 31 + ch.charCodeAt(0)) & 0x7fffffff;
  return PALETTE[h % PALETTE.length];
}

// ── Data fetching ─────────────────────────────────────────────────────────────
async function fetchSheet() {
  const res  = await fetch(SHEET_URL);
  const text = await res.text();
  const json = JSON.parse(text.substring(text.indexOf('(') + 1, text.lastIndexOf(')')));
  return json.table;
}

function parseRows(table) {
  const idx = {};
  table.cols.forEach((c, i) => {
    if (c.label) {
      idx[c.label.trim()]                  = i; // exact (trimmed)
      idx[c.label.trim().toLowerCase()]    = i; // lowercase fallback
    }
  });
  const cell = (row, label) => {
    const i = idx[label] ?? idx[label.trim()] ?? idx[label.toLowerCase()];
    if (i == null) return null;
    const c = row.c[i];
    return c == null ? null : c.v;
  };
  return table.rows.map(r => ({
    symbol:   cell(r, "Symbol"),
    name:     cell(r, "Name"),
    sector:   cell(r, "Sector"),
    category: cell(r, "Category"),
    qty:      cell(r, "Qty"),
    avgPrice: cell(r, "Avg price"),
    target:   cell(r, "Target Allocation"),
    price:    cell(r, "Current price"),
    cash:     cell(r, "Cash"),
    cashRes:  cell(r, "Cash Reserves"),
    fcd:      cell(r, "FCD"),
    usd:      cell(r, "USD"),
  })).filter(r => r.symbol);
}

function buildModel(rows) {
  const rawCash    = rows[0]?.cash   ?? 0;
  const cashResPct = rows[0]?.cashRes ?? 0;
  const rawFcd     = rows[0]?.fcd    ?? 0;
  const rawUsd     = rows[0]?.usd    ?? 0;
  const positions = [], watchlist = [];
  let sgovValue = 0, sgovCostBasis = 0, sgovRaw = null;

  for (const r of rows) {
    if (r.symbol === 'SGOV') {
      if (r.qty && r.price)    sgovValue     = r.qty * r.price;
      if (r.qty && r.avgPrice) sgovCostBasis = r.qty * r.avgPrice;
      sgovRaw = r;
      continue;
    }
    const held = r.qty != null && r.qty > 0 && r.avgPrice != null && r.avgPrice > 0 && r.price != null;
    if (!held) { if (r.price != null || (!(r.qty > 0) && !(r.avgPrice > 0))) watchlist.push(r); continue; }
    const currentValue = r.qty * r.price;
    const costBasis    = r.qty * r.avgPrice;
    const pnl          = currentValue - costBasis;
    const pnlPct       = costBasis ? pnl / costBasis * 100 : 0;
    positions.push({ ...r, currentValue, costBasis, pnl, pnlPct });
  }

  const totalCash     = rawCash + sgovValue;
  const totalCurrent  = positions.reduce((s, p) => s + p.currentValue, 0) + totalCash;
  const totalInvested = positions.reduce((s, p) => s + p.costBasis,    0) + rawCash + sgovCostBasis;
  const investable    = totalCurrent * (1 - cashResPct);
  const stockTotal = positions.reduce((s,p) => s + p.currentValue, 0);
  positions.forEach(p => {
    p.weightPct      = investable  > 0 ? p.currentValue / totalCurrent * 100 : 0;
    p.stockWeightPct = stockTotal  > 0 ? p.currentValue / stockTotal   * 100 : 0;
  });
  positions.sort((a, b) => b.currentValue - a.currentValue);
  positions.forEach((p, i) => p.rowNum = i + 1);

  // SGOV row for table display (weight vs total, no target)
  const sgovPos = sgovRaw ? {
    ...sgovRaw,
    currentValue: sgovValue,
    costBasis: sgovCostBasis,
    pnl: sgovValue - sgovCostBasis,
    pnlPct: sgovCostBasis ? (sgovValue - sgovCostBasis) / sgovCostBasis * 100 : 0,
    weightPct: totalCurrent > 0 ? sgovValue / totalCurrent * 100 : 0,
  } : null;

  return {
    positions, watchlist, sgovPos, rawCash, rawFcd, rawUsd, sgovValue, cashResPct,
    totalCash, totalCurrent, investable, totalInvested,
    totalPnl:    totalCurrent - totalInvested,
    totalPnlPct: totalInvested ? (totalCurrent - totalInvested) / totalInvested * 100 : 0,
  };
}

// ── Stat helpers ──────────────────────────────────────────────────────────────
function sharesHeldAt(txs, ticker, dateStr) {
  let held = 0;
  for (const t of txs) {
    if (t.ticker !== ticker || t.dateStr > dateStr) continue;
    if ((t.type||'').toLowerCase() === 'buy')  held += Number(t.shares) || 0;
    if ((t.type||'').toLowerCase() === 'sell') held -= Number(t.shares) || 0;
  }
  return Math.max(0, held);
}

// Per-ticker withholding tax — Danish ADRs = 27%, default = 15%
const WITHHOLDING_TAX = { NVO: 0.27, NOVO: 0.27 };
const withholdingRate = ticker => WITHHOLDING_TAX[ticker] ?? 0.15;

function computeDividends(txs) {
  if (!txs?.length) return { gross: 0, net: 0, byTicker: {} };
  const divData = historyCache?.dividends || {};
  let gross = 0, net = 0;
  const byTicker = {};
  for (const [ticker, events] of Object.entries(divData)) {
    for (const [dateStr, amount] of Object.entries(events)) {
      const held = sharesHeldAt(txs, ticker, dateStr);
      if (held <= 0) continue;
      const total = held * amount;
      const totalNet = total * (1 - withholdingRate(ticker));
      gross += total;
      net   += totalNet;
      byTicker[ticker] = (byTicker[ticker] || 0) + totalNet;
    }
  }
  return { gross, net, byTicker };
}

function computeIRR(txs, totalCurrent, totalInvested) {
  if (!txs?.length || !totalInvested || totalInvested <= 0) return null;
  const firstBuy = [...txs].sort((a,b) => a.dateStr.localeCompare(b.dateStr)).find(t => t.type === 'Buy');
  if (!firstBuy) return null;
  const years = (Date.now() - new Date(firstBuy.dateStr).getTime()) / (365.25 * 24 * 3600 * 1000);
  if (years <= 0) return null;
  const r = totalCurrent / totalInvested - 1;
  if (1 + r <= 0) return null;
  return (Math.pow(1 + r, 1 / years) - 1) * 100;
}

function computeRealizedPnlTotal(txs) {
  return computePnLTimeline(txs).reduce((s, t) => s + t.pnl, 0);
}

  set('sc-irr', `<div class="sc-label">${t('irr')}</div>
    <div class="sc-value ${cl(irr)}">${irr == null ? '—' : p(irr)}</div>
    <div class="sc-sub mut">${t('since_first_buy')}</div>
    <div class="sc-detail">${irr == null ? t('loading_msg') : t('cagr_approx')}</div>`);

  const cashPct = model.totalCurrent > 0 ? model.totalCash / model.totalCurrent * 100 : 0;
  set('sc-cash', `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div class="sc-label" style="margin-bottom:0">${t('cash')}</div>
      <button class="cash-edit-btn" onclick="openEditCash()" title="Edit cash balances"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4z"/></svg>${t('edit')}</button>
    </div>
    <div class="sc-value">${fmtCurr(model.totalCash)}</div>

    <div class="sc-detail">${fmtCurr(model.rawCash)} + ${fmtCurr(model.sgovValue||0)} SGOV</div>`);

  set('sc-unreal', `<div class="sc-label">${t('unrealized')}</div>

// ── Render: gauge ─────────────────────────────────────────────────────────────
let _gaugeAnimRaf = null;
function renderGauge(model) {
  const wrap = document.querySelector('.gauge-wrap');
  if (wrap && wrap.clientWidth === 0) {
    requestAnimationFrame(() => renderGauge(model));
    return;
  }
  const invested = model.totalCurrent - model.totalCash;
  const pct = model.totalCurrent > 0 ? invested / model.totalCurrent * 100 : 0;
  const pctEl = document.getElementById('gauge-pct');
  if (pctEl) pctEl.textContent = pct.toFixed(1) + '%';

  // Update stat strip under the gauge
  const statsEl = document.getElementById('allocStats');
  if (statsEl) {
    statsEl.innerHTML = `
      <div class="alloc-stat">
        <span class="alloc-stat-dot" style="background:var(--terracotta)"></span>
        <div>
          <div class="alloc-stat-label">Invested</div>
          <div class="alloc-stat-value">${fmtCurr(invested)}</div>
        </div>
      </div>
      <div class="alloc-stat">
        <span class="alloc-stat-dot" style="background:var(--muted-2)"></span>
        <div>
          <div class="alloc-stat-label">Cash</div>
          <div class="alloc-stat-value">${fmtCurr(model.totalCash)}</div>
        </div>
      </div>`;
  }

  const oldCv = document.getElementById('gaugeChart');
  if (!oldCv) return;
  cancelAnimationFrame(_gaugeAnimRaf);
  try { Chart.getChart(oldCv)?.destroy(); } catch(_) {}
  const cv = document.createElement('canvas');
  cv.id = 'gaugeChart';
  oldCv.parentNode.replaceChild(cv, oldCv);

  // ── roundRect polyfill ──────────────────────────────────────────
  function rrect(ctx2, x, y, w, h, rad) {
    const r = Math.min(rad, w / 2, h / 2);
    ctx2.beginPath();
    ctx2.moveTo(x + r, y);
    ctx2.arcTo(x + w, y,     x + w, y + h, r);
    ctx2.arcTo(x + w, y + h, x,     y + h, r);
    ctx2.arcTo(x,     y + h, x,     y,     r);
    ctx2.arcTo(x,     y,     x + w, y,     r);
    ctx2.closePath();
  }

  const RESERVE = 0.15;           // 15 % cash reserve threshold
  const target  = Math.max(0, Math.min(100, pct)) / 100;
  const startTs = performance.now();
  const dur     = 900;

  function draw(now) {
    const t      = Math.min(1, (now - startTs) / dur);
    const eased  = 1 - Math.pow(1 - t, 3);
    const cur    = target * eased;           // animated stock fraction 0-1
    const cashCur = (1 - cur) * 100;        // animated cash %

    const dpr = window.devicePixelRatio || 1;
    const W   = cv.clientWidth  || 300;
    const H   = cv.clientHeight || 130;
    cv.width  = W * dpr;
    cv.height = H * dpr;
    const ctx = cv.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);

    // ── Layout constants ─────────────────────────────────────────
    const padH  = 10;
    const barH  = 26;
    const barX  = padH;
    const barW  = W - padH * 2;
    const barR  = barH / 2;
    const gaugeStyle = window.donutTweaks?.gaugeLabels || 'stacked';
    const barY  = gaugeStyle === 'badge' ? 46 : gaugeStyle === 'inline' ? 42 : 56;

    const monoFont    = css('--font-mono')    || 'monospace';
    const displayFont = css('--font-display') || 'serif';

    // ── Bar track ────────────────────────────────────────────────
    ctx.save();
    rrect(ctx, barX, barY, barW, barH, barR);
    ctx.fillStyle = css('--track');
    ctx.fill();
    ctx.restore();

    // ── Stock fill (clipped to bar shape) ────────────────────────
    if (cur > 0.003) {
      ctx.save();
      rrect(ctx, barX, barY, barW, barH, barR);
      ctx.clip();
      const fillW = barW * cur;
      const grad  = ctx.createLinearGradient(barX, 0, barX + barW, 0);
      grad.addColorStop(0,    css('--peri'));
      grad.addColorStop(0.55, css('--terracotta'));
      grad.addColorStop(1,    css('--honey'));
      ctx.fillStyle = grad;
      ctx.fillRect(barX, barY, fillW, barH);
      // Sheen highlight
      ctx.fillStyle = 'rgba(255,255,255,0.11)';
      ctx.fillRect(barX, barY, fillW, barH * 0.42);
      ctx.restore();
    }

    // ── Bar inner border ─────────────────────────────────────────
    ctx.save();
    rrect(ctx, barX, barY, barW, barH, barR);
    ctx.strokeStyle = css('--card-edge');
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.5;
    ctx.stroke();
    ctx.restore();

    // ── 15 % reserve threshold marker ───────────────────────────
    const reserveX  = barX + barW * (1 - RESERVE);
    const overLimit = cur > (1 - RESERVE);   // cash < 15 % = warning
    const mrkCol    = overLimit ? css('--clay') : css('--sage');

    // Vertical dashed line spanning above + through bar
    ctx.save();
    ctx.setLineDash([3, 3]);
    ctx.lineWidth   = 1.5;
    ctx.strokeStyle = mrkCol;
    ctx.globalAlpha = 0.75;
    ctx.beginPath();
    ctx.moveTo(reserveX, barY - 26);
    ctx.lineTo(reserveX, barY + barH + 12);
    ctx.stroke();
    ctx.restore();

    // Small downward-pointing triangle above bar
    const triH = 7, triW = 6;
    ctx.save();
    ctx.fillStyle = mrkCol;
    ctx.beginPath();
    ctx.moveTo(reserveX - triW, barY - 26);
    ctx.lineTo(reserveX + triW, barY - 26);
    ctx.lineTo(reserveX,        barY - 26 + triH);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // "15% RESERVE" label below bar
    ctx.save();
    ctx.font          = `500 7.5px ${monoFont}`;
    ctx.fillStyle     = css('--muted');
    ctx.textAlign     = 'center';
    ctx.textBaseline  = 'top';
    ctx.letterSpacing = '0.6px';
    ctx.fillText('15% RESERVE', reserveX, barY + barH + 5);
    ctx.restore();

    // ── Labels above bar — 3 designs ──────────────────────────────
    const stockPctStr = (cur * 100).toFixed(1) + '%';
    const cashPctStr  = cashCur.toFixed(1) + '%';
    const cashColor   = overLimit ? css('--clay') : css('--ink');
    const investedAmt = model.totalCurrent * cur;
    const cashAmt     = model.totalCurrent * (1 - cur);
    const fmtShort = n => {
      if (n >= 1e6) return '$' + (n/1e6).toFixed(1) + 'M';
      if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
      return '$' + n.toFixed(0);
    };

    if (gaugeStyle === 'inline') {
      // ── V1: Inline — % rendered inside bar ends ───────────────
      const inY = barY + barH / 2;
      // Stock % inside left
      ctx.save();
      ctx.textBaseline = 'middle';
      ctx.textAlign    = 'left';
      ctx.font         = `700 13px ${monoFont}`;
      ctx.fillStyle    = cur > 0.12 ? 'rgba(250,243,224,.95)' : css('--ink');
      ctx.fillText(stockPctStr, barX + 12, inY);
      ctx.restore();
      // Cash % inside right
      ctx.save();
      ctx.textBaseline = 'middle';
      ctx.textAlign    = 'right';
      ctx.font         = `700 13px ${monoFont}`;
      ctx.fillStyle    = cur < 0.88 ? css('--muted') : 'rgba(250,243,224,.95)';
      if (overLimit) ctx.fillStyle = css('--clay');
      ctx.fillText(cashPctStr, barX + barW - 12, inY);
      ctx.restore();
      // Subtle labels above bar
      ctx.save();
      ctx.font         = `500 8px ${monoFont}`;
      ctx.fillStyle    = css('--muted');
      ctx.globalAlpha  = 0.6;
      ctx.textBaseline = 'bottom';
      ctx.textAlign    = 'left';
      ctx.fillText('INVESTED', barX, barY - 5);
      ctx.textAlign    = 'right';
      ctx.fillText('CASH', barX + barW, barY - 5);
      ctx.restore();

    } else if (gaugeStyle === 'badge') {
      // ── V2: Badge — pill badges floating above bar ────────────
      const badgeH = 26, badgeR = 8, badgePad = 10;
      const badgeY = barY - badgeH - 8;

      // Stock badge (left)
      const stockLbl = stockPctStr + ' Invested';
      ctx.font = `600 11px ${monoFont}`;
      const sw = ctx.measureText(stockLbl).width + badgePad * 2;
      // Badge bg
      ctx.save();
      rrect(ctx, barX, badgeY, sw, badgeH, badgeR);
      ctx.fillStyle = css('--terracotta');
      ctx.shadowColor = 'rgba(196,106,74,.25)';
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.restore();
      // Badge text
      ctx.save();
      ctx.font         = `600 11px ${monoFont}`;
      ctx.fillStyle    = '#faf3e0';
      ctx.textBaseline = 'middle';
      ctx.textAlign    = 'left';
      ctx.fillText(stockLbl, barX + badgePad, badgeY + badgeH / 2);
      ctx.restore();

      // Cash badge (right)
      const cashLbl = cashPctStr + ' Cash';
      ctx.font = `600 11px ${monoFont}`;
      const cw = ctx.measureText(cashLbl).width + badgePad * 2;
      ctx.save();
      rrect(ctx, barX + barW - cw, badgeY, cw, badgeH, badgeR);
      ctx.fillStyle = overLimit ? css('--clay') : css('--track');
      ctx.strokeStyle = overLimit ? css('--clay') : css('--card-edge');
      ctx.lineWidth = 1;
      if (!overLimit) ctx.fill();
      else { ctx.shadowColor = 'rgba(187,77,60,.2)'; ctx.shadowBlur = 6; ctx.fill(); }
      if (!overLimit) ctx.stroke();
      ctx.restore();
      ctx.save();
      ctx.font         = `600 11px ${monoFont}`;
      ctx.fillStyle    = overLimit ? '#faf3e0' : css('--muted');
      ctx.textBaseline = 'middle';
      ctx.textAlign    = 'right';
      ctx.fillText(cashLbl, barX + barW - badgePad, badgeY + badgeH / 2);
      ctx.restore();

    } else {
      // ── V3: Stacked (default) — large %, small $ amount, divider ──
      // Left — Stock
      ctx.save();
      ctx.textBaseline = 'top';
      ctx.textAlign    = 'left';
      ctx.font         = `600 22px ${displayFont}`;
      ctx.fillStyle    = css('--ink');
      ctx.fillText(stockPctStr, barX, 4);
      const pctW = ctx.measureText(stockPctStr).width;
      // Thin vertical divider
      ctx.fillStyle = css('--line');
      ctx.fillRect(barX + pctW + 8, 8, 1, 18);
      // Currency amount
      ctx.font      = `500 11px ${monoFont}`;
      ctx.fillStyle = css('--muted');
      ctx.fillText(fmtShort(investedAmt), barX + pctW + 16, 7);
      // Label
      ctx.font      = `500 8.5px ${monoFont}`;
      ctx.fillStyle = css('--muted');
      ctx.globalAlpha = 0.65;
      ctx.fillText('INVESTED', barX + pctW + 16, 21);
      ctx.restore();

      // Right — Cash
      ctx.save();
      ctx.textBaseline = 'top';
      ctx.textAlign    = 'right';
      ctx.font         = `600 22px ${displayFont}`;
      ctx.fillStyle    = cashColor;
      ctx.fillText(cashPctStr, barX + barW, 4);
      const cashW = ctx.measureText(cashPctStr).width;
      // Thin vertical divider
      ctx.fillStyle = css('--line');
      ctx.fillRect(barX + barW - cashW - 9, 8, 1, 18);
      // Currency amount
      ctx.font      = `500 11px ${monoFont}`;
      ctx.fillStyle = overLimit ? css('--clay') : css('--muted');
      ctx.textAlign = 'right';
      ctx.fillText(fmtShort(cashAmt), barX + barW - cashW - 16, 7);
      // Label
      ctx.font      = `500 8.5px ${monoFont}`;
      ctx.fillStyle = css('--muted');
      ctx.globalAlpha = 0.65;
      ctx.textAlign = 'right';
      ctx.fillText('CASH', barX + barW - cashW - 16, 21);
      ctx.restore();
    }

    if (t < 1) _gaugeAnimRaf = requestAnimationFrame(draw);
  }

  _gaugeAnimRaf = requestAnimationFrame(draw);
}

// ── Render: left position list ────────────────────────────────────────────────
function renderPosList(model) {
  const stockTotal = model.positions.reduce((s,p) => s + p.currentValue, 0);
  const items = model.positions
    .map(p => ({
      symbol: p.symbol,
      currentValue: p.currentValue,
      weightPct: stockTotal > 0 ? p.currentValue / stockTotal * 100 : 0,
      isCash: false,
    }))
    .concat([{
      symbol: 'Cash',
      currentValue: model.totalCash,
      weightPct: model.totalCurrent > 0 ? model.totalCash / model.totalCurrent * 100 : 0,

    .sort((a, b) => b.currentValue - a.currentValue);

  if (head) head.textContent = model.positions.length + ' holdings';
