  }).join('');
}

// ── Live quotes (day change + pre/post market) ────────────────────────────────
async function fetchQuotes(symbols) {
  if (!symbols.length) return {};

  // Try v7 batch first (returns pre/post market fields natively)
  const sym = symbols.map(yahooTicker).join(',');
  for (const base of ['https://query1.finance.yahoo.com','https://query2.finance.yahoo.com']) {
    const url = `${base}/v7/finance/quote?symbols=${sym}`;
    for (const u of [url, `https://corsproxy.io/?url=${encodeURIComponent(url)}`]) {
      try {
        const r = await fetch(u, { headers: { Accept: 'application/json' } });
        if (!r.ok) continue;
        const d = await r.json();
        const results = d?.quoteResponse?.result || [];
        if (results.length) {
          const out = {};
          results.forEach(q => { out[q.symbol] = q; });
          return out;
        }
      } catch {}
    }
  }

  // Fallback: intraday chart with includePrePost=true — extracts pre/post prices from candles
  const entries = await Promise.all(symbols.map(s => fetchSingleQuoteFromChart(s, yahooTicker(s))));
  const out = {};
  entries.forEach(([s, q]) => { if (q) out[s] = q; });
  return out;
}

async function fetchSingleQuoteFromChart(symbol, yahooSym = yahooTicker(symbol)) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(yahooSym)}?range=1d&interval=5m&includePrePost=true`;
  let data = null;
  for (const u of [url, `https://corsproxy.io/?url=${encodeURIComponent(url)}`]) {
    try { const r = await fetch(u); if (r.ok) { data = await r.json(); break; } } catch {}
  }
  if (!data) return [symbol, null];

  const result = data?.chart?.result?.[0];
  if (!result) return [symbol, null];

  const meta       = result.meta;
  const timestamps = result.timestamp || [];
  const closes     = result.indicators?.quote?.[0]?.close || [];
  const prevClose  = meta.chartPreviousClose ?? meta.previousClose;
  const regPrice   = meta.regularMarketPrice;
  if (!regPrice) return [symbol, null];

  const dayChange    = meta.regularMarketChange    ?? (prevClose ? regPrice - prevClose : null);
  const dayChangePct = meta.regularMarketChangePercent ?? (prevClose && dayChange != null ? dayChange / prevClose * 100 : null);

  // Determine market state and extract pre/post prices from candle timestamps
  const ctp = meta.currentTradingPeriod;
  const regStart = ctp?.regular?.start;
  const regEnd   = ctp?.regular?.end;
  const nowSec   = Date.now() / 1000;

  let marketState = 'REGULAR';
  let preMarketPrice = null, preMarketChangePercent = null;
  let postMarketPrice = null, postMarketChangePercent = null;

  if (regStart && regEnd) {
    if (nowSec < regStart) {
      marketState = 'PRE';
      for (let i = timestamps.length - 1; i >= 0; i--) {
        if (timestamps[i] < regStart && closes[i] != null) {
          preMarketPrice = closes[i];
          preMarketChangePercent = regPrice ? (preMarketPrice - regPrice) / regPrice * 100 : null;
          break;
        }
      }
    } else if (nowSec > regEnd) {
      marketState = 'POST';
      for (let i = timestamps.length - 1; i >= 0; i--) {
        if (timestamps[i] > regEnd && closes[i] != null) {
          postMarketPrice = closes[i];
          postMarketChangePercent = regPrice ? (postMarketPrice - regPrice) / regPrice * 100 : null;
          break;
        }
      }
    }
  }

  return [symbol, { regularMarketChange: dayChange, regularMarketChangePercent: dayChangePct,
    marketState, preMarketPrice, preMarketChangePercent, postMarketPrice, postMarketChangePercent }];
}

function attachQuotes(model, quotes) {
  const targets = [...model.positions, ...(model.sgovPos ? [model.sgovPos] : [])];
  targets.forEach(p => {
    const q = quotes[p.symbol]; if (!q) return;
    p.dayChange    = q.regularMarketChange        ?? null;
    p.dayChangePct = q.regularMarketChangePercent ?? null;
    p.marketState  = q.marketState ?? 'REGULAR';
    const reg      = q.regularMarketPrice ?? p.price;
    p.preMarketPrice  = q.preMarketPrice  ?? null;
    p.postMarketPrice = q.postMarketPrice ?? null;
    p.preMarketPct  = p.preMarketPrice  && reg ? (p.preMarketPrice  - reg) / reg * 100 : null;
    p.postMarketPct = p.postMarketPrice && reg ? (p.postMarketPrice - reg) / reg * 100 : null;
    // Calendar data
    p.nextEarnings    = q.earningsTimestamp     ? new Date(q.earningsTimestamp     * 1000) : null;
    p.nextEarningsEnd = q.earningsTimestampEnd  ? new Date(q.earningsTimestampEnd  * 1000) : null;
    p.exDivDate       = q.exDividendDate        ? new Date(q.exDividendDate        * 1000) : null;
  });
  // Quotes + calendar for watchlist
  model.watchlist.forEach(w => {
    const q = quotes[w.symbol]; if (!q) return;
    const reg = q.regularMarketPrice ?? w.price;
    w.dayChange    = q.regularMarketChange        ?? null;
    w.dayChangePct = q.regularMarketChangePercent ?? null;
    w.marketState  = q.marketState ?? 'REGULAR';
    w.preMarketPrice  = q.preMarketPrice  ?? null;
    w.postMarketPrice = q.postMarketPrice ?? null;
    w.preMarketPct  = w.preMarketPrice  && reg ? (w.preMarketPrice  - reg) / reg * 100 : null;
    w.postMarketPct = w.postMarketPrice && reg ? (w.postMarketPrice - reg) / reg * 100 : null;
    w.nextEarnings    = q.earningsTimestamp    ? new Date(q.earningsTimestamp    * 1000) : null;
    w.nextEarningsEnd = q.earningsTimestampEnd ? new Date(q.earningsTimestampEnd * 1000) : null;
    w.exDivDate       = q.exDividendDate       ? new Date(q.exDividendDate       * 1000) : null;
  });
}

function slWarningBadge(sym, price) {
  const sl = planCache[sym]?.sl;
  if (!sl || !price) return '';
  const pct = (price - sl) / sl * 100;
  if (pct <= 0) return `<span title="${t('sl_reached_tooltip')}" style="margin-left:3px;color:var(--loss);font-size:11px;font-weight:900;vertical-align:middle">🔴</span>`;
  if (pct <= 5) return `<span title="Near Stop Loss (${pct.toFixed(1)}%)" style="margin-left:3px;color:#c79038;font-size:11px;vertical-align:middle">⚠</span>`;
  return '';
}

function trancheBadge(sym, price) {
  if (!price) return '';
  const tranches = planCache[sym]?.tranches || [];
  let html = '';
  tranches.forEach((t, i) => {
    if (!t.price || t.price <= 0) return;
    const pct = (price - t.price) / t.price * 100;
    if (pct <= 0) {
      html += `<span title="T${i+1} entry reached! (${fmtCurr(t.price)})"
        style="margin-left:3px;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:rgba(107,142,90,.2);color:var(--gain);vertical-align:middle">T${i+1}</span>`;
    } else if (pct <= 3) {
      html += `<span title="T${i+1} within ${pct.toFixed(1)}% (${fmtCurr(t.price)})"
        style="margin-left:3px;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:rgba(199,144,56,.2);color:var(--honey);vertical-align:middle">T${i+1}</span>`;
    }
  });
  return html;
}

function tpBadge(sym, price) {
  if (!price) return '';
  const trims = planCache[sym]?.trimTranches || [];
  let html = '';
  trims.forEach((t, i) => {
    if (!t.price || t.price <= 0) return;
    const pct = (price - t.price) / t.price * 100; // positive = price above TP level
    if (pct >= 0) {
      html += `<span title="TP${i+1} reached! (${fmtCurr(t.price)})"
        style="margin-left:3px;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:rgba(107,142,90,.25);color:var(--gain);vertical-align:middle">TP${i+1}</span>`;
    } else if (pct >= -3) {
      html += `<span title="TP${i+1} within ${Math.abs(pct).toFixed(1)}% (${fmtCurr(t.price)})"
        style="margin-left:3px;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:rgba(199,144,56,.2);color:var(--honey);vertical-align:middle">TP${i+1}</span>`;
    }
  });
  return html;
}

// ── Render: positions table ───────────────────────────────────────────────────
let sortKey = 'currentValue', sortDir = -1, searchTerm = '', categoryFilter = 'All', sectorFilter = 'All';

function allocSparkline(p, investable) {
  const curr = p.weightPct;
  const tgt  = p.target != null ? p.target * 100 : null;
  const targetAmt = p.target != null ? p.target * investable : null;
  const percentToTarget = (targetAmt && targetAmt > 0) ? (p.currentValue / targetAmt) * 100 : 0;

  if (tgt == null) {
    return `<div class="alloc-spark">
      <div class="spark-track"><div class="spark-fill" style="width:${Math.min(curr,100).toFixed(2)}%;background:${colorFor(p.symbol)}"></div></div>
      <div style="font-size:9px;color:var(--muted);margin-top:2px">${fmtCurr(p.currentValue)}</div>
    </div>`;
  }
  const scale = Math.max(percentToTarget, 100);
  const fillW = (percentToTarget / scale * 100).toFixed(2);
  const tickL = (100 / scale * 100).toFixed(2);
  const cls   = Math.abs(curr - tgt) <= 0.5 ? 'ok' : curr > tgt ? 'over' : 'under';
  return `<div class="alloc-spark">
    <div class="spark-track">
      <div class="spark-fill" style="width:${fillW}%;background:${colorFor(p.symbol)}"></div>
      <div class="spark-tick" style="left:${tickL}%"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:9px;margin-top:2px;white-space:nowrap">
      <span style="color:var(--muted)">/ ${fmtCurr(targetAmt)}</span>
      ${(() => { const d = targetAmt - p.currentValue; return `<span class="spark-diff ${cls}">${d>=0?'+':''}${fmtCurr(d)} (${percentToTarget.toFixed(0)}%)</span>`; })()}
    </div>
  </div>`;
}

function toAddCell(p, investable) {
  if (p.target == null || p.target <= 0) return `<span class="to-add none">—</span>`;
  const need = p.target * investable - p.currentValue;
  if (need >= 0) return `<span class="to-add buy">+${fmtCurr(need)}</span>`;
  return `<span class="to-add over">${fmtCurr(need)}</span>`;
}

function logoCell(symbol, color) {
  return `<div class="logo-wrap">
    <img class="logo-img" src="https://assets.parqet.com/logos/symbol/${symbol}"
         alt="${symbol}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="logo-fb" style="background:${color}">${symbol.slice(0,2)}</div>
  </div>`;
}

function renderTable(model) {
  const titleEl = document.getElementById('posTitle');
  if (titleEl) titleEl.textContent = `${model.positions.length} ${t('positions_title')}`;

  const drEl = document.getElementById('posDayReturn');
  if (drEl) {
    const allP = [...model.positions, ...(model.sgovPos ? [model.sgovPos] : [])];
    const withData = allP.filter(p => p.dayChange != null);
    if (withData.length) {
      const totalDR  = withData.reduce((s, p) => s + p.dayChange * p.qty, 0);
      const totalVal = withData.reduce((s, p) => s + p.currentValue, 0);
      const pct = totalVal > 0 ? totalDR / totalVal * 100 : 0;
      const up  = totalDR >= 0;
      const col = `var(${up ? '--gain' : '--loss'})`;
      drEl.innerHTML = `${t('th_day_return')}: <span style="color:${col};font-weight:600">${up?'+':''}${fmtCurr(totalDR)} (${up?'+':''}${pct.toFixed(2)}%)</span>`;
    } else {
      drEl.textContent = '';
    }
  }
  const q = searchTerm.trim().toUpperCase();
  const showWatchlist = categoryFilter === t('Watchlist');
  let filtered;
  if (showWatchlist) {
    filtered = model.watchlist.filter(w => !q || w.symbol.toUpperCase().includes(q));
    if (titleEl) titleEl.textContent = `${filtered.length} ${t('Watchlist')}`;
    renderWeightBar([]);
    document.getElementById('posTable').innerHTML =
      `<table class="pos-table"><thead><tr>${
        [t('th_symbol'),t('th_last_price'),t('th_day_change'),t('th_day_return'),t('total_ret'),t('th_quantity'),t('th_avg_cost'),t('th_total_cost'),t('th_current_value'),t('allocation')].map(l=>`<th style="cursor:default">${l}</th>`).join('')
      }</tr></thead><tbody>${filtered.map(watchlistRow).join('')}</tbody></table>`;
    return;
  }
  filtered = model.positions;
  if (categoryFilter !== 'All') filtered = filtered.filter(p => (p.category || 'Other') === categoryFilter);
  if (sectorFilter   !== 'All') filtered = filtered.filter(p => (p.sector   || 'Other') === sectorFilter);
  if (q) filtered = filtered.filter(p => p.symbol.toUpperCase().includes(q));
  const sorted = [...filtered].sort((a, b) => {
    if (sortKey === 'symbol') return sortDir * a.symbol.localeCompare(b.symbol);
    if (sortKey === 'price') {
      const aPct = a.preMarketPct ?? a.postMarketPct ?? null;
      const bPct = b.preMarketPct ?? b.postMarketPct ?? null;
      if (aPct != null || bPct != null) return sortDir * ((aPct ?? 0) - (bPct ?? 0));
    }
    return sortDir * ((a[sortKey] || 0) - (b[sortKey] || 0));
  });
  renderWeightBar(sorted);

  const headers = [
    { key: 'symbol',       label: t('th_symbol'),        sort: true  },
    { key: 'price',        label: t('th_last_price'),    sort: true  },
    { key: 'dayChangePct', label: t('th_day_change'),    sort: true  },
    { key: 'dayChangePct', label: t('th_day_return'),    sort: true  },
    { key: 'pnlPct',       label: t('total_ret'),        sort: true  },
    { key: 'qty',          label: t('th_quantity'),      sort: true  },
    { key: 'avgPrice',     label: t('th_avg_cost'),      sort: true  },
    { key: 'costBasis',    label: t('th_total_cost'),    sort: true  },
    { key: 'currentValue', label: t('th_current_value'), sort: true  },
    { key: null,           label: t('allocation'),       sort: false },
    { key: 'category',    label: t('category_label'),   sort: false },
  ];
  const thHTML = headers.map(h => h.sort
    ? `<th onclick="sortTable('${h.key}')">${h.label}${sortKey===h.key ? ' '+(sortDir>0?'↑':'↓') : ''}</th>`
    : `<th style="cursor:default">${h.label}</th>`
  ).join('');

  // Two-line cell helper
  const dc = (main, sub, subCls='cell-mut') =>
    `<div class="cell-main">${main}</div>${sub != null ? `<div class="cell-sub ${subCls}">${sub}</div>` : ''}`;


  function stockRow(p, num) {
    const color = colorFor(p.symbol);
    const totalUp = p.pnl >= 0;

    // Last price + pre/post market
    let priceSub = null, priceSubCls = 'cell-mut';
    const ms = p.marketState;
    if (ms === 'PRE' && p.preMarketPrice) {
      priceSubCls = (p.preMarketPct||0) >= 0 ? 'cell-up' : 'cell-dn';
      priceSub = `☀︎ ${fmtCurr(p.preMarketPrice)} (${(p.preMarketPct||0)>=0?'+':''}${(p.preMarketPct||0).toFixed(2)}%)`;
    } else if ((ms === 'POST' || ms === 'CLOSED') && p.postMarketPrice) {
      priceSubCls = (p.postMarketPct||0) >= 0 ? 'cell-up' : 'cell-dn';
      priceSub = `☾ ${fmtCurr(p.postMarketPrice)} (${(p.postMarketPct||0)>=0?'+':''}${(p.postMarketPct||0).toFixed(2)}%)`;
    }

    // Day change
    const dc$ = p.dayChange, dcPct = p.dayChangePct;
    const dayUp = dc$ != null && dc$ >= 0;
    const dayCls = dc$ == null ? 'cell-mut' : dayUp ? 'cell-up' : 'cell-dn';
    const dayChgStr  = dc$ == null ? '—' : `${dayUp?'+':''}${fmtCurr(dc$)}`;
    const dayPctStr  = dcPct == null ? null : `${dayUp?'+':''}${dcPct.toFixed(2)}%`;
    const dayRetStr  = dc$ == null ? '—' : `${dayUp?'+':''}${fmtCurr(dc$ * p.qty)}`;

    return `<tr>
      <td><div class="asset-cell">${logoCell(p.symbol, color)}
        <div><div class="asset-sym"><span style="cursor:pointer" onclick="openSymbolDetail('${p.symbol}')">${p.symbol}</span>${slWarningBadge(p.symbol,p.price)}${trancheBadge(p.symbol,p.price)}${tpBadge(p.symbol,p.price)}<button class="plan-btn${hasSavedPlan(p.symbol)?' saved':''}" onclick="openActionModal('${p.symbol}')" title="${t('actions_tooltip')}">${ACTION_ICON}</button></div><div class="asset-name">${p.name}</div></div>
      </div></td>
      <td>${dc(fmtCurr(p.price), priceSub, priceSubCls)}</td>
      <td class="${dayCls}">${dc(dayChgStr, dayPctStr, dayCls)}</td>
      <td class="${dayCls}">${dc(dayRetStr, dayPctStr, dayCls)}</td>
      <td class="${totalUp?'cell-up':'cell-dn'}">${dc((totalUp?'+':'')+fmtCurr(p.pnl), fmtPct(p.pnlPct), totalUp?'cell-up':'cell-dn')}</td>
      <td>${dc(p.qty?.toFixed(4)||'—', null)}</td>
      <td>${dc(fmtCurr(p.avgPrice), null)}</td>
      <td>${dc(fmtCurr(p.costBasis), null)}</td>
      <td>${dc('<strong>'+fmtCurr(p.currentValue)+'</strong>', p.target!=null ? p.stockWeightPct.toFixed(1)+'% / '+(p.target*100).toFixed(0)+'%' : p.stockWeightPct.toFixed(1)+'%', 'cell-mut')}</td>
      <td>${allocSparkline(p, model.investable)}</td>
      <td><span style="font-size:11px;color:var(--muted)">${p.category||'—'}</span></td>
    </tr>`;
  }

  // SGOV row
  let sgovRow = '';
  if (model.sgovPos && (model.sgovPos.qty || 0) > 0) {
    const s = model.sgovPos;
    const sup = s.pnl >= 0;
    const sdc$ = s.dayChange, sdcPct = s.dayChangePct;
    const sdayUp = sdc$ != null && sdc$ >= 0;
    const sdayCls = sdc$ == null ? 'cell-mut' : sdayUp ? 'cell-up' : 'cell-dn';
    sgovRow = `<tr>
      <td><div class="asset-cell">${logoCell('SGOV','#8a7458')}
        <div><div class="asset-sym"><span style="cursor:pointer" onclick="openSymbolDetail('SGOV')">SGOV</span>${slWarningBadge('SGOV',s.price)}${trancheBadge('SGOV',s.price)}${tpBadge('SGOV',s.price)} <span class="tag treasury">Treasury</span><button class="plan-btn${hasSavedPlan('SGOV')?' saved':''}" onclick="openActionModal('SGOV')" title="${t('actions_tooltip')}">${ACTION_ICON}</button></div><div class="asset-name">${s.name||''}</div></div>
      </div></td>
      <td>${dc(fmtCurr(s.price), null)}</td>
      <td class="${sdayCls}">${dc(sdc$!=null?(sdayUp?'+':'')+fmtCurr(sdc$):'—', sdcPct!=null?(sdayUp?'+':'')+sdcPct.toFixed(2)+'%':null, sdayCls)}</td>
      <td class="${sdayCls}">${dc(sdc$!=null?(sdayUp?'+':'')+fmtCurr(sdc$*s.qty):'—', null, sdayCls)}</td>
      <td class="${sup?'cell-up':'cell-dn'}">${dc((sup?'+':'')+fmtCurr(s.pnl), fmtPct(s.pnlPct), sup?'cell-up':'cell-dn')}</td>
      <td>${dc(s.qty?.toFixed(4)||'—', null)}</td>
      <td>${dc(fmtCurr(s.avgPrice), null)}</td>
      <td>${dc(fmtCurr(s.costBasis), null)}</td>
      <td>${dc(fmtCurr(s.currentValue), s.weightPct.toFixed(1)+'%', 'cell-mut')}</td>
      <td>${dc(t('cash_equiv_label'), null, 'cell-mut')}</td>
      <td></td>
    </tr>`;
  }

  // Cash row
  const cashPct = model.totalCurrent > 0 ? model.rawCash / model.totalCurrent * 100 : 0;
  const cashRow = `<tr style="background:var(--hover)">
    <td><div class="asset-cell">
      <div class="logo-wrap" style="background:#8a7458">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" width="16" height="16"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      </div>
      <div><div class="asset-sym">Cash</div><div class="asset-name">Raw cash · not invested</div></div>
    </div></td>
    <td colspan="8"></td>
    <td>${dc(fmtCurr(model.rawCash), cashPct.toFixed(1)+'%', 'cell-mut')}</td>
    <td>${dc(fmtCurr(model.cashResPct * model.totalCurrent)+' reserved', (model.cashResPct*100).toFixed(0)+'% target', 'cell-mut')}</td>
    <td></td>
  </tr>`;

  document.getElementById('posTable').innerHTML =
    `<table class="pos-table"><thead><tr>${thHTML}</tr></thead><tbody>${sorted.map((p,i) => stockRow(p,i+1)).join('')}${sgovRow}${cashRow}</tbody></table>`;
}

  if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = -1; }
  renderTable(currentModel);

// ── Render: donut ──────────────────────────────────────────────────────────
// Tweakable donut design — knobs read live from window.donutTweaks
const DONUT_DEFAULTS = /*EDITMODE-BEGIN*/{
  "cutout": 68,
  "spacing": 0,
  "borderWidth": 2,
  "borderRadius": 6,
  "hoverOffset": 8,
  "labelDistance": 8,
  "labelMinPct": 2,
  "showLabels": true,
  "showInnerRing": false,
  "showShadow": false,
  "animationMs": 650,
  "planBtnStyle": "compact",
  "gaugeLabels": "badge",
  "allocDonut": "cozy"
}/*EDITMODE-END*/;
window.donutTweaks = { ...DONUT_DEFAULTS };
document.body.dataset.planBtn = DONUT_DEFAULTS.planBtnStyle;

function donutDataset(data, colors) {
  const t = window.donutTweaks;
  return [{
    data,
    backgroundColor: colors,
    borderColor: css('--card'),
    borderWidth:  t.borderWidth,
    borderRadius: t.borderRadius,
    spacing:      t.spacing,
    hoverBorderWidth: 0,
    hoverOffset:  t.hoverOffset,
  }];
}
function donutBaseOptions(tooltipLabel) {
  const t = window.donutTweaks;
  return {
    responsive: true, maintainAspectRatio: false,
    cutout: t.cutout + '%',
    layout: { padding: 50 },
    animation: { duration: t.animationMs, easing: 'easeOutCubic' },
    plugins: {
      legend: { display: false },
      donutOuterLabels: {},
      tooltip: {
        callbacks: { label: tooltipLabel },
        backgroundColor: css('--tooltip-bg'), bodyColor: '#faf3e0',
        padding: 10, cornerRadius: 10,
        titleFont: { family: css('--font-display'), size: 12, weight: '600' },
        bodyFont:  { family: css('--font-ui'),      size: 11 }
      }
    }
  };
}

// Soft drop-shadow under the whole arc ring
const donutShadow = {
  id: 'donutShadow',
  beforeDatasetDraw(chart) {
    if (!window.donutTweaks?.showShadow) return;
    const ctx = chart.ctx;
    ctx.save();
    ctx.shadowColor = 'rgba(58,42,28,.14)';
    ctx.shadowBlur = 14;
    ctx.shadowOffsetY = 4;
  },
  afterDatasetDraw(chart) {
    if (!window.donutTweaks?.showShadow) return;
    chart.ctx.restore();
  }
};

// Decorative dotted inner+outer ring
const donutInnerRing = {
  id: 'donutInnerRing',
  beforeDatasetDraw(chart) {
    if (!window.donutTweaks?.showInnerRing) return;
    const meta = chart.getDatasetMeta(0);
    if (!meta?.data?.length) return;
    const arc = meta.data[0];
    const ctx = chart.ctx;
    const cx = arc.x, cy = arc.y;
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, arc.innerRadius - 6, 0, Math.PI * 2);
    ctx.strokeStyle = css('--line'); ctx.lineWidth = 1; ctx.globalAlpha = 0.6;
    ctx.stroke();
    ctx.setLineDash([1, 5]);
    ctx.beginPath();
    ctx.arc(cx, cy, arc.outerRadius + 6, 0, Math.PI * 2);
    ctx.strokeStyle = css('--card-edge'); ctx.globalAlpha = 0.7;
    ctx.stroke();
    ctx.restore();
  }
};

// Outer labels — curved connector + serif symbol + mono percent
const donutOuterLabels = {
  id: 'donutOuterLabels',
  afterDatasetsDraw(chart) {
    if (!window.donutTweaks?.showLabels) return;
    const { ctx, data } = chart;
    const meta = chart.getDatasetMeta(0);
    if (!meta?.data?.length) return;
    const t = window.donutTweaks;
    const total = data.datasets[0].data.reduce((s, v) => s + (v || 0), 0);
    ctx.save();
    meta.data.forEach((arc, i) => {
      const val = data.datasets[0].data[i] || 0;
      const pct = total > 0 ? val / total * 100 : 0;
      if (pct < t.labelMinPct) return;
      const mid = (arc.startAngle + arc.endAngle) / 2;
      const cos = Math.cos(mid), sin = Math.sin(mid);
      const r = arc.outerRadius, cx = arc.x, cy = arc.y;
      const color = data.datasets[0].backgroundColor[i];

      const r1 = r + 6;
      const r2 = r + t.labelDistance;
      const x1 = cx + cos * r1,  y1 = cy + sin * r1;
      const x2 = cx + cos * r2,  y2 = cy + sin * r2;
      const hd = cos >= 0 ? 1 : -1;
      const x3 = x2 + hd * 10, y3 = y2;

      ctx.beginPath();
      ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3);
      ctx.strokeStyle = color; ctx.lineWidth = 1.2;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
      ctx.beginPath(); ctx.arc(x3, y3, 2.2, 0, Math.PI * 2);
      ctx.fillStyle = color; ctx.fill();

      const xL = x3 + hd * 5;
      ctx.textAlign = cos >= 0 ? 'left' : 'right';
      ctx.textBaseline = 'middle';
      ctx.font = '600 11px ' + (css('--font-display') || 'serif');
      ctx.fillStyle = css('--ink');
      ctx.fillText(data.labels[i], xL, y3 - 6);
      ctx.font = '500 9.5px ' + (css('--font-mono') || 'monospace');
      ctx.fillStyle = css('--muted');
      ctx.fillText(pct.toFixed(1) + '%', xL, y3 + 6);
    });
    ctx.restore();
  }
};

function renderDonut(model) {
  if (donutChartInst) { donutChartInst.destroy(); donutChartInst = null; }
  let positions = model.positions;
  if (categoryFilter !== 'All') positions = positions.filter(p => (p.category || 'Other') === categoryFilter);
  if (sectorFilter   !== 'All') positions = positions.filter(p => (p.sector   || 'Other') === sectorFilter);
  const noFilter = categoryFilter === 'All' && sectorFilter === 'All';
  const items = noFilter ? [...positions, { symbol: 'Cash', currentValue: model.totalCash }] : positions;
  const total = items.reduce((s, p) => s + p.currentValue, 0);
  const labels = items.map(p => p.symbol);
  const data   = items.map(p => p.currentValue);
  const labelEl = document.getElementById('donut-label');
  const valueEl = document.getElementById('donut-value');
  const filterLabel = [categoryFilter !== 'All' ? t(categoryFilter) : '', sectorFilter !== 'All' ? t(sectorFilter) : ''].filter(Boolean).join(' · ');
  if (labelEl) labelEl.textContent = filterLabel || 'Total Net Worth';
  if (valueEl) valueEl.textContent = fmtCurr(total);
  donutChartInst = new Chart(document.getElementById('donutChart').getContext('2d'), {
    type: 'doughnut',
    data: { labels, datasets: donutDataset(data, labels.map(colorFor)) },
    options: donutBaseOptions(c => ` ${c.label}: ${fmtCurr(c.raw)} (${(c.raw/total*100).toFixed(1)}%)`),
    plugins: [donutInnerRing, donutShadow, donutOuterLabels]
  });
}

// ── Render: weight bar ────────────────────────────────────────────────────────
(function() {
  let tip = null;
  function getOrCreateTip() {
    if (!tip) {
      tip = document.createElement('div');
      tip.id = 'wbTip';
      tip.style.cssText = 'position:fixed;z-index:9999;background:var(--tooltip-bg);color:#faf3e0;border-radius:10px;padding:8px 12px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .12s;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.3)';
      document.body.appendChild(tip);
    }
    return tip;
  }
  function showTip(e, html) {
    const t = getOrCreateTip();
    t.innerHTML = html;
    t.style.opacity = '1';
    moveTip(e);
  }
  function moveTip(e) {
    const t = getOrCreateTip();
    const x = (e.touches ? e.touches[0].clientX : e.clientX);
    const y = (e.touches ? e.touches[0].clientY : e.clientY);
    const tw = t.offsetWidth, th = t.offsetHeight;
    t.style.left = Math.min(x + 12, window.innerWidth - tw - 8) + 'px';
    t.style.top  = (y - th - 10 < 0 ? y + 14 : y - th - 10) + 'px';
  }
  function hideTip() { getOrCreateTip().style.opacity = '0'; }

  window.tpShow = showTip;
  window.tpMove = moveTip;
  window.tpHide = hideTip;

  window.renderWeightBar = function(positions) {
    const el = document.getElementById('weightBar');
    if (!el || !positions.length) { if (el) el.innerHTML = ''; return; }
    const total = positions.reduce((s, p) => s + p.currentValue, 0);
    const items = positions.map(p => ({ symbol: p.symbol, currentValue: p.currentValue, pct: total > 0 ? p.currentValue / total * 100 : 0, color: colorFor(p.symbol) }));
    const bar = document.createElement('div');
    bar.style.cssText = 'display:flex;height:22px;border-radius:6px;overflow:hidden;gap:1px';
    items.forEach(p => {
      const seg = document.createElement('div');
      seg.style.cssText = `width:${p.pct.toFixed(4)}%;height:100%;background:${p.color};display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;cursor:default`;
      seg.innerHTML = p.pct >= 5 ? `<span style="font-size:9px;font-weight:700;color:#fff;white-space:nowrap;padding:0 3px;text-shadow:0 1px 2px rgba(0,0,0,.4)">${p.symbol}</span>` : '';
      const html = `<strong>${p.symbol}</strong><br>${fmtCurr(p.currentValue)}&nbsp;&nbsp;<span style="opacity:.7">${p.pct.toFixed(1)}%</span>`;
      seg.addEventListener('mouseenter', e => showTip(e, html));
      seg.addEventListener('mousemove',  e => moveTip(e));
      seg.addEventListener('mouseleave', hideTip);
      seg.addEventListener('touchstart', e => { showTip(e, html); e.preventDefault(); }, { passive: false });
      seg.addEventListener('touchmove',  e => moveTip(e));
      seg.addEventListener('touchend',   hideTip);
      bar.appendChild(seg);
    });
    el.innerHTML = '';
    el.appendChild(bar);
  };
})();

// ── Render: sector donut ─────────────────────────────────────────────────────
let sectorDonutInst = null, sectorDrilldown = null;
function renderSectorDonut(model) {
  const el = document.getElementById('sectorDonutChart');
  if (!el) return;
  if (sectorDonutInst) { sectorDonutInst.destroy(); sectorDonutInst = null; }

  const map = {};
  for (const p of model.positions) { const s = p.sector||'Other'; map[s] = (map[s]||0) + p.currentValue; }
  const grandTotal = Object.values(map).reduce((s,v) => s+v, 0);
  const secs = Object.keys(map).sort((a,b) => map[b]-map[a]);

  const drilled = sectorDrilldown;
  let labels, data, colors, drillTotal;
  if (drilled) {
    const stocks = model.positions.filter(p => (p.sector||'Other') === drilled);
    drillTotal = stocks.reduce((s,p) => s + p.currentValue, 0);
    labels = stocks.map(p => p.symbol);
    data   = stocks.map(p => p.currentValue);
    colors = stocks.map(p => colorFor(p.symbol));
  } else {
    drillTotal = grandTotal;
    labels = secs.map(s => t(s));
    data   = secs.map(s => map[s]);
    colors = secs.map(colorFor);
  }

  const centerPlugin = {
    id: 'sectorCenter',
    afterDatasetsDraw(chart) {
      if (!drilled) return;
      const meta = chart.getDatasetMeta(0);
      if (!meta?.data?.length) return;
      const arc = meta.data[0];
      const { ctx } = chart;
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `500 9px ${css('--font-mono')||'monospace'}`;
      ctx.fillStyle = css('--muted');
      ctx.fillText(t(drilled), arc.x, arc.y - 16);
      ctx.font = `600 14px ${css('--font-display')||'serif'}`;
      ctx.fillStyle = css('--ink');
      ctx.fillText(fmtCurr(drillTotal), arc.x, arc.y + 1);
      ctx.font = `400 9px ${css('--font-ui')||'sans-serif'}`;
      ctx.fillStyle = css('--muted'); ctx.globalAlpha = .7;
      ctx.fillText(t('tap_back_hint'), arc.x, arc.y + 17);
      ctx.restore();
    }
  };

  const tooltipFn = drilled
    ? c => ` ${c.label}: ${fmtCurr(c.raw)} (${drillTotal>0?(c.raw/drillTotal*100).toFixed(1):0}% of sector)`
    : c => ` ${c.label}: ${fmtCurr(c.raw)} (${grandTotal>0?(c.raw/grandTotal*100).toFixed(1):0}%)`;

  el.style.cursor = 'pointer';
  sectorDonutInst = new Chart(el.getContext('2d'), {
    type: 'doughnut',
    data: { labels, datasets: donutDataset(data, colors) },
    options: {
      ...donutBaseOptions(tooltipFn),
      layout: { padding: drilled ? 50 : 65 },
      onClick(event, elements, chart) {
        const meta = chart.getDatasetMeta(0);
        if (!meta?.data?.length) return;
        const arc = meta.data[0];
        const dx = event.x - arc.x, dy = event.y - arc.y;
        if (Math.sqrt(dx*dx + dy*dy) < arc.innerRadius) {
          if (sectorDrilldown) {
            sectorDrilldown = null; sectorFilter = 'All';
            renderSectorDonut(currentModel);
            renderCategoryFilters(currentModel); renderSectorFilters(currentModel);
            renderTable(currentModel); renderDonut(currentModel);
          }
          return;
        }
        if (!elements.length || sectorDrilldown) return;
        sectorDrilldown = secs[elements[0].index];
        sectorFilter = sectorDrilldown;
        renderSectorDonut(currentModel);
        renderCategoryFilters(currentModel); renderSectorFilters(currentModel);
        renderTable(currentModel); renderDonut(currentModel);
      }
    },
    plugins: [donutInnerRing, donutShadow, donutOuterLabels, centerPlugin]
  });
}

// ── Render: holdings performance ─────────────────────────────────────────────
let _hpData = [], _hpDivData = [], _hpTab = 'all', _hpShowDollar = false;
let _hpTouchSym = null, _hpTouchStartX = 0, _hpTouchStartY = 0,
    _hpTouchLastX = 0, _hpTouchLastY = 0, _hpTouchMoved = false, _hpTipTimer = null;
const HP_TOUCH_THRESHOLD = 8;

window.setHpTab = function(tab) {
  _hpTab = tab;
  document.querySelectorAll('.hp-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  renderHoldingsPerformance();
};

window.toggleHpMode = function() {
  _hpShowDollar = !_hpShowDollar;
  const btn = document.getElementById('hpModeToggle');
  if (btn) btn.textContent = _hpShowDollar ? '$' : '%';
  renderHoldingsPerformance();
};

function buildHpBaseData() {
  const map = {};
  if (currentModel?.positions) {
    for (const p of currentModel.positions) {
      map[p.symbol] = { name: p.name || p.symbol, unrealizedPnl: p.pnl || 0, realizedPnl: 0, currentValue: p.currentValue || 0, totalCost: p.costBasis || 0 };
    }
  }
  if (pnlData?.length) {
    for (const t of pnlData) {
      if (!map[t.ticker]) map[t.ticker] = { name: t.ticker, unrealizedPnl: 0, realizedPnl: 0, currentValue: 0, totalCost: 0 };
      map[t.ticker].realizedPnl += t.pnl;
    }
  }
  if (txCache?.length) {
    for (const tx of txCache) {
      if (tx.type !== 'Buy') continue;
      if (map[tx.ticker] && !currentModel?.positions.find(p => p.symbol === tx.ticker))
        map[tx.ticker].totalCost += tx.tradeValue || (tx.shares * tx.price) || 0;
    }
  }
  return Object.entries(map)
    .map(([symbol, d]) => {
      const totalPnl = d.unrealizedPnl + d.realizedPnl;
      const pnlPct   = d.totalCost > 0 ? totalPnl / d.totalCost * 100 : 0;
      return { symbol, name: d.name, totalPnl, pnlPct, currentValue: d.currentValue, totalCost: d.totalCost };
    })
    .filter(i => i.totalCost > 0 || i.totalPnl !== 0)
    .sort((a, b) => b.pnlPct - a.pnlPct);
}

function buildHpDivData() {
  if (!txCache?.length) return [];
  const divData = historyCache?.dividends || {};
  const items = [];
  for (const [ticker, events] of Object.entries(divData)) {
    let net = 0;
    for (const [dateStr, amount] of Object.entries(events)) {
      const held = sharesHeldAt(txCache, ticker, dateStr);
      if (held > 0) net += held * amount * (1 - withholdingRate(ticker));
    }
    if (net > 0) {
      const pos = currentModel?.positions.find(p => p.symbol === ticker);
      items.push({ symbol: ticker, name: pos?.name || ticker, dividendNet: net, currentValue: pos?.currentValue || 0 });
    }
  }
  return items.sort((a, b) => b.dividendNet - a.dividendNet);
}

function hpRow(item, barW, barColor, rightLabel, sym) {
  return `<div class="hp-row"
    onmouseenter="showHpTip(event,'${sym}')"
    onmousemove="moveHpTip(event)"
    onmouseleave="hideHpTip()"
    ontouchstart="hpTouchStart(event,'${sym}')"
    ontouchmove="hpTouchMove(event)"
    ontouchend="hpTouchEnd()">
    <div class="hp-sym">${logoCell(sym, colorFor(sym))}<span class="hp-label">${sym}</span></div>
    <div class="hp-bar-wrap">
      <div class="hp-bar-fill" style="width:${barW};background:${barColor}"></div>
      <div class="hp-ref" style="left:33.33%"></div>
      <div class="hp-ref" style="left:66.66%"></div>
    </div>
    <div class="hp-pct" style="color:${barColor}">${rightLabel}</div>
  </div>`;
}

function renderHoldingsPerformance() {
  const el = document.getElementById('holdingsPerf');
  if (!el) return;

  _hpData    = buildHpBaseData();
  _hpDivData = buildHpDivData();

  // ── Dividends tab ──────────────────────────────────────────────────────────
  if (_hpTab === 'dividends') {
    if (!_hpDivData.length) {
      el.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center;padding:16px 0">${t('no_div_data')}</div>`;
      return;
    }
    const maxDiv = Math.max(..._hpDivData.map(i => i.dividendNet), 0.01);
    const axisVals = [0, maxDiv / 3, (maxDiv / 3) * 2, maxDiv];
    const axisHtml = `<div class="hp-axis">${axisVals.map((v, i) => `<span class="hp-axis-label" style="left:${(i/3*100).toFixed(1)}%">${v.toFixed(2)}</span>`).join('')}</div>`;
    el.innerHTML = _hpDivData.map(item => {
      const barW = (item.dividendNet / maxDiv * 100).toFixed(2) + '%';
      return hpRow(item, barW, 'var(--gain)', '+' + item.dividendNet.toFixed(2), item.symbol);
    }).join('') + axisHtml;
    return;
  }

  // ── All / Gainers / Losers tabs ────────────────────────────────────────────
  let items = _hpData;
  if (_hpShowDollar) {
    if (_hpTab === 'gainers') items = _hpData.filter(i => i.totalPnl > 0).sort((a, b) => b.totalPnl - a.totalPnl);
    else if (_hpTab === 'losers') items = _hpData.filter(i => i.totalPnl < 0).sort((a, b) => a.totalPnl - b.totalPnl);
    else items = [..._hpData].sort((a, b) => b.totalPnl - a.totalPnl);
  } else {
    if (_hpTab === 'gainers') items = _hpData.filter(i => i.pnlPct > 0);
    else if (_hpTab === 'losers') items = _hpData.filter(i => i.pnlPct < 0).sort((a, b) => a.pnlPct - b.pnlPct);
  }

  if (!items.length) {
    el.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center;padding:16px 0">No ${_hpTab} found</div>`;
    return;
  }
  if (_hpShowDollar) {
    const maxAbs = Math.max(...items.map(i => Math.abs(i.totalPnl)), 1);
    el.innerHTML = items.map(item => {
      const isGain   = item.totalPnl >= 0;
      const barW     = (Math.abs(item.totalPnl) / maxAbs * 100).toFixed(2) + '%';
      const barColor = isGain ? 'var(--gain)' : 'var(--loss)';
      const sign     = isGain ? '+' : '';
      return hpRow(item, barW, barColor, sign + '$' + Math.abs(item.totalPnl).toLocaleString('en-US', {maximumFractionDigits:2}), item.symbol);
    }).join('');
  } else {
    const maxPct = Math.max(...items.map(i => Math.abs(i.pnlPct)), 1);
    el.innerHTML = items.map(item => {
      const isGain   = item.pnlPct >= 0;
      const barW     = (Math.abs(item.pnlPct) / maxPct * 100).toFixed(2) + '%';
      const barColor = isGain ? 'var(--gain)' : 'var(--loss)';
      return hpRow(item, barW, barColor, (isGain ? '+' : '') + item.pnlPct.toFixed(2) + '%', item.symbol);
    }).join('');
  }
}

window.showHpTip = function(e, sym) {
  // Check which dataset to look in
  const isDivTab = _hpTab === 'dividends';
  const item = isDivTab ? _hpDivData.find(i => i.symbol === sym) : _hpData.find(i => i.symbol === sym);
  if (!item) return;
  let tip = document.getElementById('hpTip');
  if (!tip) { tip = document.createElement('div'); tip.id = 'hpTip'; document.body.appendChild(tip); }

  let rows;
  if (isDivTab) {
    rows = `
      <span style="color:rgba(250,243,224,.6)">Total dividend</span>
      <span style="color:var(--gain);font-weight:700;text-align:right">+${item.dividendNet.toFixed(2)} USD</span>
      <span style="color:rgba(250,243,224,.6)">Total value</span>
      <span style="font-weight:600;text-align:right">${item.currentValue > 0 ? fmtCurr(item.currentValue) : '—'}</span>`;
  } else {
    const pc = item.pnlPct  >= 0 ? 'var(--gain)' : 'var(--loss)';
    const vc = item.totalPnl >= 0 ? 'var(--gain)' : 'var(--loss)';
    rows = `
      <span style="color:rgba(250,243,224,.6)">Total gain %</span>
      <span style="color:${pc};font-weight:700;text-align:right">${item.pnlPct>=0?'+':''}${item.pnlPct.toFixed(2)}%</span>
      <span style="color:rgba(250,243,224,.6)">Total gain</span>
      <span style="color:${vc};font-weight:700;text-align:right">${item.totalPnl>=0?'+':''}${fmtCurr(item.totalPnl)} USD</span>
      <span style="color:rgba(250,243,224,.6)">Total value</span>
      <span style="font-weight:600;text-align:right">${item.currentValue > 0 ? fmtCurr(item.currentValue) : '—'}</span>`;
  }
  tip.innerHTML = `
    <div style="font-weight:700;font-size:12px;margin-bottom:8px;color:#faf3e0">${item.name}</div>
    <div style="display:grid;grid-template-columns:auto auto;gap:4px 20px">${rows}</div>`;
  tip.style.opacity = '1';
  moveHpTip(e);
};
window.moveHpTip = function(e) {
  const tip = document.getElementById('hpTip');
  if (!tip) return;
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  const y = e.touches ? e.touches[0].clientY : e.clientY;
  tip.style.left = Math.min(x + 14, window.innerWidth  - tip.offsetWidth  - 8) + 'px';
  tip.style.top  = (y - tip.offsetHeight - 12 < 0 ? y + 16 : y - tip.offsetHeight - 12) + 'px';
};
window.hideHpTip = function() {
  const tip = document.getElementById('hpTip'); if (tip) tip.style.opacity = '0';
  clearTimeout(_hpTipTimer);
};
window.hpTouchStart = function(e, sym) {
  _hpTouchSym = sym;
  _hpTouchStartX = _hpTouchLastX = e.touches[0].clientX;
  _hpTouchStartY = _hpTouchLastY = e.touches[0].clientY;
  _hpTouchMoved = false;
};
window.hpTouchMove = function(e) {
  if (!_hpTouchSym) return;
  _hpTouchLastX = e.touches[0].clientX;
  _hpTouchLastY = e.touches[0].clientY;
  if (Math.abs(_hpTouchLastX - _hpTouchStartX) > HP_TOUCH_THRESHOLD ||
      Math.abs(_hpTouchLastY - _hpTouchStartY) > HP_TOUCH_THRESHOLD) {
    _hpTouchMoved = true;
    hideHpTip();
  }
};
window.hpTouchEnd = function() {
  if (!_hpTouchMoved && _hpTouchSym) {
    showHpTip({ clientX: _hpTouchLastX, clientY: _hpTouchLastY }, _hpTouchSym);
    clearTimeout(_hpTipTimer);
    _hpTipTimer = setTimeout(hideHpTip, 2500);
  }
  _hpTouchSym = null;
  _hpTouchMoved = false;
};

// ── Render: plans panel ───────────────────────────────────────────────────────
const planExpandCharts = {};
function destroyPlanExpandCharts() {
  Object.values(planExpandCharts).forEach(arr => arr.forEach(c => { try { c.destroy(); } catch(_) {} }));
  Object.keys(planExpandCharts).forEach(k => delete planExpandCharts[k]);
}

function renderPlansPanel() {
  const el = document.getElementById('plansPanel');
  if (!el) return;
  destroyPlanExpandCharts();
  const rawPlans = Object.entries(planCache)
    .filter(([,d]) => d.tranches?.length || d.sl || d.note || d.trimTranches?.some(t => t.price > 0));
  if (!rawPlans.length) { el.innerHTML = `<div style="color:var(--muted);font-size:12px">${t('no_plans_saved')}</div>`; return; }

  // ── Score each plan for alert urgency ────────────────────────────────────
  const scored = rawPlans.map(([sym, d]) => {
    const pos = currentModel?.positions.find(p => p.symbol === sym)
             || (currentModel?.sgovPos?.symbol === sym ? currentModel.sgovPos : null)
             || currentModel?.watchlist.find(w => w.symbol === sym);
    const price = pos?.price ?? null;
    const { tranches=[], sl, note, trimTranches=[] } = d;
    const realTps = trimTranches.filter(t => t.price > 0);

    // SL status
    let slStatus = 'none';
    if (sl && price != null) {
      const pct = (price - sl) / sl * 100;
      slStatus = pct <= 0 ? 'hit' : pct <= 5 ? 'near' : 'none';
    }
    // Per-tranche status (hit = price ≤ entry, near = within 3%)
    const tStatus = tranches.map(t => {
      if (!t.price || price == null) return 'none';
      const pct = (price - t.price) / t.price * 100;
      return pct <= 0 ? 'hit' : pct <= 3 ? 'near' : 'above';
    });
    // Per-TP status (hit = price ≥ TP, near = within 3% below)
    const tpStatus = realTps.map(t => {
      if (!t.price || price == null) return 'none';
      const pct = (price - t.price) / t.price * 100;
      return pct >= 0 ? 'hit' : pct >= -3 ? 'near' : 'below';
    });

    const urgency = slStatus === 'hit' ? 5
                  : slStatus === 'near' ? 4
                  : tpStatus.some(s => s === 'hit')  ? 3
                  : tpStatus.some(s => s === 'near') ? 2
                  : tStatus.some(s => s === 'hit')   ? 1
                  : 0;

    // "near" tranche — not urgent enough for Alerts but should top "All Plans"
    const hasNearT = tStatus.some(s => s === 'near');
    // Secondary sort key: how complete the plan is (SL > TP > T with price > note)
    const richness = (sl ? 8 : 0) + (realTps.length * 2) + (tranches.filter(t => t.price).length) + (note ? 1 : 0);
    return { sym, d, pos, price, tranches, sl, note, realTps, slStatus, tStatus, tpStatus, urgency, hasNearT, richness };
  }).sort((a, b) =>
    b.urgency - a.urgency ||
    (b.hasNearT ? 1 : 0) - (a.hasNearT ? 1 : 0) ||
    b.richness - a.richness ||
    a.sym.localeCompare(b.sym)
  );

  // ── Chip builders ────────────────────────────────────────────────────────
  const chip = (label, status, hitBg, hitFg, nearBg, nearFg, suffix='') => {
    const bg = status==='hit'  ? hitBg  : status==='near' ? nearBg : 'var(--track)';
    const fg = status==='hit'  ? hitFg  : status==='near' ? nearFg : 'var(--muted)';
    const badge = status==='hit' ? suffix : status==='near' ? ' ≈' : '';
    return `<span style="padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;background:${bg};color:${fg};white-space:nowrap">${label}${badge}</span>`;
  };

  const triggeredCount = scored.filter(s => s.urgency > 0).length;
  el.innerHTML = scored.map(({ sym, d, pos, price, tranches, sl, note, realTps, slStatus, tStatus, tpStatus, urgency }, _idx) => {
    const sectionHeader =
      _idx === 0 && triggeredCount > 0
        ? `<div style="font-size:9px;font-weight:800;color:var(--loss);text-transform:uppercase;letter-spacing:.9px;padding:2px 0 6px;display:flex;align-items:center;gap:5px">🔔 Alerts (${triggeredCount})</div>`
        : _idx === triggeredCount && triggeredCount > 0 && triggeredCount < scored.length
        ? `<div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:10px 0 5px;border-top:1px dashed var(--line-soft)">All Plans</div>`
        : '';
    const color = colorFor(sym);
    const td      = pos ? getTargetDollar(pos, currentModel) : 0;
    const currPct = pos ? getCurrentPct(pos, currentModel)   : 0;

    // Row accent border based on top alert
    const accentBorder = slStatus==='hit'  ? '3px solid var(--loss)'
                       : slStatus==='near' ? '3px solid var(--honey)'
                       : tpStatus.some(s=>s==='hit')  ? '3px solid var(--gain)'
                       : tStatus.some(s=>s==='hit')   ? '3px solid var(--peri)'
                       : 'none';
    const rowBg = slStatus==='hit'               ? 'rgba(187,77,60,.05)'
                : slStatus==='near'              ? 'rgba(199,144,56,.04)'
                : tpStatus.some(s=>s==='hit')    ? 'rgba(107,142,90,.05)'
                : tStatus.some(s=>s==='hit')     ? 'rgba(107,126,184,.04)'
                : 'transparent';

    // Price + day change line
    const dayPct  = pos?.dayChangePct;
    const priceEl = price != null
      ? `<span style="font-size:10px;color:var(--muted)">${fmtCurr(price)}</span>`
        + (dayPct != null ? `<span style="font-size:9px;font-weight:700;color:var(${dayPct>=0?'--gain':'--loss'})">${dayPct>=0?'+':''}${dayPct.toFixed(2)}%</span>` : '')
      : '';

    // Tranche chips — only tranches that have a price
    const tChips = tranches.map((t, i) => {
      if (!t.price) return '';
      return chip(`T${i+1} ${fmtCurr(t.price)}`, tStatus[i],
        'rgba(107,126,184,.25)', 'var(--peri)',
        'rgba(199,144,56,.2)',   'var(--honey)', ' ↓');
    }).join('');

    // SL chip
    const slChip = sl
      ? chip(`SL ${fmtCurr(sl)}`, slStatus,
          'rgba(187,77,60,.22)', 'var(--loss)',
          'rgba(199,144,56,.2)', 'var(--honey)', ' 🔴')
      : '';

    // TP chips
    const tpChips = realTps.map((t, i) =>
      chip(`TP${i+1} ${fmtCurr(t.price)}`, tpStatus[i],
        'rgba(107,142,90,.25)', 'var(--gain)',
        'rgba(199,144,56,.2)',  'var(--honey)', ' ✓')
    ).join('');

    const hasChips = tChips || slChip || tpChips;

    // Expand section (unchanged)
    const trancheRows = tranches.map((t, i) => {
      const dollar = getTrancheDollar(i, tranches, currPct, td);
      const triggered = tStatus[i] === 'hit' || tStatus[i] === 'near';
      return `<tr style="border-bottom:1px solid var(--line-soft)${triggered?';background:rgba(107,126,184,.06)':''}">
        <td style="padding:5px 8px;font-weight:700;color:${trancheColor(i)}">T${i+1}</td>
        <td style="padding:5px 8px;text-align:right;${tStatus[i]==='hit'?'color:var(--peri);font-weight:700':''}">${t.price ? fmtCurr(t.price) : '—'}</td>
        <td style="padding:5px 8px;text-align:right">${(t.cumPct??0).toFixed(1)}%</td>
        <td style="padding:5px 8px;text-align:right">${dollar > 0 ? fmtCurr(dollar) : '—'}</td>
      </tr>`;
    }).join('');

    return sectionHeader + `<div style="border-bottom:1px solid var(--line-soft);border-left:${accentBorder};background:${rowBg};border-radius:${accentBorder!=='none'?'0 var(--radius-sm) var(--radius-sm) 0':'0'};margin-bottom:1px">
      <div onclick="togglePlanExpand('${sym}')" style="display:flex;align-items:flex-start;gap:8px;padding:8px 8px 6px ${accentBorder!=='none'?'10':'8'}px;cursor:pointer">
        <div style="flex-shrink:0;margin-top:1px">${logoCell(sym, color)}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px">
            <span style="font-weight:700;font-size:13px">${sym}</span>
            ${priceEl}
            ${urgency >= 3 && tpStatus.some(s=>s==='hit') ? `<span style="font-size:9px;font-weight:800;color:var(--gain);background:rgba(107,142,90,.15);padding:1px 5px;border-radius:3px">${t('tp_hit_badge')}</span>` : ''}
            ${slStatus==='hit' ? `<span style="font-size:9px;font-weight:800;color:var(--loss);background:rgba(187,77,60,.15);padding:1px 5px;border-radius:3px">${t('sl_hit_badge')}</span>` : ''}
          </div>
          ${note ? `<div style="font-size:10px;color:var(--muted);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📝 ${note}</div>` : ''}
          ${hasChips ? `<div style="display:flex;flex-wrap:wrap;gap:3px">${tChips}${slChip}${tpChips}</div>` : ''}
        </div>
        <button class="plan-btn saved" onclick="event.stopPropagation();openActionModal('${sym}')" title="${t('actions_tooltip')}" style="flex-shrink:0;margin-top:2px">${ACTION_ICON}</button>
      </div>
      <div id="planExpand_${sym}" style="display:none;padding:0 8px 12px 10px">
        <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:11px;margin-bottom:8px;padding:8px 10px;background:var(--track);border-radius:var(--radius-sm)">
          ${pos?.price  != null  ? `<span style="color:var(--muted)">Last <strong style="color:var(--ink)">${fmtCurr(pos.price)}</strong></span>` : ''}
          ${(pos?.qty||0) > 0    ? `<span style="color:var(--muted)">Qty <strong style="color:var(--ink)">${pos.qty.toFixed(4)}</strong></span>` : ''}
          ${(pos?.avgPrice||0)>0 ? `<span style="color:var(--muted)">Avg <strong style="color:var(--ink)">${fmtCurr(pos.avgPrice)}</strong></span>` : ''}
          ${pos?.sector          ? `<span style="color:var(--muted)">${t('sector_label')} <strong style="color:var(--ink)">${t(pos.sector)}</strong></span>` : ''}
          ${pos?.category        ? `<span style="color:var(--muted)">${t('category_label')} <strong style="color:var(--ink)">${t(pos.category)}</strong></span>` : ''}
          ${sl                   ? `<span style="color:var(--muted)">SL <strong style="color:var(${slStatus==='hit'?'--loss':slStatus==='near'?'--honey':'--loss'})">${fmtCurr(sl)}${slStatus==='hit'?' 🔴':slStatus==='near'?' ⚠':''}</strong></span>` : ''}
        </div>
        ${tranches.length ? `<table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px">
          <thead><tr style="border-bottom:1px solid var(--line)">
            <th style="text-align:left;padding:3px 8px;color:var(--muted);font-weight:500">#</th>
            <th style="text-align:right;padding:3px 8px;color:var(--muted);font-weight:500">Entry</th>
            <th style="text-align:right;padding:3px 8px;color:var(--muted);font-weight:500">% of Target</th>
            <th style="text-align:right;padding:3px 8px;color:var(--muted);font-weight:500">Amount</th>
          </tr></thead>
          <tbody>${trancheRows}</tbody>
        </table>` : ''}
        ${realTps.length ? (() => {
          const pos2 = currentModel?.positions.find(p => p.symbol === sym);
          const avg  = pos2?.avgPrice || 0;
          const inv  = currentModel?.investable || 0;
          const tgt  = (pos2?.target || 0) * inv;
          const TPCOLORS = ['#6b8e5a','#c79038','#6b7eb8'];
          let qtyRem = pos2?.qty || 0;
          return `<table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px">
          <thead><tr style="border-bottom:1px solid var(--line)">
            <th style="text-align:left;padding:3px 8px;color:var(--muted);font-weight:500">#</th>
            <th style="text-align:right;padding:3px 8px;color:var(--muted);font-weight:500">Exit Price</th>
            <th style="text-align:right;padding:3px 8px;color:var(--muted);font-weight:500">% After</th>
            <th style="text-align:right;padding:3px 8px;color:var(--muted);font-weight:500">Est. P&L</th>
          </tr></thead>
          <tbody>${realTps.map((t, i) => {
            const sharesAfter = (t.price > 0 && t.pct > 0 && tgt > 0) ? (t.pct / 100 * tgt) / t.price : qtyRem;
            const sharesSold = Math.max(0, qtyRem - sharesAfter);
            const pnl = sharesSold > 0 && avg > 0 ? (t.price - avg) * sharesSold : null;
            qtyRem = Math.max(0, sharesAfter);
            const ts = tpStatus[i];
            return `<tr style="border-bottom:1px solid var(--line-soft)${ts==='hit'?';background:rgba(107,142,90,.07)':ts==='near'?';background:rgba(199,144,56,.06)':''}">
              <td style="padding:5px 8px;font-weight:700;color:${TPCOLORS[i % 3]}">TP${i+1}${ts==='hit'?' ✓':ts==='near'?' ≈':''}</td>
              <td style="padding:5px 8px;text-align:right;${ts==='hit'?'color:var(--gain);font-weight:700':''}">${fmtCurr(t.price)}</td>
              <td style="padding:5px 8px;text-align:right">${(t.pct||0).toFixed(1)}%</td>
              <td style="padding:5px 8px;text-align:right;color:var(${pnl != null && pnl >= 0 ? '--gain' : '--muted'})">${pnl != null ? (pnl >= 0 ? '+' : '') + fmtCurr(pnl) : '—'}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>`;
        })() : ''}
        <div class="action-charts-grid" style="margin-bottom:0">
          <div style="background:var(--track);border-radius:var(--radius-sm);padding:8px">
            <div style="font-size:9px;color:var(--muted);text-align:center;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">${t('all_stocks_label')}</div>
            <div style="position:relative;height:110px"><canvas id="planC1_${sym}"></canvas></div>
          </div>
          <div style="background:var(--track);border-radius:var(--radius-sm);padding:8px">
            <div style="font-size:9px;color:var(--muted);text-align:center;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">${pos?.category||'Category'}</div>
            <div style="position:relative;height:110px"><canvas id="planC2_${sym}"></canvas></div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

window.togglePlanExpand = function(sym) {
  const el = document.getElementById(`planExpand_${sym}`);
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  document.querySelectorAll('[id^="planExpand_"]').forEach(e => { e.style.display = 'none'; });
  destroyPlanExpandCharts();
  if (!isOpen) { el.style.display = 'block'; renderPlanExpandCharts(sym); }
};

function renderPlanExpandCharts(sym) {
  if (!currentModel) return;
  const pos = currentModel.positions.find(p => p.symbol === sym)
           || (currentModel.sgovPos?.symbol === sym ? currentModel.sgovPos : null)
           || currentModel.watchlist.find(w => w.symbol === sym);
  const positions = currentModel.positions;
  const category  = pos?.category || 'Other';
  const catPos    = positions.filter(p => (p.category||'Other') === category);

  const mkChart = (id, items) => {
    const el = document.getElementById(id);
    if (!el || !items.length) return null;
    const total  = items.reduce((s, p) => s + (p.currentValue||0), 0);
    const labels = items.map(p => p.symbol);
    const data   = items.map(p => p.currentValue || 0);
    const bg     = items.map(p => p.symbol === sym ? colorFor(p.symbol) : colorFor(p.symbol) + '55');
    const border = items.map(p => p.symbol === sym ? '#fff' : 'transparent');
    const bw     = items.map(p => p.symbol === sym ? 2 : 0);
    return new Chart(el.getContext('2d'), {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: bg, borderColor: border, borderWidth: bw, hoverBorderWidth: 0 }] },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '65%', animation: false,
        plugins: { legend: { display: false },
          tooltip: { callbacks: { label: c => ` ${c.label}: ${total>0?(c.raw/total*100).toFixed(1):0}%` },
            backgroundColor: css('--tooltip-bg'), bodyColor: '#faf3e0', padding: 8, cornerRadius: 8 }}
      }
    });
  };

  const c1 = mkChart(`planC1_${sym}`, positions);
  const c2 = mkChart(`planC2_${sym}`, catPos.length ? catPos : positions);
  planExpandCharts[sym] = [c1, c2].filter(Boolean);
}

// ── Render: category donut ────────────────────────────────────────────────────
let catDonutInst = null, catDrilldown = null;
function renderCategoryDonut(model) {
  const el = document.getElementById('catDonutChart');
  if (!el) return;
  if (catDonutInst) { catDonutInst.destroy(); catDonutInst = null; }

  const map = {};
  for (const p of model.positions) { const cat = p.category||'Other'; map[cat] = (map[cat]||0) + p.currentValue; }
  const grandTotal = Object.values(map).reduce((s,v) => s+v, 0);
  const cats = Object.keys(map).sort((a,b) => map[b]-map[a]);
  const catColors = { Big: '#6b7eb8', Medium: '#c79038', Growth: '#6b8e5a', Other: '#8a7458' };

  const legendEl = document.getElementById('catDonutLegend');
  if (legendEl) legendEl.innerHTML = '';

  const drilled = catDrilldown;
  let labels, data, colors, drillTotal;
  if (drilled) {
    const stocks = model.positions.filter(p => (p.category||'Other') === drilled);
    drillTotal = stocks.reduce((s,p) => s + p.currentValue, 0);
    labels = stocks.map(p => p.symbol);
    data   = stocks.map(p => p.currentValue);
    colors = stocks.map(p => colorFor(p.symbol));
  } else {
    drillTotal = grandTotal;
    labels = cats.map(c => t(c));
    data   = cats.map(c => map[c]);
    colors = cats.map(c => catColors[c] || colorFor(c));
  }

  const centerPlugin = {
    id: 'catCenter',
    afterDatasetsDraw(chart) {
      if (!drilled) return;
      const meta = chart.getDatasetMeta(0);
      if (!meta?.data?.length) return;
      const arc = meta.data[0];
      const { ctx } = chart;
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `500 9px ${css('--font-mono')||'monospace'}`;
      ctx.fillStyle = css('--muted');
      ctx.fillText(t(drilled), arc.x, arc.y - 16);
      ctx.font = `600 14px ${css('--font-display')||'serif'}`;
      ctx.fillStyle = css('--ink');
      ctx.fillText(fmtCurr(drillTotal), arc.x, arc.y + 1);
      ctx.font = `400 9px ${css('--font-ui')||'sans-serif'}`;
      ctx.fillStyle = css('--muted'); ctx.globalAlpha = .7;
      ctx.fillText(t('tap_back_hint'), arc.x, arc.y + 17);
      ctx.restore();
    }
  };

  const tooltipFn = drilled
    ? c => ` ${c.label}: ${fmtCurr(c.raw)} (${drillTotal>0?(c.raw/drillTotal*100).toFixed(1):0}% of category)`
    : c => ` ${c.label}: ${fmtCurr(c.raw)} (${grandTotal>0?(c.raw/grandTotal*100).toFixed(1):0}%)`;

  el.style.cursor = 'pointer';
  catDonutInst = new Chart(el.getContext('2d'), {
    type: 'doughnut',
    data: { labels, datasets: donutDataset(data, colors) },
    options: {
      ...donutBaseOptions(tooltipFn),
      layout: { padding: 50 },
      onClick(event, elements, chart) {
        const meta = chart.getDatasetMeta(0);
        if (!meta?.data?.length) return;
        const arc = meta.data[0];
        const dx = event.x - arc.x, dy = event.y - arc.y;
        if (Math.sqrt(dx*dx + dy*dy) < arc.innerRadius) {
          if (catDrilldown) {
            catDrilldown = null; categoryFilter = 'All';
            renderCategoryDonut(currentModel);
            renderCategoryFilters(currentModel); renderSectorFilters(currentModel);
            renderTable(currentModel); renderDonut(currentModel);
          }
          return;
        }
        if (!elements.length || catDrilldown) return;
        catDrilldown = cats[elements[0].index];
        categoryFilter = catDrilldown;
        renderCategoryDonut(currentModel);
        renderCategoryFilters(currentModel); renderSectorFilters(currentModel);
        renderTable(currentModel); renderDonut(currentModel);
      }
    },
    plugins: [donutInnerRing, donutShadow, donutOuterLabels, centerPlugin]
  });
}

function renderDividendBreakdown(txs) {
  const el = document.getElementById('divBreakdown');
  if (!el) return;
  const divData = historyCache?.dividends || {};
  if (!Object.keys(divData).length) {
    el.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center;padding:12px 0">${t('no_div_data')}</div>`;
    return;
  }
  const rows = [];
  for (const [ticker, events] of Object.entries(divData)) {
    let gross = 0; let payments = 0;
    for (const [dateStr, amount] of Object.entries(events)) {
      const held = sharesHeldAt(txs, ticker, dateStr);
      if (held <= 0) continue;
      gross += held * amount;
      payments++;
    }
    if (gross <= 0) continue;

    const net  = gross * (1 - rate);

  if (!rows.length) { el.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center;padding:12px 0">${t('no_div_received')}</div>`; return; }

  const color = colorFor;
  el.innerHTML = `
    <table style="width:100%;border-collapse:collapse;font-size:11px">
      <thead><tr style="color:var(--muted);font-weight:500">
        <th style="text-align:left;padding:4px 6px;border-bottom:1px solid var(--line)">${t('ticker_label')}</th>
        <th style="text-align:right;padding:4px 6px;border-bottom:1px solid var(--line)">${t('pmts_label')}</th>
        <th style="text-align:right;padding:4px 6px;border-bottom:1px solid var(--line)">${t('gross')}</th>
        <th style="text-align:right;padding:4px 6px;border-bottom:1px solid var(--line)">${t('tax_label')}</th>
        <th style="text-align:right;padding:4px 6px;border-bottom:1px solid var(--line)">${t('net_label')}</th>
      </tr></thead>
      <tbody>
        ${rows.map(r => `<tr style="border-bottom:1px solid var(--line)">
          <td style="padding:5px 6px">
            <div style="display:flex;align-items:center;gap:5px">
              ${logoCell(r.ticker, colorFor(r.ticker))}
              <span style="font-weight:600">${r.ticker}</span>
            </div>
          </td>
          <td style="text-align:right;padding:5px 6px;color:var(--muted)">${r.payments}</td>
          <td style="text-align:right;padding:5px 6px;color:var(--muted)">${fmtCurr(r.gross)}</td>

          <td style="text-align:right;padding:5px 6px;font-weight:600;color:var(--gain)">${fmtCurr(r.net)}</td>
        </tr>`).join('')}
        <tr style="font-weight:700;background:var(--track)">
          <td colspan="2" style="padding:5px 6px">${t('Total')}</td>
          <td style="text-align:right;padding:5px 6px;color:var(--muted)">${fmtCurr(totalGross)}</td>

// ── Render: calendar ─────────────────────────────────────────────────────────
async function readCalendarSheet() {
  try {
    const res  = await fetch(CALENDAR_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(text.indexOf('(') + 1, text.lastIndexOf(')')));
    const table = json.table;
    if (!table?.rows?.length) return null;
    const parseD = raw => {
      if (!raw) return null;
      if (typeof raw === 'string' && raw.startsWith('Date(')) {
        const pts = raw.slice(5,-1).split(',').map(Number);
        return new Date(Date.UTC(pts[0],pts[1],pts[2])).toISOString().slice(0,10);
      }
      const m = typeof raw === 'string' && raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
      return null;
    };
    const events = [];
    for (const row of table.rows) {
      const c = row.c || [];
      const symbol  = c[0]?.v || null;
      if (!symbol || symbol === 'Symbol') continue;  // skip header row
      const timeStr = c[4]?.v || null;
      const earningsDate = parseD(c[3]?.v);
      const exDivDate    = parseD(c[5]?.v);
      if (earningsDate) {
        const time = timeStr?.toLowerCase().includes('before') ? t('before_market_open') : t('after_market_close');
        events.push({ symbol, type: 'Earnings', date: earningsDate, time });
      }
      if (exDivDate) {
        events.push({ symbol, type: 'ExDiv', date: exDivDate });
      }
    }
    return events;
  } catch(e) { console.error('readCalendarSheet:', e); return null; }
}

function renderCalendarFromEvents(events) {
  const el = document.getElementById('calendarPanel');
  if (!el) return;
  const today     = new Date().toLocaleDateString('en-CA', {timeZone:'Asia/Bangkok'});
  const tomorrow  = new Date(Date.now() + 86400000).toLocaleDateString('en-CA', {timeZone:'Asia/Bangkok'});
  const yesterday = new Date(Date.now() - 86400000).toLocaleDateString('en-CA', {timeZone:'Asia/Bangkok'});
  const cap       = new Date(Date.now() + 30*86400000).toLocaleDateString('en-CA', {timeZone:'Asia/Bangkok'});
  // AMC events happen after midnight Bangkok time → shift +1 day for Bangkok display
  const bkkDate = e => {
    if (e.type === 'Earnings' && e.time === t('after_market_close')) {
      const d = new Date(e.date + 'T12:00:00Z');
      d.setUTCDate(d.getUTCDate() + 1);
      return d.toISOString().slice(0, 10);
    }
    return e.date;
  };
  const upcoming = events
    .map(e => ({ ...e, bkk: bkkDate(e) }))
    .filter(e => e.bkk >= yesterday && e.bkk <= cap)
    .sort((a, b) => a.bkk.localeCompare(b.bkk));
  if (!upcoming.length) {
    el.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center;padding:8px 0">${t('no_upcoming_events')}</div>`;
    return;
  }
  const dateLabel = d => d === today ? t('today_label') : d === tomorrow ? t('tomorrow_label') : fmtDate(d);
  el.innerHTML = upcoming.map(e => {
    const isE  = e.type === 'Earnings';
    const badge = isE
      ? `<span style="padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;background:rgba(138,90,126,.15);color:#8a5a7e;white-space:nowrap">${t('earnings_badge')}</span>`
      : `<span style="padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;background:rgba(107,142,90,.15);color:#6b8e5a;white-space:nowrap">${t('exdiv_badge')}</span>`;
    const subLabel = isE && e.time
      ? `${dateLabel(e.bkk)} · ${e.time}`
      : dateLabel(e.bkk);
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);gap:8px">
      <div style="display:flex;align-items:center;gap:7px;min-width:0">
        ${logoCell(e.symbol, colorFor(e.symbol))}
        <div style="min-width:0">
          <div style="font-weight:600;font-size:12px">${e.symbol}</div>
          <div style="font-size:10px;color:var(--muted)">${subLabel}</div>
        </div>
      </div>${badge}
    </div>`;
  }).join('');
}

// ── Market clock ──────────────────────────────────────────────────────────────
let _clockTimer = null;
function drawClock() {
  const canvas = document.getElementById('marketClock');
  if (!canvas) { clearInterval(_clockTimer); _clockTimer = null; return; }
  const ctx = canvas.getContext('2d');
  const sz = 56, dpr = window.devicePixelRatio || 1;
  if (canvas.width !== sz * dpr) {
    canvas.width = sz * dpr; canvas.height = sz * dpr;
    canvas.style.width = sz + 'px'; canvas.style.height = sz + 'px';
    ctx.scale(dpr, dpr);
  }
  const cx = sz/2, cy = sz/2, R = sz/2 - 2;

  const now = new Date();
  // Clock hands: Bangkok time (UTC+7)
  const bkk = new Date(now.toLocaleString('en-US', {timeZone:'Asia/Bangkok'}));
  const h = bkk.getHours(), m = bkk.getMinutes(), s = bkk.getSeconds();
  // Market status: US Eastern time
  const et       = new Date(now.toLocaleString('en-US', {timeZone:'America/New_York'}));
  const etMin    = et.getHours() * 60 + et.getMinutes();
  const totalMin = etMin;
  const isWeekend = et.getDay() === 0 || et.getDay() === 6;

  let status, statusColor;
  if (isWeekend || etMin < 240 || etMin >= 1200) {
    status = isWeekend ? t('weekend_status') : t('closed_status'); statusColor = '#8a7458';
  } else if (etMin < 570) {
    status = t('pre_market_status'); statusColor = '#c79038';
  } else if (etMin < 960) {
    status = t('market_open_status'); statusColor = '#6b8e5a';
  } else {
    status = t('after_hours_status'); statusColor = '#6b7eb8';
  }

  const stEl = document.getElementById('marketStatusText');
  if (stEl) { stEl.textContent = status; stEl.style.color = statusColor; }
  const etEl = document.getElementById('marketClockET');
  if (etEl) {
    const wd  = bkk.toLocaleDateString('en-US', { weekday: 'short' });
    const dd  = String(bkk.getDate()).padStart(2, '0');
    const mon = bkk.toLocaleDateString('en-US', { month: 'short' });
    const yr  = String(bkk.getFullYear() % 100).padStart(2, '0');
    etEl.textContent = `${wd}. ${dd} ${mon} ${yr}`;
  }

  const bgC   = css('--card')  || '#161b22';
  const inkC  = css('--ink')   || '#e6edf3';
  const mutC  = css('--muted') || '#8b949e';

  ctx.clearRect(0, 0, sz, sz);
  ctx.beginPath(); ctx.arc(cx,cy,R,0,2*Math.PI); ctx.fillStyle = bgC; ctx.fill();

  // Zone arc sectors (all zones faint, active brighter)
  // Angles use raw minutes so 12h wrapping works correctly via canvas modulo
  const tA = min => (min/720)*2*Math.PI - Math.PI/2;
  const zones = [
    {s:240,  e:570,  base:'rgba(199,144,56,0.12)',  hi:'rgba(199,144,56,0.28)'},
    {s:570,  e:960,  base:'rgba(107,142,90,0.12)',   hi:'rgba(107,142,90,0.28)'},
    {s:960,  e:1200, base:'rgba(107,126,184,0.12)',  hi:'rgba(107,126,184,0.28)'},
  ];
  const activeIdx = totalMin<570 ? 0 : totalMin<960 ? 1 : 2;
  zones.forEach((z,i) => {
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,R-2,tA(z.s),tA(z.e),false);
    ctx.closePath();
    ctx.fillStyle = (!isWeekend && totalMin>=240 && totalMin<1200 && i===activeIdx) ? z.hi : z.base;
    ctx.fill();
  });

  // Outer status ring
  ctx.beginPath(); ctx.arc(cx,cy,R,0,2*Math.PI);
  ctx.strokeStyle = statusColor; ctx.lineWidth = 2; ctx.stroke();

  // Hour ticks
  for (let i=0; i<12; i++) {
    const a = (i/12)*2*Math.PI - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*(R-2), cy+Math.sin(a)*(R-2));
    ctx.lineTo(cx+Math.cos(a)*(R-2-(i%3===0?4:2)), cy+Math.sin(a)*(R-2-(i%3===0?4:2)));
    ctx.strokeStyle = mutC; ctx.lineWidth = i%3===0?1.5:0.7; ctx.stroke();
  }

  // Hands
  const hA = ((h%12+m/60+s/3600)/12)*2*Math.PI - Math.PI/2;
  const mA = ((m+s/60)/60)*2*Math.PI - Math.PI/2;
  const sA = (s/60)*2*Math.PI - Math.PI/2;
  ctx.lineCap = 'round';
  [[hA,R*.50,2,inkC],[mA,R*.75,1.5,inkC],[sA,R*.82,1,'#c46a4a']].forEach(([a,len,w,c]) => {
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(a)*len, cy+Math.sin(a)*len);
    ctx.strokeStyle = c; ctx.lineWidth = w; ctx.stroke();
  });
  ctx.beginPath(); ctx.arc(cx,cy,2,0,2*Math.PI); ctx.fillStyle='#c46a4a'; ctx.fill();
}

function initMarketClock() {
  if (_clockTimer) clearInterval(_clockTimer);
  drawClock();
  _clockTimer = setInterval(drawClock, 1000);
}

// ── Benchmark ─────────────────────────────────────────────────────────────────
async function fetchTransactions() {
  const url = TRANSACTION_URL;
  if (!url) return null;
  const res  = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substring(text.indexOf('(') + 1, text.lastIndexOf(')')));
  const table = json.table;
  const idx = {};
  table.cols.forEach((c, i) => { if (c.label) idx[c.label] = i; });
  const cell = (row, label) => { const i = idx[label]; if (i == null) return null; const c = row.c[i]; return c == null ? null : c.v; };
  return table.rows.map(r => {
    let raw = cell(r, 'Date'), dateStr = null;
    if (raw) {
      if (typeof raw === 'string' && raw.startsWith('Date(')) {
        const p = raw.slice(5,-1).split(',').map(Number);
        dateStr = new Date(Date.UTC(p[0], p[1], p[2])).toISOString().slice(0,10);
      } else { dateStr = new Date(raw).toISOString().slice(0,10); }
    }
    return { dateStr, type: cell(r,'Type'), ticker: cell(r,'Ticker'),
             shares: cell(r,'Shares'), price: cell(r,'Price_Per_Share'),
             tradeValue: cell(r,'Trade_Value') };
  }).filter(r => r.dateStr && r.type && r.ticker);
}

async function fetchYahooPrices(ticker, p1, p2) {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(yahooTicker(ticker))}?period1=${p1}&period2=${p2}&interval=1d`;  const parse = d => {
    const r = d?.chart?.result?.[0]; if (!r?.timestamp) return null;
    const cls = r.indicators?.quote?.[0]?.close ?? [], out = {};
    r.timestamp.forEach((ts,i) => { if (cls[i]!=null) out[new Date(ts*1000).toISOString().slice(0,10)] = cls[i]; });
    return Object.keys(out).length ? out : null;
  };
  try { return parse(await (await fetch(url)).json()); } catch {}
  try { return parse(await (await fetch(`https://corsproxy.io/?url=${encodeURIComponent(url)}`)).json()); } catch {}
  return null;
}

function nearestPrice(map, date) {
  if (!map) return null;
  if (map[date]) return map[date];
  const k = Object.keys(map).filter(d => d <= date).sort();
  return k.length ? map[k[k.length-1]] : null;
}

function computeBenchmark(txs, prices) {
  const days = Object.keys(prices['SPY'] || {}).sort();
  if (!days.length) return null;
  const sorted = [...txs].sort((a,b) => a.dateStr.localeCompare(b.dateStr));
  const firstBuyDate = sorted.find(t => t.type === 'Buy')?.dateStr;
  if (!firstBuyDate) return null;

  const tradingDays = days.filter(d => d >= firstBuyDate);
  const holdings = {};
  let spySh = 0, qqqSh = 0;
  let totalBuys = 0, totalSells = 0;  // tracked separately so realized gains aren't lost
  let txIdx = 0;
  const labels = [], portLine = [], spyLine = [], qqqLine = [];

  for (const day of tradingDays) {
    while (txIdx < sorted.length && sorted[txIdx].dateStr <= day) {
      const tx = sorted[txIdx++];
      const amt  = tx.shares * tx.price;
      const spyP = nearestPrice(prices['SPY'], tx.dateStr);
      const qqqP = nearestPrice(prices['QQQ'], tx.dateStr);
      if (tx.type === 'Buy') {
        holdings[tx.ticker] = (holdings[tx.ticker] || 0) + tx.shares;
        totalBuys += amt;
        if (spyP) spySh += amt / spyP;
        if (qqqP) qqqSh += amt / qqqP;
      } else {
        holdings[tx.ticker] = (holdings[tx.ticker] || 0) - tx.shares;
        if ((holdings[tx.ticker] || 0) < 1e-9) delete holdings[tx.ticker];
        totalSells += amt;                              // realized proceeds kept
        if (spyP) spySh = Math.max(0, spySh - amt / spyP);
        if (qqqP) qqqSh = Math.max(0, qqqSh - amt / qqqP);
      }
    }
    if (totalBuys <= 0) continue;

    // Unrealized value of open positions
    let portVal = 0;
    for (const [tk, sh] of Object.entries(holdings)) {
      if (sh < 1e-9) continue;
      const p = nearestPrice(prices[tk], day);
      if (p) portVal += sh * p;
    }
    const spyVal = spySh * (nearestPrice(prices['SPY'], day) || 0);
    const qqqVal = qqqSh * (nearestPrice(prices['QQQ'], day) || 0);

    // Total wealth = open positions + all sell proceeds (realized gains included)
    // SPY/QQQ mirrors returned the same dollars on each sell, so totalSells applies equally
    const portWealth = portVal + totalSells;
    const spyWealth  = spyVal  + totalSells;
    const qqqWealth  = qqqVal  + totalSells;

    labels.push(day);
    portLine.push(+((portWealth / totalBuys - 1) * 100).toFixed(2));
    spyLine.push( +((spyWealth  / totalBuys - 1) * 100).toFixed(2));
    qqqLine.push( +((qqqWealth  / totalBuys - 1) * 100).toFixed(2));
  }
  return labels.length ? { labels, portLine, spyLine, qqqLine } : null;
}
