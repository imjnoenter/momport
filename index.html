<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Portfolio</title>
<script>document.documentElement.dataset.lang = localStorage.getItem('lang') || 'EN';</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=DM+Sans:wght@400;500;600;700&Intel+One+Mono:ital,wght@0,300..700;1,300..700&family=Kanit:wght@400;500;600;700&display=swap');

:root {
  /* Cozy "Hearth & Hand" — warm cream parchment */
  --bg: #efe5d0;
  --bg-grain: radial-gradient(circle at 20% 10%, rgba(196,106,74,.04), transparent 40%), radial-gradient(circle at 90% 80%, rgba(107,142,90,.05), transparent 40%);
  --card: #faf3e0;
  --card-edge: #e6d8b8;
  --ink: #3a2a1c;
  --ink-soft: #5a432e;
  --muted: #8a7458;
  --muted-2: #a89178;
  --line: #e6d8b8;
  --line-soft: #ede0c4;
  --radius: 18px;
  --radius-sm: 12px;
  --radius-pill: 999px;
  --shadow: 0 1px 2px rgba(58,42,28,.05), 0 6px 18px rgba(58,42,28,.07);
  --shadow-lg: 0 2px 4px rgba(58,42,28,.06), 0 16px 36px rgba(58,42,28,.12);
  --track: #ede0c4;
  --hover: #f5ebd2;
  --grid: #e6d8b8;
  --tooltip-bg: #3a2a1c;

  /* Accents */
  --terracotta: #c46a4a;
  --sage: #6b8e5a;
  --clay: #bb4d3c;
  --honey: #c79038;
  --peri: #6b7eb8;
  --plum: #8a5a7e;

  --gain: #6b8e5a;
  --loss: #bb4d3c;
  --badge-up-bg: rgba(107,142,90,.16);
  --badge-up-fg: #5a7a4b;
  --badge-dn-bg: rgba(187,77,60,.14);
  --badge-dn-fg: #a04030;

  --btn-bg: #3a2a1c;
  --btn-fg: #faf3e0;
  --spark-ok: #6b8e5a;
  --logo-bg: #f5ebd2;

  --font-display: 'Newsreader', Georgia, serif;
  --font-ui: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
}
/* ── Cool tone (light) — misty seafoam, eucalyptus, dusty teal ── */
[data-tone="cool"] {
  --bg: #dde7e4;
  --bg-grain: radial-gradient(circle at 20% 10%, rgba(90,143,163,.06), transparent 40%), radial-gradient(circle at 90% 80%, rgba(122,154,130,.06), transparent 40%);
  --card: #eef3ef;
  --card-edge: #c8d4cf;
  --ink: #25393a;
  --ink-soft: #3e5253;
  --muted: #6b8488;
  --muted-2: #8aa1a4;
  --line: #c8d4cf;
  --line-soft: #d6e0db;
  --shadow: 0 1px 2px rgba(37,57,58,.05), 0 6px 18px rgba(37,57,58,.08);
  --shadow-lg: 0 2px 4px rgba(37,57,58,.07), 0 16px 36px rgba(37,57,58,.13);
  --track: #d6e0db;
  --hover: #e3ece8;
  --grid: #c8d4cf;
  --tooltip-bg: #25393a;

  --terracotta: #5a8fa3;
  --sage: #7a9a82;
  --clay: #b56a6e;
  --honey: #b89c5a;
  --peri: #7a8cb8;
  --plum: #8a7aa3;

  --gain: #7a9a82;
  --loss: #b56a6e;
  --badge-up-bg: rgba(122,154,130,.18);
  --badge-up-fg: #5a7a64;
  --badge-dn-bg: rgba(181,106,110,.16);
  --badge-dn-fg: #8e4a52;

  --btn-bg: #25393a;
  --btn-fg: #eef3ef;
  --spark-ok: #7a9a82;
  --logo-bg: #e3ece8;
}

/* ── Cool tone (dark) — deep ocean ── */
[data-tone="cool"][data-theme="dark"] {
  --bg: #1a2628;
  --bg-grain: radial-gradient(circle at 20% 10%, rgba(90,143,163,.08), transparent 40%), radial-gradient(circle at 90% 80%, rgba(122,154,130,.06), transparent 40%);
  --card: #243335;
  --card-edge: #344547;
  --ink: #d8e8e6;
  --ink-soft: #b8c8c6;
  --muted: #8a9ea1;
  --muted-2: #6b8488;
  --line: #344547;
  --line-soft: #2d3d3f;
  --shadow: 0 1px 2px rgba(0,0,0,.35), 0 8px 22px rgba(0,0,0,.4);
  --shadow-lg: 0 2px 4px rgba(0,0,0,.4), 0 18px 40px rgba(0,0,0,.5);
  --track: #2d3d3f;
  --hover: #2f4143;
  --grid: #344547;
  --tooltip-bg: #0d1718;

  --terracotta: #7ab2c6;
  --sage: #9ab8a3;
  --clay: #d08a90;
  --honey: #d6b87a;
  --peri: #9aa8d0;
  --plum: #a89bbf;

  --gain: #9ab8a3;
  --loss: #d08a90;
  --badge-up-bg: rgba(154,184,163,.18);
  --badge-up-fg: #b8d0bf;
  --badge-dn-bg: rgba(208,138,144,.18);
  --badge-dn-fg: #e0a4a8;
  --btn-bg: #d8e8e6;
  --btn-fg: #1a2628;
  --logo-bg: #2d3d3f;
}

[data-theme="dark"] {
  /* Cozy dark — cocoa & embers */
  --bg: #211912;
  --bg-grain: radial-gradient(circle at 20% 10%, rgba(196,106,74,.06), transparent 40%), radial-gradient(circle at 90% 80%, rgba(107,142,90,.04), transparent 40%);
  --card: #2c2218;
  --card-edge: #3d2f22;
  --ink: #f0e4cd;
  --ink-soft: #d8c8a8;
  --muted: #a89178;
  --muted-2: #8a7458;
  --line: #3d2f22;
  --line-soft: #36281c;
  --shadow: 0 1px 2px rgba(0,0,0,.35), 0 8px 22px rgba(0,0,0,.35);
  --shadow-lg: 0 2px 4px rgba(0,0,0,.4), 0 18px 40px rgba(0,0,0,.45);
  --track: #36281c;
  --hover: #3a2c1f;
  --grid: #3d2f22;
  --tooltip-bg: #15100a;

  --terracotta: #d4825e;
  --sage: #8aa978;
  --clay: #d56b58;
  --honey: #d8a84b;
  --peri: #8a9bcb;
  --plum: #a3759a;

  --gain: #8aa978;
  --loss: #d56b58;
  --badge-up-bg: rgba(138,169,120,.18);
  --badge-up-fg: #a3c08e;
  --badge-dn-bg: rgba(213,107,88,.18);
  --badge-dn-fg: #e58a78;
  --btn-bg: #f0e4cd;
  --btn-fg: #211912;
  --spark-ok: #8aa978;
  --logo-bg: #36281c;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-x: hidden; }
body {
  font: 14px/1.55 var(--font-ui);
  background: var(--bg);
  background-image: var(--bg-grain);
  color: var(--ink);
  -webkit-text-size-adjust: 100%;
  overflow-x: hidden;
  touch-action: pan-x pan-y;
  font-feature-settings: "ss01", "cv11";
}

/* ── Layout ── */
.app { display: grid; grid-template-columns: 1fr 380px; gap: 14px; padding: 16px; min-height: 100vh; align-items: start; align-content: start; width: 100%; }
.main-panel, .side-panel { min-width: 0; width: 100%; }

/* ── Header (redesigned — no white-stripe overlay, dark-mode safe) ── */
.header {
  grid-column: 1/-1;
  display: flex; align-items: center; justify-content: space-between;
  background: var(--card);
  background-image:
    radial-gradient(ellipse 600px 200px at 0% 50%, rgba(196,106,74,.10), transparent 60%),
    radial-gradient(ellipse 500px 180px at 100% 50%, rgba(107,142,90,.07), transparent 60%);
  border: 1px solid var(--card-edge);
  border-radius: var(--radius);
  padding: 14px 20px; box-shadow: var(--shadow); gap: 14px;
  position: relative; overflow: hidden;
}
.header::before {
  /* Warm seal stripe — tints with theme, no white wash */
  content: ''; position: absolute; left: 0; top: 22%; bottom: 22%;
  width: 3px; border-radius: 0 3px 3px 0;
  background: linear-gradient(180deg, var(--terracotta), var(--honey));
  pointer-events: none; opacity: .9;
}
[data-tone="cool"] .header {
  background-image:
    radial-gradient(ellipse 600px 200px at 0% 50%, rgba(90,143,163,.12), transparent 60%),
    radial-gradient(ellipse 500px 180px at 100% 50%, rgba(122,154,130,.08), transparent 60%);
}
[data-theme="dark"] .header {
  background-image:
    radial-gradient(ellipse 600px 200px at 0% 50%, rgba(212,130,94,.10), transparent 60%),
    radial-gradient(ellipse 500px 180px at 100% 50%, rgba(154,184,138,.07), transparent 60%);
}
[data-theme="dark"][data-tone="cool"] .header {
  background-image:
    radial-gradient(ellipse 600px 200px at 0% 50%, rgba(122,178,198,.12), transparent 60%),
    radial-gradient(ellipse 500px 180px at 100% 50%, rgba(154,184,163,.08), transparent 60%);
}

.header-left { display: flex; align-items: center; gap: 14px; min-width: 0; }
.header-title-group { min-width: 0; }
.header-title {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 600; letter-spacing: -.5px;
  font-style: italic; line-height: 1.05;
  color: var(--ink);
  cursor: pointer; user-select: none;
}
.header-title:hover { opacity: .75; }
.header-title-input {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 600; letter-spacing: -.5px;
  font-style: italic; line-height: 1.05;
  color: var(--ink); background: transparent;
  border: none; border-bottom: 2px solid var(--terracotta);
  outline: none; width: 120px; padding: 0;
}
.header-sub {
  font-family: var(--font-mono);
  font-size: 10px; color: var(--muted); margin-top: 4px;
  letter-spacing: .8px; text-transform: uppercase;
  display: flex; align-items: center; gap: 5px;
}
.header-sub::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: var(--sage);
  box-shadow: 0 0 0 2px rgba(107,142,90,.22);
  animation: live-pulse 2.4s ease-in-out infinite;
}
@keyframes live-pulse {
  0%, 100% { box-shadow: 0 0 0 2px rgba(107,142,90,.22); }
  50%      { box-shadow: 0 0 0 6px rgba(107,142,90,0); }
}

.brand-mark {
  width: 42px; height: 42px; border-radius: 14px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--terracotta) 0%, var(--honey) 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(196,106,74,.32), inset 0 1px 0 rgba(255,255,255,.28);
  position: relative; overflow: hidden;
}
.brand-mark svg { width: 26px; height: 26px; }
.brand-mark::after {
  content: ''; position: absolute; inset: 2px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,.18); pointer-events: none;
}
[data-tone="cool"] .brand-mark {
  background: linear-gradient(135deg, var(--terracotta) 0%, var(--plum) 100%);
  box-shadow: 0 2px 8px rgba(90,143,163,.32), inset 0 1px 0 rgba(255,255,255,.28);
}

.header-divider {
  width: 1px; align-self: stretch; margin: 8px 0; flex-shrink: 0;
  background: linear-gradient(180deg, transparent, var(--line) 25%, var(--line) 75%, transparent);
}

.market-clock-pill {
  display: flex; align-items: center; gap: 12px;
  padding: 7px 16px 7px 9px;
  background: var(--track);
  border: 1px solid var(--line);
  border-radius: 16px;
  flex-shrink: 0;
}
.market-clock-pill canvas { display: block; flex-shrink: 0; }
.mc-status {
  font-family: var(--font-ui);
  font-size: 13px; font-weight: 700;
  letter-spacing: .15px; line-height: 1.1;
  display: inline-flex; align-items: center; gap: 6px;
}
.mc-status::before {
  content: ''; width: 7px; height: 7px; border-radius: 50%;
  background: currentColor; flex-shrink: 0;
  box-shadow: 0 0 0 3px color-mix(in oklab, currentColor 22%, transparent);
  animation: live-pulse 2.4s ease-in-out infinite;
}
.mc-et {
  font-family: var(--font-mono);
  font-size: 10.5px; color: var(--muted);
  margin-top: 4px; letter-spacing: .6px; text-transform: uppercase;
  font-weight: 500;
}

.header-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-left: auto; }
.header-tools {
  display: flex; align-items: center; gap: 4px;
  padding: 3px; background: var(--track);
  border: 1px solid var(--line); border-radius: var(--radius-pill);
}
.header-tools .theme-btn,
.header-tools .currency-btn { border: none; background: transparent; height: 30px; }
.header-tools .theme-btn { width: 30px; }
.header-tools .theme-btn:hover { background: var(--card); border-color: transparent; }
.header-tools .currency-btn span { line-height: 30px; padding: 0 11px; font-size: 12px; }

/* ── Language toggle (EN / TH segmented) ── */
.lang-toggle {
  display: flex; border: 1px solid var(--line); border-radius: var(--radius-pill);
  overflow: hidden; height: 30px; flex-shrink: 0;
}
.lang-seg {
  border: none; background: transparent; padding: 0 11px;
  font-size: 11px; font-weight: 700; letter-spacing: .5px;
  cursor: pointer; color: var(--muted); font-family: var(--font-ui);
  transition: background .15s, color .15s;
}
.lang-seg.active { background: var(--btn-bg); color: var(--btn-fg); }
.lang-seg:not(.active):hover { background: var(--hover); color: var(--ink); }

/* ── Thai font (Kanit) — applied to every element ── */
[data-lang="TH"],
[data-lang="TH"] * {
  --font-ui: 'Kanit', system-ui, sans-serif;
  --font-display: 'Kanit', Georgia, serif;
  font-family: 'Kanit', system-ui, sans-serif !important;
}
/* Numbers: keep the original mono font in Thai mode */
[data-lang="TH"] .sc-value,
[data-lang="TH"] .sc-sub,
[data-lang="TH"] .mc-et,
[data-lang="TH"] .header-sub,
[data-lang="TH"] [class*="font-mono"],
[data-lang="TH"] [style*="font-mono"],
[data-lang="TH"] canvas {
  font-family: 'JetBrains Mono', ui-monospace, monospace !important;
}

.refresh-btn {
  display: flex; align-items: center; gap: 6px; padding: 8px 14px;
  background: var(--btn-bg); color: var(--btn-fg);
  border: none; border-radius: var(--radius-pill); cursor: pointer;
  font-family: var(--font-ui); font-size: 12px; font-weight: 600;
  transition: transform .15s, box-shadow .15s, opacity .15s;
  white-space: nowrap; min-height: 36px;
  box-shadow: 0 2px 6px rgba(58,42,28,.18);
}
.refresh-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(58,42,28,.22); }
.refresh-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
.refresh-btn.refreshing { opacity: .6; pointer-events: none; }
.refresh-btn.refreshing svg { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.theme-btn, .currency-btn {
  display: flex; align-items: center; justify-content: center;
  height: 36px; background: var(--track);
  border: 1px solid var(--line); border-radius: var(--radius-pill);
  cursor: pointer; color: var(--muted);
  transition: background .15s, color .15s, border-color .15s;
  flex-shrink: 0;
}
.theme-btn { width: 36px; }
.theme-btn:hover { background: var(--hover); color: var(--ink); border-color: var(--terracotta); }
.theme-btn svg { width: 16px; height: 16px; }

.currency-btn { gap: 0; overflow: hidden; padding: 0; }
.currency-btn span {
  padding: 0 12px; font-size: 13px; font-weight: 600; color: var(--muted);
  line-height: 36px; transition: background .15s, color .15s;
  font-family: var(--font-display); font-style: italic;
}
.currency-btn span.active { background: var(--terracotta); color: #faf3e0; }

.last-updated {
  font-size: 11px; color: var(--muted); white-space: nowrap;
  font-family: var(--font-mono); letter-spacing: .2px;
}

/* ── Card ── */
.card {
  background: var(--card);
  border: 1px solid var(--card-edge);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px;
  position: relative;
  transition: box-shadow .2s, border-color .2s;
}
.card:hover { box-shadow: var(--shadow-lg); }
.card-title {
  font-family: var(--font-display);
  font-size: 15px; font-weight: 600; color: var(--ink);
  letter-spacing: -.2px; margin-bottom: 14px;
  text-transform: none;
  display: flex; align-items: center; gap: 8px;
}
.card-title::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--terracotta); flex-shrink: 0;
  box-shadow: 0 0 0 3px rgba(196,106,74,.18);
}

/* ── Main / side panel ── */
.main-panel, .side-panel { display: flex; flex-direction: column; gap: 14px; }

/* Gauge + Allocation panel */
.alloc-card { padding-bottom: 14px; }
.gauge-wrap { position: relative; height: 92px; margin: 0 auto 2px; width: 100%; max-width: 320px; display: flex; justify-content: center; align-items: flex-start; }
.gauge-wrap canvas { width: 100%; height: 100%; display: block; }
.gauge-center { display: none; }

.alloc-stats {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  margin: 10px 0 14px;
}
.alloc-stat {
  display: flex; align-items: center; gap: 8px;
  background: var(--track); border: 1px solid var(--line-soft);
  border-radius: var(--radius-sm); padding: 8px 10px;
}
.alloc-stat-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.alloc-stat-label {
  font-family: var(--font-mono); font-size: 9px;
  color: var(--muted); text-transform: uppercase; letter-spacing: .8px;
  margin-bottom: 1px;
}
.alloc-stat-value {
  font-family: var(--font-display); font-size: 14px;
  font-weight: 600; letter-spacing: -.2px; line-height: 1.05;
  color: var(--ink);
}

.alloc-list-head {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 6px 0 8px;
  border-top: 1px dashed var(--line-soft);
  margin-bottom: 4px;
}
.alloc-list-head > span:first-child {
  font-family: var(--font-mono); font-size: 9.5px;
  color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
  font-weight: 600;
}
.alloc-list-head > span:last-child {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--muted-2); letter-spacing: .3px;
}

/* Position list */
.pos-list { display: flex; flex-direction: column; gap: 2px; max-height: 380px; overflow-y: auto; padding-right: 4px; }
.pos-list::-webkit-scrollbar { width: 6px; }
.pos-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
.pos-list::-webkit-scrollbar-track { background: transparent; }
.pos-row {
  display: grid;
  grid-template-columns: 10px 44px 1fr auto;
  align-items: center; gap: 9px;
  padding: 6px 4px; border-radius: 8px;
  transition: background .15s;
}
.pos-row:hover { background: var(--hover); }
.pos-dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 0 2px var(--card); }
.pos-sym { font-size: 12px; font-weight: 700; font-family: var(--font-ui); letter-spacing: -.1px; color: var(--ink); }
.pos-bar-bg { height: 7px; background: var(--track); border-radius: 4px; overflow: hidden; box-shadow: inset 0 1px 1px rgba(58,42,28,.06); }
.pos-bar { height: 100%; border-radius: 4px; background-image: linear-gradient(180deg, rgba(255,255,255,.18), transparent); transform-origin: left center; }
@keyframes posBarGrow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
.pos-bar.bar-anim { animation: posBarGrow .5s ease-out both; }
.pos-meta { text-align: right; line-height: 1.1; min-width: 64px; }
.pos-pct { font-size: 11px; color: var(--ink); font-family: var(--font-mono); font-weight: 600; }
.pos-val { font-size: 9.5px; color: var(--muted); font-family: var(--font-mono); margin-top: 1px; letter-spacing: .2px; }

/* Hero (legacy — kept for safety) */
.hero { padding: 20px; }
.hero-main { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
.hero-value { font-family: var(--font-display); font-size: 34px; font-weight: 600; letter-spacing: -1px; }

/* Badges */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 11px; border-radius: var(--radius-pill);
  font-size: 12px; font-weight: 600;
  font-family: var(--font-ui);
}
.badge.up   { background: var(--badge-up-bg); color: var(--badge-up-fg); }
.badge.down { background: var(--badge-dn-bg); color: var(--badge-dn-fg); }

/* Positions table */
.pos-table { width: 100%; border-collapse: collapse; font-size: 13px; font-family: var(--font-ui); }
.pos-table th {
  text-align: right; color: var(--muted); font-weight: 500;
  padding: 9px 8px; border-bottom: 1px solid var(--line);
  white-space: nowrap; cursor: pointer; user-select: none;
  font-size: 10px; text-transform: uppercase; letter-spacing: -0.3px;
}
.pos-table th:first-child { text-align: left; position: sticky; left: 0; z-index: 3; background: var(--card); max-width: 150px; }
.pos-table th:hover { color: var(--terracotta); }
.pos-table td {
  padding: 10px 8px; border-bottom: 1px solid var(--line-soft);
  vertical-align: middle; text-align: right;
}
.pos-table td:first-child { text-align: left; position: sticky; left: 0; z-index: 1; background: var(--card); max-width: 150px; }
.pos-table tr:last-child td { border-bottom: none; }
.pos-table tr:hover td { background: var(--hover); }
.pos-table tr:hover td:first-child { background: var(--hover); }
.asset-cell { display: flex; align-items: center; gap: 9px; }
.logo-wrap {
  width: 32px; height: 32px; border-radius: 10px; overflow: hidden;
  flex-shrink: 0; background: var(--logo-bg);
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--line);
}
.logo-img { width: 32px; height: 32px; object-fit: contain; padding: 3px; display: block; }
.logo-fb  { width: 32px; height: 32px; border-radius: 10px; display: none; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0; }
.asset-sym  { font-weight: 600; font-size: 13px; letter-spacing: -.1px; }
.asset-name { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 190px; margin-top: 1px; }
.tag { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: var(--radius-pill); letter-spacing: .4px; text-transform: uppercase; }
.tag.treasury { background: rgba(138,116,88,.18); color: var(--muted); }
.tag.watch    { background: rgba(199,144,56,.18);  color: var(--honey); }
.gain { color: var(--gain); font-weight: 600; }
.loss { color: var(--loss); font-weight: 600; }

/* Two-line cells */
.cell-main { font-size: 13px; font-weight: 600; white-space: nowrap; font-family: var(--font-ui); }
.cell-sub  { font-size: 10px; margin-top: 0px; white-space: nowrap; font-family: var(--font-mono); }
.cell-up   { color: var(--gain); }
.cell-dn   { color: var(--loss); }
.cell-mut  { color: var(--muted); }

/* Allocation sparkline */
.alloc-spark { min-width: 130px; }
.spark-track { position: relative; height: 6px; background: var(--track); border-radius: 4px; margin-bottom: 4px; }
.spark-fill  { height: 100%; border-radius: 4px; position: absolute; top: 0; left: 0; }
.spark-tick  { position: absolute; top: -4px; width: 2px; height: 14px; border-radius: 1px; background: var(--ink); opacity: .7; }
.spark-meta  { display: flex; justify-content: space-between; font-size: 10px; line-height: 1; font-family: var(--font-mono); }
.spark-curr  { color: var(--muted); }
.spark-diff  { font-weight: 700; }
.spark-diff.over  { color: var(--honey); }
.spark-diff.under { color: var(--peri); }
.spark-diff.ok    { color: var(--spark-ok); }

.to-add { font-size: 11px; font-weight: 700; white-space: nowrap; font-family: var(--font-mono); }
.to-add.buy  { color: var(--peri); }
.to-add.over { color: var(--honey); }
.to-add.none { color: var(--muted); }

/* Donut */
.donut-wrap { position: relative; }
.chart-wrap { position: relative; }
.chart-wrap.donut-h { height: 260px; width: 100%; }
.chart-wrap.bar-h   { height: 200px; }
.donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
.donut-center .dc-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.donut-center .dc-value { font-family: var(--font-display); font-size: 18px; font-weight: 600; letter-spacing: -.4px; margin-top: 2px; }

/* Sector legend chips */
.sector-legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.sector-chip {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--ink-soft);
  background: var(--track); padding: 3px 9px; border-radius: var(--radius-pill);
  border: 1px solid var(--line);
}
.sector-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* Watchlist */
.watch-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--line-soft); gap: 8px; }
.watch-row:last-child { border-bottom: none; }
.watch-info  { display: flex; align-items: center; gap: 9px; min-width: 0; }
.watch-price { text-align: right; flex-shrink: 0; }
.watch-price .price  { font-size: 14px; font-weight: 600; font-family: var(--font-display); letter-spacing: -.2px; }
.watch-price .wtarget { font-size: 10px; color: var(--muted); font-family: var(--font-mono); }

/* Benchmark chart */
.chart-wrap.bench-h { height: 280px; }
@media (max-width: 700px) { .chart-wrap.bench-h { height: 200px; } }
.bench-status { color: var(--muted); font-size: 12px; text-align: center; padding: 30px 0; font-style: italic; font-family: var(--font-display); }

/* Loading / Error */
.loading { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 16px; font-family: var(--font-display); font-style: italic; }
.error-banner { background: rgba(187,77,60,.12); color: var(--loss); padding: 14px 18px; border-radius: var(--radius); font-size: 13px; border: 1px solid rgba(187,77,60,.25); }

.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; }

/* ── Tablet ≤1080px ── */
@media (max-width: 1080px) {
  .app { grid-template-columns: 1fr; }
  .side-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
  .side-panel .card { min-height: 0; }
}

/* ── Collapsible cards ── */
.card-title { cursor: pointer; }
.card-chevron {
  margin-left: auto;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  opacity: .35;
  transition: transform .22s ease, opacity .15s;
  pointer-events: none;
}
.card-chevron svg { width: 13px; height: 13px; stroke: var(--ink); }
.card.collapsed .card-chevron { transform: rotate(180deg); opacity: .6; }
.card.collapsed .card-title { margin-bottom: 0 !important; }
.card.collapsed > *:not(:first-child) { display: none !important; }
.card.collapsed > :first-child { margin-bottom: 0 !important; }
.card.collapsed .card-header-extra { display: none !important; }
.alloc-card .card-chevron { margin-left: 0; }

/* ── Mobile page tab bar ── */
.mob-tab-bar {
  display: none;
  grid-column: 1/-1;
  background: var(--card);
  border: 1px solid var(--card-edge);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  padding: 3px;
  gap: 2px;
}
@media (max-width: 700px) {
  .mob-tab-bar {
    position: sticky;
    top: 6px;
    z-index: 200;
  }
}
.mob-tab {
  flex: 1;
  padding: 8px 4px 7px;
  border: none;
  border-radius: calc(var(--radius) - 3px);
  background: none;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font-ui);
  text-transform: uppercase;
  letter-spacing: .4px;
  cursor: pointer;
  transition: color .15s, background .15s;
}
.mob-tab.active {
  background: var(--btn-bg);
  color: var(--btn-fg);
}

/* ── Mobile ≤700px ── */
@media (max-width: 700px) {
  body { font-size: 13px; }
  .app { grid-template-columns: 1fr; padding: 10px; gap: 10px; max-width: 100vw; }
  .stat-card { padding: 14px; }
  .sc-label  { font-size: 10px; margin-bottom: 6px; }

  .last-updated { display: none; }
  .header { padding: 12px 14px; flex-wrap: wrap; }
  .header-title { font-size: 18px; }
  .refresh-btn { padding: 7px 12px; }

  .hero { padding: 16px; }
  .hero-value { font-size: 24px; }

  .gauge-wrap { max-width: 280px; height: 92px; margin-bottom: 4px; }
  .pos-list { max-height: 240px; }

  .card { padding: 14px; }
  .card-title { font-size: 14px; margin-bottom: 12px; }
  .table-scroll { overflow-x: scroll; -webkit-overflow-scrolling: touch; width: 100%; }
  .pos-table th:first-child, .pos-table td:first-child { width: 85px; min-width: 85px; max-width: 85px; }
  .pos-table { font-size: 12px; }
  .pos-table th, .pos-table td { padding: 7px 5px; white-space: nowrap; }
  .asset-cell { gap: 4px; }
  .logo-wrap, .logo-img, .logo-fb { width: 22px; height: 22px; }
  .asset-name { max-width: 50px; }
  .alloc-spark { min-width: 90px; }

  .side-panel { display: flex; flex-direction: column; gap: 10px; }

  .donut-wrap { display: flex; justify-content: center; }
  .chart-wrap.donut-h { height: 220px; width: 100%; }

  /* Tab visibility — hide sections not belonging to the active tab */
  .mob-tab-bar { display: flex; }
  .app:not(.mob-tab-overview)    [data-mob-tab="overview"]    { display: none; }
  .app:not(.mob-tab-holding)     [data-mob-tab="holding"]     { display: none; }
  .app:not(.mob-tab-transaction) [data-mob-tab="transaction"] { display: none; }
  .app:not(.mob-tab-allocation)  [data-mob-tab="allocation"]  { display: none; }
}

  .action-charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; margin-bottom: 16px; }

/* ── Stat grid ── */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.stat-card {
  background: var(--card);
  border: 1px solid var(--card-edge);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow);
  min-width: 0;
  position: relative;
  overflow: visible;
  container-type: inline-size;
  min-height: 110px;
  display: flex; flex-direction: column; justify-content: space-between;
  transition: transform .15s, box-shadow .2s;
}
.stat-card::after {
  content: ''; position: absolute; top: 0; right: 0;
  width: 60px; height: 60px;
  background: radial-gradient(circle at top right, rgba(196,106,74,.08), transparent 70%);
  pointer-events: none;
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.sc-label  {
  font-family: var(--font-ui);
  font-size: 10px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
}
.sc-value  {
  font-family: var(--font-display);
  font-size: clamp(18px, 12cqw, 26px); font-weight: 600; letter-spacing: -.6px;
  margin-bottom: 4px;
  white-space: nowrap; overflow: visible;
  color: var(--ink);
}
.sc-sub    { font-size: 12px; font-weight: 600; font-family: var(--font-mono); }
.sc-sub.up   { color: var(--gain); }
.sc-sub.down { color: var(--loss); }
.sc-sub.mut  { color: var(--muted); }
.sc-detail { font-size: 10px; color: var(--muted); margin-top: 4px; white-space: normal; overflow: visible; font-family: var(--font-mono); line-height: 1.2; }

/* ── Charts row + filter ── */
.charts-row { display: flex; flex-direction: column; gap: 10px; }
.chart-tf-strip {
  display: flex; gap: 4px; padding: 4px;
  background: var(--card); border: 1px solid var(--card-edge);
  border-radius: var(--radius-pill); width: fit-content;
  box-shadow: var(--shadow);
}
.tf-chart-btn {
  padding: 6px 14px; border: none; background: transparent;
  color: var(--muted); border-radius: var(--radius-pill); cursor: pointer;
  font-family: var(--font-ui); font-size: 11px; font-weight: 600;
  transition: background .15s, color .15s; letter-spacing: .3px;
}
.tf-chart-btn:hover { background: var(--hover); color: var(--ink); }
.tf-chart-btn.active { background: var(--terracotta); color: #faf3e0; box-shadow: 0 1px 4px rgba(196,106,74,.3); }
.charts-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.chart-half { min-width: 0; }
@media (max-width: 700px) {
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .charts-pair { grid-template-columns: 1fr; }
}

/* ── Tx modal ── */
.tx-overlay { position: fixed; inset: 0; z-index: 1001; background: rgba(58,42,28,.45); backdrop-filter: blur(4px); display: none; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; }
.tx-overlay.open { display: flex; }
.tx-modal { background: var(--card); color: var(--ink); border-radius: var(--radius); border: 1px solid var(--card-edge); box-shadow: var(--shadow-lg); width: 100%; max-width: 440px; padding: 22px; }
.tx-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--line); }
.tx-title { font-family: var(--font-display); font-size: 18px; font-weight: 600; letter-spacing: -.3px; }
.tx-close { display: none; }
.pm-close  { display: none; }
.tx-type-toggle { display: flex; background: var(--track); border-radius: var(--radius-pill); padding: 4px; margin-bottom: 14px; }
.tx-type-btn { flex: 1; padding: 8px; border: none; background: transparent; border-radius: var(--radius-pill); font-family: var(--font-ui); font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all .15s; }
.tx-type-btn.active-buy  { background: var(--sage); color: #faf3e0; }
.tx-type-btn.active-sell { background: var(--clay); color: #faf3e0; }
.tx-type-btn.active-div  { background: var(--peri); color: #faf3e0; }
.tx-field { margin-bottom: 14px; }
.tx-label { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: .5px; }
.tx-input { width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--track); color: var(--ink); font-family: var(--font-ui); font-size: 13px; outline: none; transition: border-color .15s, background .15s; }
.tx-input:focus { border-color: var(--terracotta); background: var(--card); }
.tx-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.tx-calc { font-size: 11px; color: var(--muted); margin-top: 8px; padding: 9px 11px; background: var(--track); border-radius: var(--radius-sm); display: flex; justify-content: space-between; }
.tx-submit { width: 100%; padding: 12px; background: var(--terracotta); color: #faf3e0; border: none; border-radius: var(--radius-pill); font-family: var(--font-ui); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 14px; box-shadow: 0 2px 8px rgba(196,106,74,.3); transition: transform .15s, box-shadow .15s; }
.tx-submit:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(196,106,74,.4); }
.tx-submit:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.tx-status { font-size: 12px; text-align: center; margin-top: 8px; min-height: 18px; font-family: var(--font-display); font-style: italic; }
.add-tx-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 14px 5px 6px;
  background: linear-gradient(180deg, var(--card) 0%, var(--track) 100%);
  color: var(--ink-soft); border: 1px solid var(--card-edge);
  border-radius: var(--radius-pill);
  font-family: var(--font-display); font-style: italic;
  font-size: 13px; font-weight: 600; letter-spacing: .1px;
  cursor: pointer; white-space: nowrap;
  box-shadow: 0 1px 0 rgba(255,255,255,.5) inset, 0 1px 2px rgba(58,42,28,.08);
  transition: transform .15s, box-shadow .2s, border-color .2s, color .2s, background .2s;
  position: relative;
}
.add-tx-btn .atx-plus {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--terracotta); color: #faf3e0;
  font-family: var(--font-ui); font-style: normal;
  font-size: 16px; font-weight: 400; line-height: 1;
  box-shadow: 0 1px 2px rgba(196,106,74,.32), inset 0 1px 0 rgba(255,255,255,.22);
  flex-shrink: 0;
  transition: transform .25s ease, background .2s, color .2s, box-shadow .2s;
}
.add-tx-btn .atx-label { padding-right: 2px; }
.add-tx-btn:hover {
  transform: translateY(-1px); color: #faf3e0;
  background: var(--terracotta); border-color: var(--terracotta);
  box-shadow: 0 1px 0 rgba(255,255,255,.18) inset, 0 6px 14px rgba(196,106,74,.32);
}
.add-tx-btn:hover .atx-plus {
  background: #faf3e0; color: var(--terracotta);
  transform: rotate(90deg) scale(1.05);
  box-shadow: 0 1px 3px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.6);
}
.add-tx-btn:active { transform: translateY(0); }
[data-tone="cool"] .add-tx-btn:hover {
  box-shadow: 0 1px 0 rgba(255,255,255,.18) inset, 0 6px 14px rgba(90,143,163,.34);
}
.add-tx-btn.refreshing { opacity: .6; pointer-events: none; }
.add-tx-btn.refreshing svg { animation: spin .7s linear infinite; }

/* ── Cash edit pill (sc-cash card) ── */
.cash-edit-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px 6px 10px;
  font-family: var(--font-display); font-style: italic;
  font-size: 12px; font-weight: 600; letter-spacing: .1px;
  color: var(--terracotta);
  background: linear-gradient(180deg, var(--card) 0%, var(--track) 100%);
  border: 1px solid var(--card-edge); border-radius: var(--radius-pill);
  cursor: pointer;
  box-shadow: 0 1px 0 rgba(255,255,255,.5) inset, 0 1px 2px rgba(58,42,28,.08);
  transition: transform .15s, box-shadow .2s, border-color .2s, color .2s, background .2s;
  position: relative; z-index: 1;
}
.cash-edit-btn svg { width: 13px; height: 13px; flex-shrink: 0; transition: transform .25s ease; }
.cash-edit-btn:hover {
  color: #faf3e0; background: var(--terracotta); border-color: var(--terracotta);
  transform: translateY(-1px);
  box-shadow: 0 1px 0 rgba(255,255,255,.18) inset, 0 6px 14px rgba(196,106,74,.32);
}
.cash-edit-btn:hover svg { transform: rotate(-12deg) scale(1.05); }
.cash-edit-btn:active { transform: translateY(0); }
[data-tone="cool"] .cash-edit-btn:hover { box-shadow: 0 1px 0 rgba(255,255,255,.18) inset, 0 6px 14px rgba(90,143,163,.34); }

/* ── Tx panel ── */
.tx-panel-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; }
.tx-panel-table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: var(--font-ui); }
.tx-panel-table th { text-align: right; color: var(--muted); font-weight: 500; padding: 8px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; font-size: 10px; text-transform: uppercase; letter-spacing: .6px; }
.tx-panel-table th:first-child { text-align: left; }
.tx-panel-table td { padding: 9px 8px; border-bottom: 1px solid var(--line-soft); vertical-align: middle; text-align: right; white-space: nowrap; }
.tx-panel-table td:first-child { text-align: left; }
.tx-panel-table tr:last-child td { border-bottom: none; }
.tx-panel-table tr:hover td { background: var(--hover); }
.tx-date-main { font-size: 12px; font-weight: 600; }
.tx-date-sub { font-size: 10px; color: var(--muted); margin-top: 1px; font-family: var(--font-mono); }
.tx-badge-buy  { display: inline-block; padding: 3px 9px; border-radius: var(--radius-pill); font-size: 10px; font-weight: 700; background: var(--badge-up-bg); color: var(--badge-up-fg); letter-spacing: .3px; }
.tx-badge-sell { display: inline-block; padding: 3px 9px; border-radius: var(--radius-pill); font-size: 10px; font-weight: 700; background: var(--badge-dn-bg); color: var(--badge-dn-fg); letter-spacing: .3px; }
.tx-free-yes { color: var(--gain); font-weight: 700; }
.tx-free-no  { color: var(--muted); }
.tx-actions { display: flex; gap: 5px; justify-content: flex-end; }
.tx-action-btn { width: 28px; height: 28px; border: 1px solid var(--line); background: var(--track); border-radius: var(--radius-sm); cursor: pointer; color: var(--muted); display: inline-flex; align-items: center; justify-content: center; padding: 0; transition: color .15s, border-color .15s, background .15s; }
.tx-action-btn:hover { color: var(--terracotta); border-color: var(--terracotta); background: var(--hover); }
.tx-action-btn.danger:hover { color: var(--loss); border-color: var(--loss); }
.tx-action-btn svg { width: 13px; height: 13px; }
.tx-confirm-row { display: inline-flex; gap: 4px; align-items: center; font-size: 11px; color: var(--muted); }
.tx-confirm-yes { padding: 4px 10px; border: none; background: var(--loss); color: #faf3e0; border-radius: var(--radius-pill); font-size: 11px; font-weight: 600; cursor: pointer; }
.tx-confirm-no  { padding: 4px 10px; border: 1px solid var(--line); background: var(--track); color: var(--ink); border-radius: var(--radius-pill); font-size: 11px; font-weight: 600; cursor: pointer; }
.tx-count-badge { display: inline-block; margin-left: 8px; padding: 2px 9px; background: var(--track); color: var(--muted); border-radius: var(--radius-pill); font-size: 10px; font-weight: 600; font-family: var(--font-mono); }
.tx-panel-status { padding: 30px 0; text-align: center; color: var(--muted); font-size: 13px; font-family: var(--font-display); font-style: italic; }
.tx-panel-status.error { color: var(--loss); }

/* ── Plan modal ── */
.plan-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(58,42,28,.45); backdrop-filter: blur(4px); display: none; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.plan-overlay.open { display: flex; }
.plan-modal { background: var(--card); color: var(--ink); border-radius: var(--radius); border: 1px solid var(--card-edge); box-shadow: var(--shadow-lg); width: 100%; max-width: 500px; padding: 22px; max-height: calc(100vh - 80px); overflow-y: auto; }
.plan-modal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--line); }
.pm-titles { flex: 1; min-width: 0; }
.pm-sym { font-family: var(--font-display); font-size: 19px; font-weight: 600; letter-spacing: -.3px; }
.pm-name { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pm-close { width: 30px; height: 30px; border: none; background: var(--track); color: var(--muted); border-radius: var(--radius-pill); cursor: pointer; font-size: 18px; line-height: 1; }
.pm-close:hover { background: var(--line); color: var(--ink); }
.plan-bar-wrap { margin: 16px 0 20px; }
.plan-bar-track { position: relative; height: 22px; background: var(--track); border-radius: var(--radius-sm); overflow: hidden; }
.plan-bar-seg { position: absolute; top: 0; bottom: 0; }
.plan-bar-tick { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--ink); opacity: .8; border-radius: 1px; z-index: 2; }
.plan-bar-labels { display: flex; flex-wrap: wrap; gap: 4px 12px; margin-top: 10px; font-size: 10px; color: var(--muted); }
.pbl-item { display: inline-flex; align-items: center; gap: 5px; }
.pbl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.tranche-row { display: grid; grid-template-columns: 48px 1fr 1fr 1fr 1fr 30px; align-items: center; gap: 8px; margin-bottom: 8px; }
.tranche-label { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-display); font-size: 13px; font-weight: 600; }
.tl-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.tranche-input-wrap { position: relative; }
.ti-prefix, .ti-suffix { position: absolute; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--muted); pointer-events: none; }
.ti-prefix { left: 10px; } .ti-suffix { right: 10px; }
.tranche-input-wrap.has-prefix .tranche-input { padding-left: 22px; }
.tranche-input-wrap.has-suffix .tranche-input { padding-right: 24px; }
.tranche-input { padding: 8px 10px; border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--track); color: var(--ink); font-family: var(--font-ui); font-size: 12px; font-weight: 600; outline: none; width: 100%; transition: border-color .15s; }
.tranche-input:focus { border-color: var(--terracotta); }
.tranche-input.warn { border-color: var(--honey); background: rgba(199,144,56,.1); }
.tranche-remove { width: 30px; height: 30px; border: none; background: transparent; color: var(--muted); cursor: pointer; border-radius: var(--radius-sm); font-size: 16px; line-height: 1; }
.tranche-remove:hover:not(:disabled) { background: var(--track); color: var(--loss); }
.tranche-remove:disabled { opacity: .25; cursor: not-allowed; }
.plan-add-btn { width: 100%; padding: 10px; margin-top: 4px; background: transparent; border: 1px dashed var(--line); border-radius: var(--radius-sm); color: var(--muted); font-family: var(--font-ui); font-size: 12px; font-weight: 600; cursor: pointer; transition: border-color .15s, color .15s; }
.plan-add-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }
.plan-actions { display: flex; gap: 10px; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line); }
.pa-save { flex: 1; padding: 11px 16px; background: var(--terracotta); color: #faf3e0; border: none; border-radius: var(--radius-pill); font-family: var(--font-ui); font-size: 13px; font-weight: 600; cursor: pointer; box-shadow: 0 2px 8px rgba(196,106,74,.3); transition: transform .15s; }
.pa-save:hover { transform: translateY(-1px); }
.pa-clear { padding: 11px 16px; background: transparent; color: var(--muted); border: 1px solid var(--line); border-radius: var(--radius-pill); font-family: var(--font-ui); font-size: 12px; font-weight: 600; cursor: pointer; }
.pa-clear:hover { color: var(--loss); border-color: var(--loss); }
/* ── Plan button — base (shared) ── */
.plan-btn { display: inline-flex; align-items: center; justify-content: center; margin-left: 6px; cursor: pointer; vertical-align: middle; transition: all .2s ease; position: relative; }
.plan-btn .pb-label { display: none; }

/* ── V1: Compact circle ── */
[data-plan-btn="compact"] .plan-btn {
  width: 22px; height: 22px; padding: 0;
  background: var(--track); border: 1px solid var(--line-soft);
  border-radius: 50%; color: var(--muted-2);
}
[data-plan-btn="compact"] .plan-btn svg { width: 12px; height: 4px; }
[data-plan-btn="compact"] .plan-btn:hover {
  background: rgba(196,106,74,.12); border-color: var(--terracotta); color: var(--terracotta);
  transform: scale(1.12);
}
[data-plan-btn="compact"] .plan-btn.saved {
  background: var(--terracotta); border-color: var(--terracotta); color: #faf3e0;
  box-shadow: 0 2px 8px rgba(196,106,74,.35);
}
[data-plan-btn="compact"] .plan-btn.saved:hover {
  transform: scale(1.15); box-shadow: 0 3px 12px rgba(196,106,74,.45);
}
/* Notification ping on saved */
[data-plan-btn="compact"] .plan-btn.saved::after {
  content: ''; position: absolute; top: -2px; right: -2px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--honey); border: 1.5px solid var(--card);
  box-shadow: 0 0 0 1px rgba(199,144,56,.3);
}

/* ── V2: Serif pill (matches cash-edit-btn) ── */
[data-plan-btn="pill"] .plan-btn {
  gap: 5px; padding: 3px 9px 3px 7px;
  font-family: var(--font-display); font-style: italic;
  font-size: 10px; font-weight: 600; letter-spacing: .1px;
  color: var(--muted);
  background: linear-gradient(180deg, var(--card) 0%, var(--track) 100%);
  border: 1px solid var(--card-edge); border-radius: var(--radius-pill);
  box-shadow: 0 1px 0 rgba(255,255,255,.4) inset, 0 1px 2px rgba(58,42,28,.06);
}
[data-plan-btn="pill"] .plan-btn .pb-label { display: inline; }
[data-plan-btn="pill"] .plan-btn svg { width: 10px; height: 3px; }
[data-plan-btn="pill"] .plan-btn:hover {
  color: #faf3e0; background: var(--terracotta); border-color: var(--terracotta);
  transform: translateY(-1px);
  box-shadow: 0 1px 0 rgba(255,255,255,.18) inset, 0 4px 10px rgba(196,106,74,.28);
}
[data-plan-btn="pill"] .plan-btn:hover svg { transform: rotate(-12deg); }
[data-plan-btn="pill"] .plan-btn.saved {
  color: var(--terracotta); border-color: rgba(196,106,74,.5);
  background: linear-gradient(180deg, rgba(196,106,74,.08) 0%, rgba(196,106,74,.16) 100%);
}
[data-plan-btn="pill"] .plan-btn.saved::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: var(--terracotta); flex-shrink: 0;
  box-shadow: 0 0 4px rgba(196,106,74,.5);
}
[data-plan-btn="pill"] .plan-btn.saved:hover {
  color: #faf3e0; background: var(--terracotta);
}

/* ── V3: Squircle badge ── */
[data-plan-btn="badge"] .plan-btn {
  width: 24px; height: 20px; padding: 0;
  background: linear-gradient(135deg, var(--card) 0%, var(--track) 100%);
  border: 1px solid var(--card-edge); border-radius: 6px;
  color: var(--muted-2);
  box-shadow: 0 1px 3px rgba(58,42,28,.08);
}
[data-plan-btn="badge"] .plan-btn svg { width: 12px; height: 4px; transition: transform .2s; }
[data-plan-btn="badge"] .plan-btn:hover {
  background: linear-gradient(135deg, var(--terracotta) 0%, var(--honey) 100%);
  border-color: var(--terracotta); color: #faf3e0;
  transform: translateY(-1px); box-shadow: 0 3px 10px rgba(196,106,74,.3);
}
[data-plan-btn="badge"] .plan-btn:hover svg { transform: scale(1.15); }
[data-plan-btn="badge"] .plan-btn.saved {
  background: linear-gradient(135deg, rgba(196,106,74,.15) 0%, rgba(199,144,56,.1) 100%);
  border-color: var(--terracotta); color: var(--terracotta);
}
[data-plan-btn="badge"] .plan-btn.saved::after {
  content: ''; position: absolute; top: -3px; right: -3px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--terracotta); border: 1.5px solid var(--card);
}

@keyframes action-pulse { 0%,100% { opacity: 1; } 50% { opacity: .15; } }
.action-pulse { animation: action-pulse 1.1s ease-in-out infinite; font-weight: 700; }
.action-tab-btn { flex: 1; padding: 8px 4px; border: none; background: transparent; border-radius: var(--radius-pill); font-family: var(--font-ui); font-size: 10px; font-weight: 700; color: var(--muted); cursor: pointer; transition: all .15s; letter-spacing: .4px; text-transform: uppercase; }
.action-tab-btn.active { background: var(--terracotta); color: #faf3e0; }
@keyframes allocFlash { 0%,100%{opacity:1} 50%{opacity:.2} }
.alloc-flash { animation: allocFlash 1s ease-in-out infinite; }
.action-tab-btn:hover:not(.active) { background: var(--hover); color: var(--ink); }

/* ── Tweaks panel ── */
.tw-panel {
  position: fixed; right: 18px; bottom: 18px; width: 300px; max-height: calc(100vh - 36px);
  z-index: 1100;
  display: none;
  flex-direction: column;
  background: var(--card); color: var(--ink);
  border: 1px solid var(--card-edge); border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  font-family: var(--font-ui);
  overflow: hidden;
}
.tw-panel.open { display: flex; }
.tw-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, var(--track), var(--card));
  cursor: grab; user-select: none;
}
.tw-head:active { cursor: grabbing; }
.tw-head-titles { line-height: 1.15; }
.tw-title {
  font-family: var(--font-display); font-style: italic; font-weight: 600;
  font-size: 16px; letter-spacing: -.2px;
}
.tw-sub { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .6px; }
.tw-head-actions { display: flex; align-items: center; gap: 6px; }
.tw-reset {
  font-family: var(--font-ui); font-size: 10px; font-weight: 700;
  padding: 4px 9px; background: transparent; color: var(--muted);
  border: 1px solid var(--line); border-radius: var(--radius-pill);
  cursor: pointer; text-transform: uppercase; letter-spacing: .5px;
  transition: color .15s, border-color .15s;
}
.tw-reset:hover { color: var(--terracotta); border-color: var(--terracotta); }
.tw-float-close {
  position: fixed; top: 16px; right: 16px; z-index: 1200;
  display: none;
  width: 48px; height: 48px; border: none;
  background: var(--card); color: var(--ink);
  border: 1px solid var(--card-edge);
  border-radius: var(--radius-pill);
  box-shadow: var(--shadow-lg);
  cursor: pointer; font-size: 28px; line-height: 1;
  align-items: center; justify-content: center;
  transition: background .15s, color .15s;
}
.tw-float-close.open { display: flex; }
.tw-float-close:hover { background: var(--terracotta); color: #fff; border-color: var(--terracotta); }

.tw-body { padding: 6px 14px 14px; overflow-y: auto; }
.tw-body::-webkit-scrollbar { width: 6px; }
.tw-body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

.tw-section {
  font-family: var(--font-mono); font-size: 9.5px; font-weight: 600;
  color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
  padding: 12px 0 6px; border-bottom: 1px dashed var(--line-soft); margin-bottom: 6px;
}
.tw-row { margin: 0 0 8px; }
.tw-label-row {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 12px; margin-bottom: 4px; color: var(--ink-soft);
}
.tw-val { font-family: var(--font-mono); font-size: 11px; color: var(--terracotta); font-weight: 600; }

.tw-row input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 4px; background: var(--track);
  border-radius: 4px; outline: none; cursor: pointer;
}
.tw-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--terracotta);
  border: 2px solid var(--card);
  box-shadow: 0 1px 3px rgba(58,42,28,.25);
  cursor: grab; transition: transform .15s;
}
.tw-row input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
.tw-row input[type="range"]::-moz-range-thumb {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--terracotta);
  border: 2px solid var(--card); cursor: grab;
}

.tw-toggle {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: var(--ink-soft); cursor: pointer;
  padding: 4px 0;
}
.tw-toggle input { display: none; }
.tw-switch {
  position: relative; width: 32px; height: 18px;
  background: var(--line); border-radius: 999px;
  transition: background .2s;
}
.tw-switch::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--card);
  box-shadow: 0 1px 3px rgba(58,42,28,.25);
  transition: transform .2s;
}
.tw-toggle input:checked ~ .tw-switch { background: var(--terracotta); }
.tw-toggle input:checked ~ .tw-switch::after { transform: translateX(14px); }

.tw-radio-group {
  display: flex; gap: 4px; margin-top: 4px;
}
.tw-radio-btn {
  flex: 1; padding: 6px 4px;
  font-family: var(--font-ui); font-size: 10px; font-weight: 600;
  color: var(--muted); background: var(--track);
  border: 1px solid var(--line); border-radius: 8px;
  cursor: pointer; text-align: center;
  transition: all .15s;
}
.tw-radio-btn:hover { border-color: var(--terracotta); color: var(--terracotta); }
.tw-radio-btn.active {
  background: var(--terracotta); color: #faf3e0;
  border-color: var(--terracotta);
  box-shadow: 0 2px 6px rgba(196,106,74,.3);
}

@media (max-width: 700px) {
  .tw-panel { right: 10px; bottom: 10px; left: 10px; width: auto; }
}

/* ── Holdings Performance panel ── */
.hp-row {
  display: grid; grid-template-columns: 108px 1fr 62px;
  align-items: center; gap: 8px; padding: 3px 2px;
  border-radius: 6px; transition: background .12s; cursor: default;
}
.hp-row:hover, .hp-row:active { background: var(--hover); }
.hp-sym { display: flex; align-items: center; gap: 6px; min-width: 0; }
.hp-sym .logo-wrap { width: 22px; height: 22px; flex-shrink: 0; }
.hp-sym .logo-img  { width: 22px; height: 22px; }
.hp-sym .logo-fb   { width: 22px; height: 22px; font-size: 8px; }
.hp-label { font-size: 11px; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hp-bar-wrap { position: relative; height: 8px; background: var(--track); border-radius: 4px; overflow: visible; }
.hp-bar-fill { position: absolute; top: 0; left: 0; height: 100%; border-radius: 4px; pointer-events: none; }
.hp-ref { position: absolute; top: -3px; bottom: -3px; width: 1px; border-left: 1px dashed var(--muted-2); opacity: .35; pointer-events: none; }
.hp-pct { font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-align: right; white-space: nowrap; }
.hp-tab {
  padding: 4px 12px; border-radius: 20px;
  border: 1px solid var(--line); background: transparent;
  color: var(--muted); font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all .15s; white-space: nowrap;
  font-family: var(--font-ui);
}
.hp-tab.active { background: var(--ink); color: var(--card); border-color: var(--ink); }
.hp-tab:hover:not(.active) { color: var(--ink); border-color: var(--ink); }
.hp-axis { position: relative; height: 16px; margin-top: 2px; margin-left: 108px; margin-right: 62px; padding: 0 8px; }
.hp-axis-label { position: absolute; transform: translateX(-50%); font-size: 9px; color: var(--muted); font-family: var(--font-mono); }
#hpTip {
  position: fixed; z-index: 9999;
  background: var(--tooltip-bg); color: #faf3e0;
  border-radius: 10px; padding: 10px 14px;
  font-size: 11px; pointer-events: none; opacity: 0;
  transition: opacity .12s; white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,.4); min-width: 200px;
}

/* ── Allocation Management modal — responsive ── */
.alloc-body-grid  { display:grid; grid-template-columns:320px 1fr; gap:16px; flex:1; overflow:hidden; min-height:0; }
.alloc-sym-opt:hover  { background: var(--hover); }
.alloc-pos-row        { border-radius: var(--radius-sm); transition: background .12s; }
.alloc-pos-row:hover  { background: var(--hover) !important; }
@media (max-width:860px) {
  .alloc-modal-wrap  { overflow-y:auto !important; max-height:calc(100vh - 60px) !important; }
  .alloc-body-grid   { grid-template-columns:1fr !important; overflow:visible !important; flex:none !important; }
  .alloc-left-panel  { overflow:visible !important; min-height:0; }
  .alloc-sym-list    { max-height:240px; flex:none !important; }
  .alloc-donuts-panel { grid-template-rows:auto auto !important; overflow:visible !important; }
  .alloc-donuts-row  { grid-template-columns:1fr !important; height:auto !important; }
  .alloc-donuts-row > .card { height:400px; }
}

/* ── Account switcher ── */
.account-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px 5px 8px;
  background: var(--track); border: 1px solid var(--line);
  border-radius: var(--radius-pill); cursor: pointer;
  font-size: 12px; font-weight: 600; color: var(--ink-soft);
  transition: background .15s, border-color .15s, color .15s;
  user-select: none; flex-shrink: 0; white-space: nowrap;
}
.account-pill:hover { background: var(--hover); border-color: var(--terracotta); color: var(--ink); }
.account-pill.open  { background: var(--hover); border-color: var(--terracotta); color: var(--ink); }
.account-pill .ap-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.account-pill .ap-chevron { opacity: .5; transition: transform .15s; flex-shrink: 0; }
.account-pill.open .ap-chevron { transform: rotate(180deg); opacity: .8; }

.account-menu {
  position: fixed; z-index: 2100;
  background: var(--card); border: 1px solid var(--card-edge);
  border-radius: var(--radius-sm); box-shadow: var(--shadow-lg);
  min-width: 200px; overflow: hidden;
  opacity: 0; pointer-events: none;
  transform: translateY(-4px);
  transition: opacity .12s, transform .12s;
}
.account-menu.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
.account-menu-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 14px; cursor: pointer; font-size: 12px; font-weight: 500;
  color: var(--ink-soft); transition: background .12s;
  border: none; background: none; width: 100%; text-align: left;
  font-family: var(--font-ui);
}
.account-menu-item:hover { background: var(--hover); color: var(--ink); }
.account-menu-item.is-active { font-weight: 700; color: var(--ink); }
.account-menu-item .ami-check { width: 14px; font-size: 11px; color: var(--terracotta); text-align: center; flex-shrink: 0; }
.account-menu-item .ami-dot   { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.account-menu-divider { height: 1px; background: var(--line); margin: 3px 0; }
.account-menu-item.danger:hover { background: rgba(187,77,60,.08); color: var(--loss); }
@media (max-width:700px) { .account-pill span:not(.ap-dot) { display: none; } .account-pill { padding: 5px 8px; gap: 0; } }
</style>

<body>
<div id="root">
  <div class="loading">Loading portfolio…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script>
// ── Config — multi-profile, stored in localStorage, never in code ────────────
const PALETTE = ["#c46a4a","#6b7eb8","#8a5a7e","#c79038","#6b8e5a","#7aa3b8","#b56a8a","#9ca85a","#d4825e","#8a7458","#9a7aa3","#7a9a82"];

const _CFG_KEY = 'portfolioConfig.v2';
function _loadCfg() {
  try {
    const raw = localStorage.getItem(_CFG_KEY);
    if (!raw) return null;
    const d = JSON.parse(raw);
    // Migrate: old single-profile format → multi-profile
    if (d.sheetId && !d.profiles) {
      const migrated = { profiles: [{ id: 'p1', profileName: d.profileName || 'Portfolio', sheetId: d.sheetId, recordUrl: d.recordUrl, writeKey: d.writeKey }], activeProfileId: 'p1' };
      localStorage.setItem(_CFG_KEY, JSON.stringify(migrated));
      return migrated;
    }
    return d?.profiles?.length ? d : null;
  } catch { return null; }
}
function _saveCfg(d) { localStorage.setItem(_CFG_KEY, JSON.stringify(d)); }
function _activeProfile() {
  if (!_cfg?.profiles?.length) return null;
  return _cfg.profiles.find(p => p.id === _cfg.activeProfileId) || _cfg.profiles[0];
}
function _buildUrls(c) {
  const b = `https://docs.google.com/spreadsheets/d/${c.sheetId}/gviz/tq?tqx=out:json&sheet=`;
  return { SHEET_URL: b+'Claude', TRANSACTION_URL: b+'transactions', TX_LIST_URL: b+'transactions',
           HISTORY_URL: b+'History', CALENDAR_URL: b+'Calendar', PLAN_URL: b+'Plan',
           RECORD_URL: c.recordUrl, WRITE_KEY: c.writeKey };
}
function _applyActiveProfile() {
  const a = _activeProfile();
  if (!a) return;
  const u = _buildUrls(a);
  SHEET_URL = u.SHEET_URL; TRANSACTION_URL = u.TRANSACTION_URL; TX_LIST_URL = u.TX_LIST_URL;
  HISTORY_URL = u.HISTORY_URL; CALENDAR_URL = u.CALENDAR_URL; PLAN_URL = u.PLAN_URL;
  RECORD_URL = u.RECORD_URL; _WRITE_KEY = u.WRITE_KEY;
}

// #reset hash clears config (escape hatch)
if (location.hash === '#reset') { localStorage.removeItem(_CFG_KEY); history.replaceState(null, '', location.pathname); }
let _cfg = _loadCfg();
let _u   = (() => { const a = _activeProfile(); return a ? _buildUrls(a) : {}; })();
let SHEET_URL       = _u.SHEET_URL       || '';

let TX_LIST_URL     = _u.TX_LIST_URL     || '';

// ── Write helper — injects auth key on every mutating request ─────────────────
async function recordFetch(params, needsResponse = false) {
  const p = params instanceof URLSearchParams ? params : new URLSearchParams(params);
  p.set('key', _WRITE_KEY);
  const url = `${RECORD_URL}?${p}`;
  if (needsResponse) {
    try { const r = await fetch(url); if (r.ok) return await r.json(); } catch (_) {}
    try { await fetch(url, { mode: 'no-cors' }); } catch (_) {}
    return null;
  }
  try { await fetch(url, { mode: 'no-cors' }); } catch (_) {}
}

function updateTxAllocationBars(shares, price) {
  const barsEl = document.getElementById('txAllocBars');
  if (!barsEl || !currentModel) return;
  const tickerEl = document.getElementById('txTicker');
  const sym = tickerEl?.value === '__custom__'
    ? (document.getElementById('txTickerCustom')?.value?.trim()?.toUpperCase() || '')
    : (tickerEl?.value || '');
  if (!sym || sym === '__custom__') { barsEl.innerHTML = ''; return; }

  const pos       = currentModel.positions.find(p => p.symbol === sym)
                 || (currentModel.sgovPos?.symbol === sym ? currentModel.sgovPos : null);
  const currValue = pos?.currentValue ?? 0;
  const isSell    = txType === 'Sell';
  const tradeVal  = shares * price;
  const addValue  = isSell ? -Math.min(tradeVal, currValue) : tradeVal;
  const newValue  = Math.max(0, currValue + addValue);
  const currTotal = currentModel.totalCurrent;
  const newTotal  = isSell ? currTotal : currTotal + tradeVal; // sell: cash absorbs, total same
  const investable = currentModel.investable;
  const target    = pos?.target != null ? pos.target * 100 : null;
  const targetAmt = target != null ? (pos.target * investable) : null;

  const currW = currTotal > 0 ? currValue / currTotal * 100 : 0;
  const newW  = newTotal  > 0 ? newValue  / newTotal  * 100 : 0;
  const color = colorFor(sym);

  // Bar 1: weight bar (current → projected)
  const scaleW  = Math.max(newW, currW, target ?? 0, 1);
  const bar = (val, opacity='1') => `<div style="position:absolute;left:0;top:0;height:100%;width:${Math.min(val/scaleW*100,100).toFixed(1)}%;background:${color};opacity:${opacity};border-radius:4px;transition:width .3s"></div>`;
  const tick = pct => pct != null ? `<div style="position:absolute;top:-3px;height:12px;width:2px;background:var(--ink);opacity:.7;left:${Math.min(pct/scaleW*100,100).toFixed(1)}%;border-radius:1px"></div>` : '';

  // Bar 2: vs target (0–100% of target)
  const tBar = target != null ? (() => {
    const currPT = target > 0 ? Math.min(currValue/(targetAmt||1)*100, 150) : 0;
    const newPT  = target > 0 ? Math.min(newValue /(targetAmt||1)*100, 150) : 0;
    const scaleT = Math.max(newPT, currPT, 100);
    const needMore = addValue > 0 ? targetAmt - newValue : targetAmt - currValue;
    const msg = currValue >= (targetAmt??0)
      ? `<span style="color:#a8762a">Overweight ${fmtCurr(currValue-(targetAmt??0))}</span>`
      : addValue > 0 && newValue >= (targetAmt??0)
        ? `<span style="color:var(--gain)">${t('reaches_target_msg')}</span>`
        : `<span>${t('still_need_msg')} ${fmtCurr(Math.max(0,needMore))} ${t('to_reach_target_msg')}</span>`;
    return `<div style="margin-top:8px">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:3px">
        <span>vs Target (${target.toFixed(1)}% · ${fmtCurr(targetAmt)})</span>
        ${tradeVal>0?`<span style="color:${isSell?'var(--loss)':color};font-weight:600">${(newValue/(targetAmt||1)*100).toFixed(0)}% of target</span>`:''}
      </div>
      <div style="position:relative;height:6px;background:var(--line);border-radius:4px;overflow:hidden">
        ${bar(currPT,'0.35')}${tradeVal>0?bar(newPT):''}
        <div style="position:absolute;top:-3px;height:12px;width:2px;background:var(--ink);opacity:.7;left:${(100/scaleT*100).toFixed(1)}%;border-radius:1px"></div>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px">${msg}</div>
    </div>`;
  })() : '';

  // Determine if new weight exceeds target (show red overflow)
  const overTarget  = target != null && newW > target;
  const barNewColor = overTarget ? 'var(--loss)' : (isSell ? 'var(--loss)' : color);

  // Bar 1: portfolio weight bar with split (normal fill + red overflow)
  const scaleW2 = Math.max(newW, currW, target ?? 0, 1);
  const barSeg  = (pct, col, opacity='1') =>
    `<div style="position:absolute;left:0;top:0;height:100%;width:${Math.min(pct/scaleW2*100,100).toFixed(1)}%;background:${col};opacity:${opacity};border-radius:4px;transition:width .3s"></div>`;
  const tickMark = pct => pct != null
    ? `<div style="position:absolute;top:-3px;height:12px;width:2px;background:var(--ink);opacity:.7;left:${Math.min(pct/scaleW2*100,100).toFixed(1)}%;border-radius:1px"></div>`
    : '';

  // current value / new value display
  const valueRow = `<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:6px">
    <div><span style="color:var(--muted)">Current </span><span style="font-weight:600">${fmtCurr(currValue)}</span> <span style="color:var(--muted);font-size:9px">(${currW.toFixed(1)}%)</span></div>
    ${tradeVal>0?`<div><span style="color:var(--muted)">${isSell?'After sell ':'After buy '}</span><span style="font-weight:600;color:${barNewColor}">${fmtCurr(newValue)}</span> <span style="color:var(--muted);font-size:9px">(${newW.toFixed(1)}%)</span></div>`:''}
  </div>`;

  // Realized P/L for sell
  let realizedPnlHtml = '';
  if (isSell && tradeVal > 0 && pos?.avgPrice > 0) {
    const { comm, tax } = calcFees(tradeVal);
    const grossPnl = (price - pos.avgPrice) * shares;
    const netPnl   = grossPnl - comm - tax;
    const up       = netPnl >= 0;
    const clr      = up ? 'var(--gain)' : 'var(--loss)';
    realizedPnlHtml = `
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--line)">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="color:var(--muted)">Realized P/L</span>
        <span style="font-weight:700;color:${clr}">${up?'+':''}${fmtCurr(netPnl)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:2px">
        <span>Avg cost ${fmtCurr(pos.avgPrice)} · Sell ${fmtCurr(price)}</span>
        <span>Gross ${up?'+':''}${fmtCurr(grossPnl)}</span>
      </div>
    </div>`;
  }

  barsEl.innerHTML = `<div style="margin-top:10px;padding:10px;background:var(--track);border-radius:8px;font-size:11px">
    <div style="font-weight:600;color:var(--muted);margin-bottom:8px;font-size:10px;text-transform:uppercase;letter-spacing:.5px">${t('allocation_preview_label')} · ${sym}</div>
    ${valueRow}
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:3px">
      <span>${t('portfolio_weight_label')}</span>
      <span>${currW.toFixed(1)}%${tradeVal>0?` → <strong style="color:${barNewColor}">${newW.toFixed(1)}%</strong>`:''}</span>
    </div>
    <div style="position:relative;height:6px;background:var(--line);border-radius:4px;overflow:hidden">
      ${barSeg(currW, color, '0.35')}
      ${tradeVal>0 ? (overTarget
        ? barSeg(target??newW, color) + barSeg(newW, 'var(--loss)')
        : barSeg(newW, barNewColor))
      : ''}
      ${tickMark(target)}
    </div>
    ${tBar}
    ${realizedPnlHtml}
  </div>`;
}

function calcFees(tv) {
  const noComm = document.getElementById('txNoCommission')?.checked;
  const comm = noComm ? 0 : tv * 0.0015;
  const tax  = comm * 0.07;
  return { comm, tax, buyTotal: tv + comm + tax, sellNet: tv - comm - tax };
}

window.updateTxCashPreview = function() {
  const shares = parseFloat(document.getElementById('txShares')?.value) || 0;
  const price  = parseFloat(document.getElementById('txPrice')?.value)  || 0;
  const tv     = shares * price;
  const isSell = txType === 'Sell';
  const { comm, tax, buyTotal, sellNet } = calcFees(tv);
  const amount = isSell ? sellNet : buyTotal;
  const fcd = currentModel?.rawFcd ?? 0;
  const usd = currentModel?.rawUsd ?? 0;
  ['FCD','USD'].forEach(s => {
    const el = document.getElementById('txCashInfo'+s);

    const bal = s==='FCD' ? fcd : usd;
    if (tv <= 0) { el.innerHTML = `<span style="color:var(--muted)">Balance: ${fmtCurr(bal)}</span>`; return; }
    const feeNote = (comm+tax) > 0
      ? `<span style="color:var(--muted);font-size:9px"> (fee ${fmtCurr(comm+tax)})</span>` : '';
    if (isSell) {
      el.innerHTML = `<span style="color:var(--muted)">Balance: ${fmtCurr(bal)}</span><br><span style="color:var(--gain)">+${fmtCurr(sellNet)} → ${fmtCurr(bal+sellNet)}</span>${feeNote}`;
    } else {
      const after = bal - buyTotal;
      el.innerHTML = `<span style="color:var(--muted)">Balance: ${fmtCurr(bal)}</span><br><span style="color:${after<0?'var(--loss)':'var(--muted)'}">−${fmtCurr(buyTotal)} → ${fmtCurr(after)}</span>${feeNote}`;

  });
};

async function postTransactionUpdates(ticker, shares, price, txTypeVal) {
  const allPos = [...(currentModel?.positions||[]), ...(currentModel?.sgovPos?[currentModel.sgovPos]:[])];
  const pos = allPos.find(p => p.symbol === ticker);
  // 1. Recalculate Qty and Avg Cost (upsert — creates row if symbol is new)
  if (txTypeVal === 'Buy' || txTypeVal === 'Sell') {
    let newQty, newAvg;
    if (txTypeVal === 'Buy') {
      newQty = (pos?.qty||0) + shares;
      newAvg = newQty > 0 ? ((pos?.qty||0)*(pos?.avgPrice||0) + shares*price) / newQty : price;
    } else {
      newQty = Math.max(0, (pos?.qty||0) - shares);
      newAvg = pos?.avgPrice || 0;
    }
    // Sell All: if qty reaches 0, delete from Claude sheet
    if (txSellAll && txTypeVal === 'Sell' && newQty < 0.0001) {
      recordFetch({ action:'removeSymbol', symbol:ticker });
      txSellAll = false;
    } else {
      recordFetch({ action:'updateSymbol', symbol:ticker, qty:newQty.toFixed(6), avgPrice:newAvg.toFixed(6) });
      txSellAll = false;
    }
  }
  // 2. Deduct / add cash (including commission + tax)
  const src  = document.getElementById('txCashSource')?.value || 'USD';
  const tv   = shares * price;
  const { buyTotal, sellNet } = calcFees(tv);
  const amount = txTypeVal === 'Buy' ? buyTotal : sellNet;
  const fcd  = currentModel?.rawFcd ?? 0;
  const usd  = currentModel?.rawUsd ?? 0;
  let nFcd = fcd, nUsd = usd;
  if (txTypeVal === 'Buy')  { if (src==='FCD') nFcd = fcd-amount; else nUsd = usd-amount; }
  if (txTypeVal === 'Sell') { if (src==='FCD') nFcd = fcd+amount; else nUsd = usd+amount; }
  recordFetch({ action:'updateCash', fcd:nFcd.toFixed(4), usd:nUsd.toFixed(4) });
}

  const ticker = tickerEl.value === '__custom__'
    ? document.getElementById('txTickerCustom').value.trim().toUpperCase()
    : tickerEl.value;
  const shares = parseFloat(document.getElementById('txShares').value) || 0;
  const price  = parseFloat(document.getElementById('txPrice').value)  || 0;
  const noCommission = document.getElementById('txNoCommission')?.checked ? 'TRUE' : 'FALSE';
  const statusEl = document.getElementById('txStatus');
  if (!ticker) { statusEl.innerHTML = '<span style="color:var(--loss)">Enter a ticker.</span>'; return; }
  if (!shares || !price) { statusEl.innerHTML = '<span style="color:var(--loss)">Enter shares and price.</span>'; return; }
  const tv = shares * price;
  document.getElementById('txSubmit').disabled = true;
  statusEl.innerHTML = '<span style="color:var(--muted)">Saving…</span>';
  try {
    const params = new URLSearchParams({
      date: document.getElementById('txDate').value,
      time: document.getElementById('txTime').value,
      type: txType, ticker, shares, price,
      tradeValue: tv.toFixed(4),

};

async function fetchTxList() {
  const res  = await fetch(TX_LIST_URL);
  const text = await res.text();
  const json = JSON.parse(text.substring(text.indexOf('(') + 1, text.lastIndexOf(')')));
  const table = json.table;
  const idx = {};
  table.cols.forEach((c, i) => { if (c.label) idx[c.label] = i; });
  const cell = (row, label) => { const i = idx[label]; if (i == null) return null; const c = row.c[i]; return c == null ? null : c.v; };

  const parseDate = raw => {
    if (!raw) return null;
    if (typeof raw === 'string' && raw.startsWith('Date(')) {
      const p = raw.slice(5,-1).split(',').map(Number);
      return new Date(Date.UTC(p[0], p[1], p[2])).toISOString().slice(0,10);
    }
    return new Date(raw).toISOString().slice(0,10);
  };
  const parseTime = raw => {
    if (raw == null) return '';
    if (typeof raw === 'string' && raw.startsWith('Date(')) {
      const p = raw.slice(5,-1).split(',').map(Number);
      return `${String(p[3]||0).padStart(2,'0')}:${String(p[4]||0).padStart(2,'0')}:${String(p[5]||0).padStart(2,'0')}`;
    }
    return String(raw);
  };

  const out = table.rows.map((r, i) => ({
    row:            i + 2,
    date:           parseDate(cell(r, 'Date')),
    time:           parseTime(cell(r, 'Time')),
    type:           cell(r, 'Type') || 'Buy',
    ticker:         cell(r, 'Ticker') || '',
    shares:         Number(cell(r, 'Shares')) || 0,
    price:          Number(cell(r, 'Price_Per_Share')) || 0,
    tradeValue:     Number(cell(r, 'Trade_Value')) || 0,
    com:            Number(cell(r, 'Com')) || 0,
    tax:            Number(cell(r, 'Tax')) || 0,
    total:          Number(cell(r, 'Trade_Value+Fee') ?? cell(r, 'Trade_Value Fee') ?? 0),
    commissionFree: cell(r, 'Commission_Free') === true || cell(r, 'Commission_Free') === 'TRUE',
  })).filter(x => x.date && x.ticker);

  return out;
}

async function refreshTxPanel() {
  const body = document.getElementById('txPanelBody');
  const btn  = document.getElementById('txPanelRefreshBtn');
  if (!body) return;
  if (btn) btn.classList.add('refreshing');
  body.innerHTML = `<div class="tx-panel-status">${t('loading_msg')}</div>`;
  try {
    txList = await fetchTxList();
    renderTxPanel(txList);
  } catch(e) {
    body.innerHTML = `<div class="tx-panel-status error">Failed to load: ${e.message}<br><small>Make sure the sheet is shared as "Anyone with link — Viewer".</small></div>`;

            <th style="text-align:right;padding:5px 8px">${t('Shares')}</th>
            <th style="text-align:right;padding:5px 8px">${t('Price')}</th>
            <th style="text-align:right;padding:5px 8px">${t('Value')}</th>
            <th style="text-align:right;padding:5px 8px">${t('Total')}</th>
