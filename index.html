// ── Price history: read / trigger / wait ─────────────────────────────────────
async function readHistory() {
  try {
    const res  = await fetch(HISTORY_URL);
    const text = await res.text();
    const json = JSON.parse(text.substring(text.indexOf('(') + 1, text.lastIndexOf(')')));
    const table = json.table;
    if (!table?.rows?.length) return { prices: {}, dividends: {} };
    const idx = {};
    table.cols.forEach((c, i) => { if (c.label) idx[c.label] = i; });
    const cell = (row, label) => { const i = idx[label]; if (i == null) return null; const c = row.c[i]; return c == null ? null : c.v; };
    const prices = {}, dividends = {};
    for (const row of table.rows) {
      const rawDate = cell(row, 'Date');
      const ticker  = cell(row, 'Ticker');
      if (!rawDate || !ticker) continue;
      let dateStr;
      if (typeof rawDate === 'string' && rawDate.startsWith('Date(')) {
        const pts = rawDate.slice(5,-1).split(',').map(Number);
        dateStr = new Date(Date.UTC(pts[0], pts[1], pts[2])).toISOString().slice(0,10);
      } else { dateStr = new Date(rawDate).toISOString().slice(0,10); }
      const close = cell(row, 'Close'), div = cell(row, 'Dividend');
      if (close != null && close !== '') { if (!prices[ticker]) prices[ticker] = {}; prices[ticker][dateStr] = close; }
      if (div   != null && div   !== '' && Number(div) > 0) { if (!dividends[ticker]) dividends[ticker] = {}; dividends[ticker][dateStr] = Number(div); }
    }
    return { prices, dividends };
  } catch(e) { console.error('readHistory:', e); return { prices: {}, dividends: {} }; }
}

async function triggerHistoryFetch(tickers, fromDate) {
  const params = new URLSearchParams({ action: 'fetchHistory', tickers: tickers.join(','), from: fromDate });
  return await recordFetch(params, true);
}

async function loadBenchmark(retry = 0) {
  const MAX_RETRY = 4;
  const setStatus = msg => { const el = document.getElementById('benchmarkStatus'); if (el) el.textContent = msg; };
  const showChart = () => {
    const s = document.getElementById('benchmarkStatus');
    const w = document.getElementById('benchmarkChartWrap');
    if (s) s.style.display = 'none';
    if (w) w.style.display = 'block';
  };

  try {
    setStatus(retry > 0 ? `Retrying… (attempt ${retry + 1}/${MAX_RETRY + 1})` : t('fetching_tx_msg'));
    const txs = await fetchTransactions();
    if (!txs?.length) { setStatus(t('no_tx_available')); return; }

    const sorted = [...txs].sort((a,b) => a.dateStr.localeCompare(b.dateStr));
    const firstBuy = sorted.find(t => t.type === 'Buy');
    if (!firstBuy) { setStatus(t('no_buy_tx')); return; }

    const tickers = [...new Set(txs.map(t => t.ticker)), 'SPY', 'QQQ'];

    // Phase 1: render immediately with whatever is already in the History sheet
    setStatus(t('reading_history_msg'));
    let hist = await readHistory();
    historyCache = hist;

    const applyHist = h => {
      const data = computeBenchmark(txs, h.prices);
      if (data) {
        showChart();
        benchmarkData = data;
        renderBenchmarkChartFiltered(data, chartTimeFilter);
        benchmarkLoaded = true;
      }
      if (txCache?.length && currentModel) {
        const dividends = computeDividends(txCache);
        renderStatCards(currentModel, { ...lastTxData, dividends });
        renderDividendBreakdown(txCache);
        const card = document.getElementById('divBreakdownCard');
        if (card && dividends.gross > 0) card.style.display = '';
        renderHoldingsPerformance();
      }
      return !!data;
    };

    applyHist(hist);

    // Phase 2: fetch only missing/stale tickers in background, then quietly re-render
    const targetDate = new Date(Date.now() - 86400000).toISOString().slice(0,10);

    // Sold-out tickers only need history through their last transaction date, not today.
    const _netQty = {}, _lastTxDate = {};
    for (const tx of txs) {
      _netQty[tx.ticker] = (_netQty[tx.ticker] || 0) + (tx.type === 'Buy' ? tx.shares : -tx.shares);
      if (!_lastTxDate[tx.ticker] || tx.dateStr > _lastTxDate[tx.ticker]) _lastTxDate[tx.ticker] = tx.dateStr;
    }

    const missing = tickers.filter(tk => {
      const dates = hist.prices[tk];
      if (!dates || !Object.keys(dates).length) return true;
      const neededThrough = (_netQty[tk] ?? 1) < 1e-9 ? _lastTxDate[tk] : targetDate;
      return Object.keys(dates).sort().pop() < neededThrough;
    });

    if (missing.length > 0) {
      if (!benchmarkLoaded) setStatus(`Fetching ${missing.length} ticker(s) via Apps Script… (this may take ~30s first time)`);
      await triggerHistoryFetch(missing, firstBuy.dateStr);
      const deadline = Date.now() + 120000;
      while (Date.now() < deadline) {
        await new Promise(r => setTimeout(r, 4000));
        hist = await readHistory();
        historyCache = hist;
        applyHist(hist);
        const still = missing.filter(tk => !hist.prices[tk] || !Object.keys(hist.prices[tk]).length);
        if (!still.length) break;
        if (!benchmarkLoaded) setStatus(`Waiting for history data… (${still.length} ticker(s) remaining)`);
      }
    }

    if (!benchmarkLoaded) {
      if (retry < MAX_RETRY) {
        const wait = (retry + 1) * 4;
        setStatus(`Not enough price data — retrying in ${wait}s…`);
        setTimeout(() => loadBenchmark(retry + 1), wait * 1000);
      } else {
        setStatus(t('not_enough_data_msg'));
      }
    }
  } catch(e) {
    if (retry < MAX_RETRY) {
      const wait = (retry + 1) * 4;
      setStatus(`Error: ${e.message} — retrying in ${wait}s…`);
      setTimeout(() => loadBenchmark(retry + 1), wait * 1000);
    } else {
      setStatus(`${t('benchmark_error_msg')} ${e.message}`);
    }
    console.error(e);
  }
}

// ── Realized P&L chart ───────────────────────────────────────────────────────
function computePnLTimeline(txs) {
  const holdings = {};
  const trades   = [];
  const sorted   = [...txs].sort((a, b) => {
    const d = a.dateStr.localeCompare(b.dateStr);
    return d !== 0 ? d : (a.time || '').localeCompare(b.time || '');
  });
  for (const tx of sorted) {
    if (!tx.ticker) continue;
    if (tx.ticker === 'SGOV') continue;
    if (tx.type === 'Dividend') continue;
    if (!holdings[tx.ticker]) holdings[tx.ticker] = { shares: 0, avgCost: 0 };
    const h = holdings[tx.ticker];
    if (tx.type === 'Buy') {
      const newShares = h.shares + tx.shares;
      h.avgCost  = newShares > 0 ? (h.shares * h.avgCost + tx.shares * tx.price) / newShares : tx.price;
      h.shares   = newShares;
    } else if (tx.type === 'Sell') {
      const pnl = (tx.price - h.avgCost) * tx.shares;
      trades.push({ date: tx.dateStr, ticker: tx.ticker, pnl });
      h.shares = Math.max(0, h.shares - tx.shares);
    }
  }
  return trades;
}

function renderPnLChart(txs) {
  pnlData = computePnLTimeline(txs);
  renderPnLChartFromTrades(pnlData);
  renderHoldingsPerformance();
}

          },

        }
      }
    }

// ── Shared chart time filter ──────────────────────────────────────────────────
function periodStart(filter) {
  const n = Date.now();
  switch(filter) {
    case '7D':  return new Date(n - 7*86400000).toISOString().slice(0,10);
    case '1M':  return new Date(n - 30*86400000).toISOString().slice(0,10);
    case '3M':  return new Date(n - 90*86400000).toISOString().slice(0,10);
    case 'YTD': return new Date().getFullYear() + '-01-01';
    case '1Y':  return new Date(n - 365*86400000).toISOString().slice(0,10);
    default:    return null;
  }
}

function renderBenchmarkChartFiltered(data, filter) {
  let { labels, portLine, spyLine, qqqLine } = data;
  const start = periodStart(filter);
  if (start) {
    let i = labels.findIndex(d => d >= start);
    if (i < 0) i = Math.max(0, labels.length - 1);
    labels   = labels.slice(i);
    portLine = portLine.slice(i);
    spyLine  = spyLine.slice(i);
    qqqLine  = qqqLine.slice(i);
    if (labels.length) {
      const [pb, sb, qb] = [portLine[0]||0, spyLine[0]||0, qqqLine[0]||0];
      portLine = portLine.map(v => +(v-pb).toFixed(2));
      spyLine  = spyLine.map( v => +(v-sb).toFixed(2));
      qqqLine  = qqqLine.map( v => +(v-qb).toFixed(2));
    }
  }
  renderBenchmarkChart({ labels, portLine, spyLine, qqqLine });
}

window.applyChartFilter = function(filter) {
  chartTimeFilter = filter;
  document.querySelectorAll('.tf-chart-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tf === filter));
  if (benchmarkData) renderBenchmarkChartFiltered(benchmarkData, filter);
  if (pnlData) {
    const start = periodStart(filter);
    const filtered = !start ? pnlData : pnlData.filter(t => t.date >= start);
    renderPnLChartFromTrades(filtered);
  }
};

// ── Setup modal — modes: 'first' | 'add' | 'edit' ────────────────────────────
let _setupMode = 'first';

function showSetupModal(mode = 'first') {
  _setupMode = mode;
  const isEdit = mode === 'edit';
  const isAdd  = mode === 'add';
  const cur    = isEdit ? _activeProfile() : null;
  const title  = isEdit ? 'Edit account' : isAdd ? 'Add account' : 'Setup';
  const sub    = isEdit ? `Editing ${cur?.profileName || ''}` : isAdd ? 'Add another portfolio' : 'One-time per device · saved locally';
  const btn    = isEdit ? 'Save Changes' : isAdd ? 'Add Account' : 'Save & Load Portfolio';
  const keyHint = isEdit ? 'Leave blank to keep current key' : 'Set in Apps Script → Script Properties → WRITE_KEY';

  const html = `
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);background-image:var(--bg-grain)">
    <div style="background:var(--card);border:1px solid var(--card-edge);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:28px;width:100%;max-width:420px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--line)">
        <div class="brand-mark"><svg viewBox="0 0 32 32" fill="none"><path d="M4 24 L10 17 L15 20 L22 10 L28 6" stroke="#faf3e0" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 6 L28 6 L28 12" stroke="#faf3e0" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div>
          <div style="font-family:var(--font-display);font-size:20px;font-weight:600;letter-spacing:-.3px;font-style:italic">${title}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${sub}</div>
        </div>
      </div>
      <div class="tx-field">
        <label class="tx-label">Profile name</label>
        <input class="tx-input" id="setupName" placeholder="e.g. Joe" autocomplete="off" value="${cur?.profileName || ''}">
      </div>
      <div class="tx-field">
        <label class="tx-label">Google Sheet ID *</label>
        <input class="tx-input" id="setupSheetId" placeholder="11pdwfY3j…" autocomplete="off" value="${cur?.sheetId || ''}">
        <div style="font-size:10px;color:var(--muted);margin-top:4px">From the sheet URL: /spreadsheets/d/<strong style="color:var(--terracotta)">THIS_PART</strong>/edit</div>
      </div>
      <div class="tx-field">
        <label class="tx-label">Apps Script URL *</label>
        <input class="tx-input" id="setupRecordUrl" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off" value="${cur?.recordUrl || ''}">
      </div>
      <div class="tx-field">
        <label class="tx-label">Write key${isEdit ? '' : ' *'}</label>
        <input class="tx-input" id="setupWriteKey" type="password" placeholder="${keyHint}" autocomplete="new-password">
        <div style="font-size:10px;color:var(--muted);margin-top:4px">Protects all write operations. Never stored in code.</div>
      </div>
      <button class="tx-submit" onclick="submitSetup()">${btn}</button>
      ${(isAdd || isEdit) ? `<button onclick="closeSetupModal()" style="width:100%;margin-top:8px;padding:10px;background:transparent;border:1px solid var(--line);border-radius:var(--radius-pill);color:var(--muted);font-family:var(--font-ui);font-size:13px;font-weight:600;cursor:pointer">Cancel</button>` : ''}
      <div id="setupError" style="font-size:12px;color:var(--loss);text-align:center;margin-top:8px;min-height:18px"></div>
    </div>
  </div>`;

  if (isAdd || isEdit) {
    // Show as modal overlay
    let overlay = document.getElementById('setupOverlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'setupOverlay';
      overlay.className = 'tx-overlay';
      document.body.appendChild(overlay);
    }
    overlay.innerHTML = `<div onclick="event.stopPropagation()">${html}</div>`;
    overlay.classList.add('open');
    overlay.onclick = e => { if (e.target === overlay) closeSetupModal(); };
  } else {
    document.getElementById('root').innerHTML = html;
  }
  setTimeout(() => {
    const first = ['setupName','setupSheetId','setupRecordUrl','setupWriteKey']
      .map(id => document.getElementById(id)).find(el => !el?.value);
    first?.focus();
  }, 50);
}

window.closeSetupModal = function() {
  const overlay = document.getElementById('setupOverlay');
  if (overlay) overlay.classList.remove('open');
};

window.submitSetup = function() {
  const name      = (document.getElementById('setupName')?.value.trim()) || 'Portfolio';
  const sheetId   = document.getElementById('setupSheetId')?.value.trim()   || '';
  const recordUrl = document.getElementById('setupRecordUrl')?.value.trim() || '';
  const writeKey  = document.getElementById('setupWriteKey')?.value.trim()  || '';
  const errEl     = document.getElementById('setupError');

  if (!sheetId || !/^[A-Za-z0-9_-]{20,}$/.test(sheetId)) {
    errEl.textContent = 'Invalid Sheet ID — paste the long alphanumeric segment from the sheet URL.'; return;
  }
  if (!recordUrl || !recordUrl.startsWith('https://script.google.com/')) {
    errEl.textContent = 'Invalid Apps Script URL.'; return;
  }
  if (!writeKey && _setupMode !== 'edit') {
    errEl.textContent = 'Write key is required (set WRITE_KEY in Apps Script → Script Properties).'; return;
  }

  const profileData = { profileName: name, sheetId, recordUrl };
  if (writeKey) profileData.writeKey = writeKey;

  if (_setupMode === 'edit') {
    const idx = _cfg?.profiles.findIndex(p => p.id === _cfg.activeProfileId);
    if (idx >= 0) Object.assign(_cfg.profiles[idx], profileData);
    _saveCfg(_cfg);
    closeSetupModal();
    _applyActiveProfile();
    shellBuilt = false;
  } else if (_setupMode === 'add') {
    const newProfile = { id: 'p' + Date.now(), ...profileData };
    if (!newProfile.writeKey) newProfile.writeKey = '';
    _cfg.profiles.push(newProfile);
    _cfg.activeProfileId = newProfile.id;
    _saveCfg(_cfg);
    closeSetupModal();
    _applyActiveProfile();
    shellBuilt = false; benchmarkLoaded = false; benchmarkData = null; pnlData = null; txCache = null;
  } else {
    // 'first' — brand new setup
    const newProfile = { id: 'p' + Date.now(), ...profileData };
    _cfg = { profiles: [newProfile], activeProfileId: newProfile.id };
    _saveCfg(_cfg);
    _applyActiveProfile();
    shellBuilt = false; benchmarkLoaded = false; benchmarkData = null; pnlData = null; txCache = null;
  }
  init();
};

// ── Account switcher ──────────────────────────────────────────────────────────
function _accountMenuEl() {
  let menu = document.getElementById('accountMenuEl');
  if (!menu) {
    menu = document.createElement('div');
    menu.id = 'accountMenuEl';
    menu.className = 'account-menu';
    document.body.appendChild(menu);
    document.addEventListener('click', e => {
      if (!e.target.closest('#accountPill') && !e.target.closest('#accountMenuEl')) {
        _closeAccountMenu();
      }
    });
  }
  return menu;
}
function _closeAccountMenu() {
  _accountMenuEl().classList.remove('open');
  document.getElementById('accountPill')?.classList.remove('open');
}
window.toggleAccountMenu = function(e) {
  e.stopPropagation();
  const pill = document.getElementById('accountPill');
  const menu = _accountMenuEl();
  if (menu.classList.contains('open')) { _closeAccountMenu(); return; }

  const active   = _cfg?.activeProfileId;
  const profiles = _cfg?.profiles || [];
  menu.innerHTML = profiles.map(p => `
    <button class="account-menu-item${p.id === active ? ' is-active' : ''}" onclick="_closeAccountMenu();switchToProfile('${p.id}')">
      <span class="ami-check">${p.id === active ? '✓' : ''}</span>
      <span class="ami-dot" style="background:${colorFor(p.profileName)}"></span>
      <span style="flex:1;text-align:left">${p.profileName}</span>
    </button>`).join('') + `
  <div class="account-menu-divider"></div>
  <button class="account-menu-item" onclick="_closeAccountMenu();showSetupModal('add')">
    <span class="ami-check" style="font-size:14px;font-weight:400">+</span>
    <span style="width:8px"></span><span>Add account</span>
  </button>
  <button class="account-menu-item" onclick="_closeAccountMenu();showSetupModal('edit')">
    <span class="ami-check" style="font-size:11px">✎</span>
    <span style="width:8px"></span><span>Edit config</span>
  </button>
  <button class="account-menu-item danger" onclick="_closeAccountMenu();signOutCurrentProfile()">
    <span class="ami-check" style="font-size:11px">↩</span>
    <span style="width:8px"></span><span>Sign out</span>
  </button>`;

  const rect = pill.getBoundingClientRect();
  menu.style.top   = (rect.bottom + 6) + 'px';
  menu.style.right = (window.innerWidth - rect.right) + 'px';
  menu.style.left  = 'auto';
  menu.classList.add('open');
  pill.classList.add('open');
};

window.switchToProfile = function(profileId) {
  if (!_cfg || _cfg.activeProfileId === profileId) return;
  _cfg.activeProfileId = profileId;
  _saveCfg(_cfg);
  location.reload();
};

window.signOutCurrentProfile = function() {
  const cur = _activeProfile();
  if (!cur) return;
  if (!confirm(`Sign out of "${cur.profileName}"?`)) return;
  _cfg.profiles = _cfg.profiles.filter(p => p.id !== cur.id);
  if (!_cfg.profiles.length) { localStorage.removeItem(_CFG_KEY); location.reload(); return; }
  _cfg.activeProfileId = _cfg.profiles[0].id;
  _saveCfg(_cfg);
  location.reload();
};

// ── Allocation Management ─────────────────────────────────────────────────────
let allocMgmtState  = null; // { selectedSym, targets:{sym:{target,category,sector,name}} }
let allocChartInsts = {};

function destroyAllocCharts() {
  Object.values(allocChartInsts).forEach(c => { try { c.destroy(); } catch(_) {} });
  allocChartInsts = {};
}

window.openAllocMgmt = function() {
  if (!currentModel) return;
  allocMgmtState = { selectedSym: null, targets: {}, origTargets: {} };
  const allPos  = [...currentModel.positions, ...(currentModel.sgovPos ? [currentModel.sgovPos] : [])];
  const wlItems = (currentModel.watchlist || []).filter(w => !allPos.find(p => p.symbol === w.symbol));
  allPos.forEach(p => {
    allocMgmtState.targets[p.symbol]     = { target: p.target ?? 0, category: p.category || 'Other', sector: p.sector || 'Other', name: p.name || p.symbol, isPos: true };
    allocMgmtState.origTargets[p.symbol] = p.target ?? 0;
  });
  wlItems.forEach(w => {
    allocMgmtState.targets[w.symbol]     = { target: w.target ?? 0, category: w.category || 'Other', sector: w.sector || 'Other', name: w.name || w.symbol, isPos: false };
    allocMgmtState.origTargets[w.symbol] = w.target ?? 0;
  });
  allocMgmtState.selectedSym = allPos[0]?.symbol || null;
  // Fixed sort orders (positions first by target, watchlist appended)
  const sortByTarget = arr => [...arr].sort((a,b) => (b.target||0)-(a.target||0)).map(p=>p.symbol);
  allocMgmtState.symOrder = [...sortByTarget(allPos), ...sortByTarget(wlItems)];
  allocMgmtState.catOrders = {};
  [...new Set([...allPos, ...wlItems].map(p => p.category||'Other'))].forEach(cat => {
    allocMgmtState.catOrders[cat] = [...allPos,...wlItems].filter(p=>(p.category||'Other')===cat).sort((a,b)=>(b.target||0)-(a.target||0)).map(p=>p.symbol);
  });

  const overlay = document.getElementById('allocMgmtModal');
  if (!overlay) return;

  const mkOpt = (p, tag) => `<div class="alloc-sym-opt" data-sym="${p.symbol}" onclick="selectAllocSym('${p.symbol}')"
    style="padding:7px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px">
    <div style="width:8px;height:8px;border-radius:50%;background:${colorFor(p.symbol)};flex-shrink:0"></div>
    <strong style="color:var(--ink)">${p.symbol}</strong>
    <span style="color:var(--muted);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name||''}</span>
    ${tag ? `<span style="font-size:9px;font-weight:700;color:var(--muted);margin-left:auto;flex-shrink:0">${tag}</span>` : ''}
  </div>`;
  const opts = [...allPos.map(p => mkOpt(p,'')), ...wlItems.map(w => mkOpt(w,'Watch'))].join('');

  overlay.innerHTML = `<div class="tx-modal alloc-modal-wrap" style="max-width:1140px;width:calc(100vw - 32px);max-height:calc(100vh - 40px);overflow:hidden;display:flex;flex-direction:column" onclick="event.stopPropagation()">
    <div class="tx-header" style="flex-shrink:0">
      <div style="font-size:15px;font-weight:700">${t('alloc_management_title')}</div>
      <button class="tx-close" onclick="closeAllocMgmt()">×</button>
    </div>
    <div class="alloc-body-grid">
      <!-- LEFT -->
      <div class="alloc-left-panel" style="display:flex;flex-direction:column;min-height:0;overflow:hidden">
        <!-- Fixed: symbol picker + info area -->
        <div style="flex-shrink:0;display:flex;flex-direction:column;gap:10px;padding-bottom:8px">
          <div style="position:relative">
            <label style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px">${t('symbol_label')}</label>
            <input id="allocSymSearch" class="tx-input" placeholder="${t('search_positions_placeholder')}" autocomplete="off" style="width:100%"
              oninput="filterAllocSymList(this.value)"
              onfocus="document.getElementById('allocSymDrop').style.display='block'">
            <div id="allocSymDrop" style="display:none;position:absolute;top:100%;left:0;right:0;z-index:200;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);max-height:180px;overflow-y:auto;box-shadow:var(--shadow-lg)">${opts}</div>
          </div>
          <div id="allocInfoArea"></div>
        </div>
        <!-- Scrollable: All Positions list only -->
        <div class="alloc-sym-list" style="overflow-y:auto;flex:1;min-height:0;padding-right:2px">
          <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">${t('all_positions_label')}</div>
          <div id="allocPosList"></div>
        </div>
        <!-- Fixed: save button -->
        <div style="flex-shrink:0;padding-top:10px;border-top:1px solid var(--line);margin-top:4px">
          <button class="tx-submit" onclick="saveAllocToSheet()">${t('save_all_sheet_btn')}</button>
          <div class="tx-status" id="allocSaveStatus"></div>
        </div>
      </div>
      <!-- RIGHT: 4 donuts -->
      <div class="alloc-donuts-panel" style="display:grid;grid-template-rows:1fr 1fr;gap:12px;min-height:0;overflow:hidden">
        <div class="alloc-donuts-row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;min-height:0">
          <div class="card" style="padding:12px;margin:0;display:flex;flex-direction:column;min-height:0;overflow:hidden">
            <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:center;margin-bottom:4px;flex-shrink:0">Category Breakdown</div>
            <div style="flex:1;position:relative;min-height:0"><canvas id="allocCatChart"></canvas></div>
            <div style="text-align:center;height:14px;flex-shrink:0;margin-top:2px"><span id="allocFL_cat" style="font-size:9px;font-weight:700;display:none"></span></div>
          </div>
          <div class="card" style="padding:12px;margin:0;display:flex;flex-direction:column;min-height:0;overflow:hidden">
            <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:center;margin-bottom:4px;flex-shrink:0">Sector Breakdown</div>
            <div style="flex:1;position:relative;min-height:0"><canvas id="allocSecChart"></canvas></div>
            <div style="text-align:center;height:14px;flex-shrink:0;margin-top:2px"><span id="allocFL_sec" style="font-size:9px;font-weight:700;display:none"></span></div>
          </div>
        </div>
        <div class="alloc-donuts-row" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;min-height:0">
          <div class="card" style="padding:12px;margin:0;display:flex;flex-direction:column;min-height:0;overflow:hidden">
            <div id="allocAllTitle" style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:center;margin-bottom:4px;flex-shrink:0"></div>
            <div style="flex:1;position:relative;min-height:0"><canvas id="allocAllChart"></canvas></div>
            <div style="text-align:center;height:14px;flex-shrink:0;margin-top:2px"><span id="allocFL_all" style="font-size:9px;font-weight:700;display:none"></span></div>
          </div>
          <div class="card" style="padding:12px;margin:0;display:flex;flex-direction:column;min-height:0;overflow:hidden">
            <div id="allocCatSymTitle" style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;text-align:center;margin-bottom:4px;flex-shrink:0"></div>
            <div style="flex:1;position:relative;min-height:0"><canvas id="allocCatSymChart"></canvas></div>
            <div style="text-align:center;height:14px;flex-shrink:0;margin-top:2px"><span id="allocFL_sym" style="font-size:9px;font-weight:700;display:none"></span></div>
          </div>
        </div>
      </div>
    </div>
  </div>`;

  overlay.classList.add('open');
  overlay.addEventListener('click', e => {
    if (!e.target.closest('#allocSymSearch')   && !e.target.closest('#allocSymDrop'))
      document.getElementById('allocSymDrop')?.style && (document.getElementById('allocSymDrop').style.display = 'none');
    if (!e.target.closest('#allocWatchSearch') && !e.target.closest('#allocWatchDrop'))
      document.getElementById('allocWatchDrop')?.style && (document.getElementById('allocWatchDrop').style.display = 'none');
  });
  setTimeout(() => renderAllocMgmt(), 0);
};

window.closeAllocMgmt = function() {
  destroyAllocCharts();
  allocMgmtState = null;
  document.getElementById('allocMgmtModal')?.classList.remove('open');
};

window.selectAllocSym = function(sym) {
  if (!allocMgmtState?.targets[sym]) return;
  allocMgmtState.selectedSym = sym;
  const inp = document.getElementById('allocSymSearch');
  if (inp) inp.value = sym;
  const drop = document.getElementById('allocSymDrop');
  if (drop) drop.style.display = 'none';
  renderAllocMgmt();
};

window.filterAllocWatchList = function(q) {
  const drop = document.getElementById('allocWatchDrop');
  if (!drop || !currentModel?.watchlist) return;
  drop.style.display = 'block';
  const available = currentModel.watchlist.filter(w =>
    !allocMgmtState?.targets[w.symbol] &&
    (!q || w.symbol.toUpperCase().includes(q.toUpperCase()) || (w.name||'').toUpperCase().includes(q.toUpperCase()))
  );
  drop.innerHTML = available.length
    ? available.map(w => `<div class="alloc-sym-opt" onclick="addAllocWatchSym('${w.symbol}')"
        style="padding:7px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px">
        <div style="width:8px;height:8px;border-radius:50%;background:${colorFor(w.symbol)};flex-shrink:0"></div>
        <strong style="color:var(--ink)">${w.symbol}</strong>
        <span style="color:var(--muted);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${w.name||''}</span>
      </div>`).join('')
    : '<div style="padding:8px 10px;color:var(--muted);font-size:11px">No items to add</div>';
};

window.addAllocWatchSym = function(sym) {
  if (!allocMgmtState || allocMgmtState.targets[sym]) return;
  const w = currentModel?.watchlist.find(x => x.symbol === sym);
  if (!w) return;
  const entry = { target: w.target ?? 0, category: w.category || 'Other', sector: w.sector || 'Other', name: w.name || sym };
  allocMgmtState.targets[sym]      = entry;
  allocMgmtState.origTargets[sym]  = entry.target;
  // Append to fixed sort orders
  allocMgmtState.symOrder.push(sym);
  const cat = entry.category;
  if (!allocMgmtState.catOrders[cat]) allocMgmtState.catOrders[cat] = [];
  allocMgmtState.catOrders[cat].push(sym);
  // Clear search
  const inp = document.getElementById('allocWatchSearch');
  if (inp) inp.value = '';
  document.getElementById('allocWatchDrop').style.display = 'none';
  selectAllocSym(sym);
};

window.filterAllocSymList = function(q) {
  const drop = document.getElementById('allocSymDrop');
  if (!drop) return;
  drop.style.display = 'block';
  drop.querySelectorAll('.alloc-sym-opt').forEach(el => {
    el.style.display = (!q || el.dataset.sym.toUpperCase().includes(q.toUpperCase())) ? '' : 'none';
  });
};

function calcAllocBar(sym, targetPct, actualPct, investable, currentVal) {
  const targetDollar = (targetPct / 100) * investable;
  const pctOfTarget  = targetDollar > 0 ? currentVal / targetDollar * 100 : 0;
  const scaleMax     = Math.max(pctOfTarget, 100);
  return {
    barFillW:        (pctOfTarget / scaleMax * 100).toFixed(1),
    barTickL:        (100 / scaleMax * 100).toFixed(1),
    barTargetDollar: targetDollar,
    barOverWeight:   actualPct > targetPct,
  };
}

function getAllocLinked(sym) {
  const t = allocMgmtState.targets[sym];
  if (!t) return { all: 0, cat: 0, sec: 0 };
  const sum = fn => Object.values(allocMgmtState.targets).filter(fn).reduce((s, x) => s + x.target, 0);
  const catSum = sum(x => x.category === t.category);
  const secSum = sum(x => x.sector   === t.sector);
  return {
    all: t.target * 100,
    cat: catSum > 0 ? t.target / catSum * 100 : 0,
    sec: secSum > 0 ? t.target / secSum * 100 : 0,
  };
}

function updateAllocTarget(sym, newTarget, skipInput) {
  if (!allocMgmtState?.targets[sym]) return;
  allocMgmtState.targets[sym].target = Math.max(0, Math.round(newTarget * 10000) / 10000);
  const { all, cat, sec } = getAllocLinked(sym);
  if (skipInput !== 'all') { const el = document.getElementById('allocInAll'); if (el) el.value = all.toFixed(1); }
  if (skipInput !== 'cat') { const el = document.getElementById('allocInCat'); if (el) el.value = cat.toFixed(1); }
  if (skipInput !== 'sec') { const el = document.getElementById('allocInSec'); if (el) el.value = sec.toFixed(1); }
  // Update bar in-place
  const _pos = [...(currentModel?.positions||[]), ...(currentModel?.sgovPos?[currentModel.sgovPos]:[])].find(p=>p.symbol===sym);
  const { barFillW, barTickL, barTargetDollar, barOverWeight } = calcAllocBar(sym, all, _pos?.weightPct||0, currentModel?.investable||0, _pos?.currentValue||0);
  const wf = document.getElementById('allocWeightFill');
  const wk = document.getElementById('allocWeightTick');
  const wl = document.getElementById('allocWeightLeft');
  const wr = document.getElementById('allocWeightRight');
  if (wf) { wf.style.width = barFillW + '%'; wf.style.background = barOverWeight ? 'var(--loss)' : colorFor(sym); }
  if (wk) wk.style.left = barTickL + '%';
  if (wl) wl.textContent = `${(_pos?.weightPct||0).toFixed(1)}% / ${all.toFixed(1)}%`;
  if (wr) wr.textContent = `${fmtCurr(_pos?.currentValue||0)} / ${fmtCurr(barTargetDollar)}`;
  // Keep drag overlay in sync with latest state
  if (window._allocDragInfo?.sym === sym) {
    const td = allocMgmtState.targets[sym];
    const sumBy = fn => Object.values(allocMgmtState.targets).filter(fn).reduce((s, x) => s + x.target * 100, 0);
    window._allocDragInfo = {
      sym, pct: allocMgmtState.targets[sym].target * 100,
      category: td.category, categoryPct: sumBy(x => x.category === td.category),
      sector:   td.sector,   sectorPct:   sumBy(x => x.sector   === td.sector),
    };
  }
  renderAllocPosList();
  renderAllocDonuts();
}

window.onAllocInputAll = function(val) {
  const sym = allocMgmtState?.selectedSym; if (!sym) return;
  const pct = parseFloat(val); if (isNaN(pct)) return;
  updateAllocTarget(sym, pct / 100, 'all');
};
window.onAllocInputCat = function(val) {
  const sym = allocMgmtState?.selectedSym; if (!sym) return;
  const t = allocMgmtState.targets[sym];
  const pct = parseFloat(val) / 100; if (isNaN(pct) || pct < 0) return;
  const others = Object.entries(allocMgmtState.targets)
    .filter(([s, x]) => s !== sym && x.category === t.category)
    .reduce((s, [, x]) => s + x.target, 0);
  const newT = pct >= 1 ? others * 99 : pct >= 0 ? (pct * others) / (1 - pct) : 0;
  updateAllocTarget(sym, newT, 'cat');
};
window.onAllocInputSec = function(val) {
  const sym = allocMgmtState?.selectedSym; if (!sym) return;
  const t = allocMgmtState.targets[sym];
  const pct = parseFloat(val) / 100; if (isNaN(pct) || pct < 0) return;
  const others = Object.entries(allocMgmtState.targets)
    .filter(([s, x]) => s !== sym && x.sector === t.sector)
    .reduce((s, [, x]) => s + x.target, 0);
  const newT = pct >= 1 ? others * 99 : (pct * others) / (1 - pct);
  updateAllocTarget(sym, newT, 'sec');
};

function renderAllocMgmt() {
  renderAllocInfoArea();
  renderAllocPosList();
  renderAllocDonuts();
}

function renderAllocInfoArea() {
  const el = document.getElementById('allocInfoArea');
  if (!el || !allocMgmtState) return;
  const sym = allocMgmtState.selectedSym;
  const tgt = sym ? allocMgmtState.targets[sym] : null;
  if (!tgt) { el.innerHTML = '<div style="color:var(--muted);font-size:12px">Select a symbol</div>'; return; }
  const { all, cat, sec } = getAllocLinked(sym);
  const color = colorFor(sym);
  // Actual position data
  const pos = [...(currentModel?.positions||[]), ...(currentModel?.sgovPos?[currentModel.sgovPos]:[])].find(p=>p.symbol===sym);
  const actualPct    = pos?.weightPct || 0;
  const investable   = currentModel?.investable || 0;
  const currentVal   = pos?.currentValue || 0;
  const { barFillW, barTickL, barTargetDollar, barOverWeight } = calcAllocBar(sym, all, actualPct, investable, currentVal);
  el.innerHTML = `
    <div style="padding:8px 10px;background:var(--track);border-radius:var(--radius-sm);font-size:11px;display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px">
      <span style="color:var(--muted)">${t('category_label')} <strong style="color:var(--ink)">${t(tgt.category)}</strong></span>
      <span style="color:var(--muted)">${t('sector_label')} <strong style="color:var(--ink)">${t(tgt.sector)}</strong></span>
    </div>
    <div style="margin-bottom:10px">
      <div style="position:relative;height:8px;background:var(--line);border-radius:4px;overflow:visible;margin-bottom:4px">
        <div id="allocWeightFill" style="height:100%;width:${barFillW}%;background:${barOverWeight?'var(--loss)':color};border-radius:4px;max-width:100%"></div>
        <div id="allocWeightTick" style="position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink);opacity:.7;left:${barTickL}%;border-radius:1px"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;margin-top:2px">
        <span id="allocWeightLeft"  style="color:var(--muted)">${actualPct.toFixed(1)}% / ${all.toFixed(1)}%</span>
        <span id="allocWeightRight" style="color:var(--muted)">${fmtCurr(currentVal)} / ${fmtCurr(barTargetDollar)}</span>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:auto 1fr;gap:6px 10px;align-items:center;font-size:11px">
      <span style="color:var(--muted);white-space:nowrap">% of All Stocks</span>
      <div class="tranche-input-wrap has-suffix" style="max-width:90px">
        <input class="tranche-input" id="allocInAll" type="number" step="0.1" min="0" max="100" value="${all.toFixed(1)}" oninput="onAllocInputAll(this.value)">
        <span class="ti-suffix">%</span>
      </div>
      <span style="color:var(--muted);white-space:nowrap">% of ${t(tgt.category)}</span>
      <div class="tranche-input-wrap has-suffix" style="max-width:90px">
        <input class="tranche-input" id="allocInCat" type="number" step="0.1" min="0" max="100" value="${cat.toFixed(1)}" oninput="onAllocInputCat(this.value)">
        <span class="ti-suffix">%</span>
      </div>
      <span style="color:var(--muted);white-space:nowrap">% of ${t(tgt.sector)}</span>
      <div class="tranche-input-wrap has-suffix" style="max-width:90px">
        <input class="tranche-input" id="allocInSec" type="number" step="0.1" min="0" max="100" value="${sec.toFixed(1)}" oninput="onAllocInputSec(this.value)">
        <span class="ti-suffix">%</span>
      </div>
    </div>`;
}

function renderAllocPosList() {
  const el = document.getElementById('allocPosList');
  if (!el || !allocMgmtState) return;
  const selected = allocMgmtState.selectedSym;
  const order = allocMgmtState.symOrder || Object.keys(allocMgmtState.targets);
  const entries = order
    .map(sym => [sym, allocMgmtState.targets[sym]])
    .filter(([, t]) => t && (t.isPos || t.target > 0));
  const maxT = Math.max(...entries.map(([, t]) => t.target), 0.001);
  el.innerHTML = entries.map(([sym, t]) => {
    const color = colorFor(sym);
    const isSel = sym === selected;
    return `<div class="alloc-pos-row" onclick="selectAllocSym('${sym}')" style="display:flex;align-items:center;gap:8px;padding:5px 8px;cursor:pointer;background:${isSel ? 'var(--hover)' : 'transparent'}">
      <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></div>
      <div style="font-size:11px;font-weight:${isSel ? 700 : 500};min-width:44px;color:${isSel ? color : 'var(--ink)'}">${sym}</div>
      <div style="flex:1;height:4px;background:var(--line);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${(t.target / maxT * 100).toFixed(1)}%;background:${color};opacity:${isSel ? 1 : .55};border-radius:2px"></div>
      </div>
      <div style="font-size:10px;font-weight:${isSel ? 700 : 400};color:${isSel ? color : 'var(--muted)'};min-width:34px;text-align:right">${(t.target * 100).toFixed(1)}%</div>
    </div>`;
  }).join('');
}

function renderAllocDonuts() {
  if (!allocMgmtState) return;
  const sym = allocMgmtState.selectedSym;
  const t = sym ? allocMgmtState.targets[sym] : null;
  const CAT_COLORS = { 'Big Value': '#6b7eb8', 'Medium Value': '#f59e0b', 'Growth': '#22c55e', 'Other': '#9ca85a' };
  const SEC_PALETTE = ['#6b7eb8','#8a5a7e','#c79038','#6b8e5a','#7aa3b8','#b56a8a','#9ca85a','#d4825e','#8a7458','#9a7aa3'];
  const sectorColorMap = {};
  [...new Set(Object.values(allocMgmtState.targets).map(x => x.sector))].forEach((s, i) => {
    sectorColorMap[s] = SEC_PALETTE[i % SEC_PALETTE.length];
  });

  const allocCozyPlugin = {
    id: 'allocCozy',
    beforeDatasetDraw(chart) {
      // Soft warm shadow behind the donut
      const ctx = chart.ctx;
      const meta = chart.getDatasetMeta(0);
      if (!meta?.data?.length) return;
      const arc = meta.data[0];
      ctx.save();
      ctx.shadowColor = 'rgba(196,106,74,.15)';
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.arc(arc.x, arc.y, (arc.innerRadius + arc.outerRadius) / 2, 0, Math.PI * 2);
      ctx.lineWidth = arc.outerRadius - arc.innerRadius;
      ctx.strokeStyle = 'transparent';
      ctx.stroke();
      ctx.restore();
    },
    afterDatasetsDraw(chart) {
      // Decorative inner ring
      const ctx = chart.ctx;
      const meta = chart.getDatasetMeta(0);
      if (!meta?.data?.length) return;
      const arc = meta.data[0];
      ctx.save();
      ctx.beginPath();
      ctx.arc(arc.x, arc.y, arc.innerRadius - 3, 0, Math.PI * 2);
      ctx.strokeStyle = css('--line-soft');
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.6;
      ctx.stroke();
      // Warm dot pattern (4 dots around center)
      ctx.globalAlpha = 0.12;
      ctx.fillStyle = css('--terracotta');
      [0, Math.PI/2, Math.PI, Math.PI*1.5].forEach(a => {
        const r = arc.innerRadius * 0.4;
        ctx.beginPath();
        ctx.arc(arc.x + Math.cos(a)*r, arc.y + Math.sin(a)*r, 2, 0, Math.PI*2);
        ctx.fill();
      });
      ctx.restore();
    }
  };

  const allocThinPlugin = {
    id: 'allocThin',
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      const meta = chart.getDatasetMeta(0);
      if (!meta?.data?.length) return;
      const arc = meta.data[0];
      // Outer decorative ring
      ctx.save();
      ctx.beginPath();
      ctx.arc(arc.x, arc.y, arc.outerRadius + 4, 0, Math.PI * 2);
      ctx.strokeStyle = css('--line');
      ctx.lineWidth = 0.5;
      ctx.globalAlpha = 0.5;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.restore();
      // Inner decorative ring
      ctx.save();
      ctx.beginPath();
      ctx.arc(arc.x, arc.y, arc.innerRadius - 4, 0, Math.PI * 2);
      ctx.strokeStyle = css('--line');
      ctx.lineWidth = 0.5;
      ctx.globalAlpha = 0.5;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.restore();
      // Crosshair tick marks at 0°, 90°, 180°, 270°
      ctx.save();
      ctx.strokeStyle = css('--muted');
      ctx.lineWidth = 0.8;
      ctx.globalAlpha = 0.3;
      [0, Math.PI/2, Math.PI, Math.PI*1.5].forEach(a => {
        ctx.beginPath();
        ctx.moveTo(arc.x + Math.cos(a)*(arc.outerRadius+2), arc.y + Math.sin(a)*(arc.outerRadius+2));
        ctx.lineTo(arc.x + Math.cos(a)*(arc.outerRadius+8), arc.y + Math.sin(a)*(arc.outerRadius+8));
        ctx.stroke();
      });
      ctx.restore();
    }
  };

  const allocBoldPlugin = {
    id: 'allocBold',
    beforeDatasetDraw(chart) {
      // Heavy warm shadow
      const ctx = chart.ctx;
      const meta = chart.getDatasetMeta(0);
      if (!meta?.data?.length) return;
      const arc = meta.data[0];
      ctx.save();
      ctx.shadowColor = 'rgba(58,42,28,.18)';
      ctx.shadowBlur = 24;
      ctx.shadowOffsetY = 4;
      ctx.beginPath();
      ctx.arc(arc.x, arc.y, (arc.innerRadius + arc.outerRadius) / 2, 0, Math.PI * 2);
      ctx.lineWidth = arc.outerRadius - arc.innerRadius;
      ctx.strokeStyle = 'transparent';
      ctx.stroke();
      ctx.restore();
    },
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      const meta = chart.getDatasetMeta(0);
      if (!meta?.data?.length) return;
      const arc = meta.data[0];
      // Inner filled circle background (cozy warm center)
      ctx.save();
      ctx.beginPath();
      ctx.arc(arc.x, arc.y, arc.innerRadius - 1, 0, Math.PI * 2);
      const cg = ctx.createRadialGradient(arc.x, arc.y, 0, arc.x, arc.y, arc.innerRadius);
      cg.addColorStop(0, css('--card'));
      cg.addColorStop(1, css('--track'));
      ctx.fillStyle = cg;
      ctx.fill();
      ctx.restore();
      // Bold ring highlight on top edge
      ctx.save();
      ctx.beginPath();
      ctx.arc(arc.x, arc.y, arc.outerRadius, Math.PI * 1.1, Math.PI * 1.9);
      ctx.strokeStyle = 'rgba(255,255,255,.18)';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.restore();
    }
  };

  const allocLabelPlugin = {
    id: 'allocLabels',
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      const meta = chart.getDatasetMeta(0);
      if (!meta?.data?.length) return;
      const total = chart.data.datasets[0].data.reduce((s, v) => s + (v||0), 0);
      if (!total) return;
      ctx.save();

      // Symbol labels inside each arc
      meta.data.forEach((arc, i) => {
        const value = chart.data.datasets[0].data[i];
        if (!value || value / total < 0.05) return;
        const label = chart.data.labels[i];
        const angle = (arc.startAngle + arc.endAngle) / 2;
        const midR  = (arc.innerRadius + arc.outerRadius) / 2;
        const x = arc.x + Math.cos(angle) * midR;
        const y = arc.y + Math.sin(angle) * midR;
        ctx.font = '600 9px ' + (css('--font-display') || 'serif');
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(0,0,0,.5)';
        ctx.shadowBlur = 3;
        ctx.fillStyle = '#fff';
        ctx.fillText(label, x, y);
        ctx.shadowBlur = 0;
      });

      // Center text during drag — content depends on which donut
      if (window._allocDragInfo && meta.data[0]) {
        const info = window._allocDragInfo;
        const id   = chart.canvas.id;
        const line1 = id === 'allocCatChart' ? (info.category || '')
                    : id === 'allocSecChart' ? (info.sector   || '')
                    : info.sym;
        const line2 = id === 'allocCatChart' ? (info.categoryPct || 0).toFixed(1) + '%'
                    : id === 'allocSecChart' ? (info.sectorPct   || 0).toFixed(1) + '%'
                    : (info.pct || 0).toFixed(1) + '%';
        const cx = meta.data[0].x;
        const cy = meta.data[0].y;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowBlur = 0;
        ctx.font = '600 12px ' + (css('--font-display') || 'serif');
        ctx.fillStyle = css('--ink');
        ctx.fillText(line1, cx, cy - 8);
        ctx.font = '500 10px ' + (css('--font-mono') || 'monospace');
        ctx.fillStyle = css('--ink-soft');
        ctx.fillText(line2, cx, cy + 9);
      }

      ctx.restore();
    }
  };

  // Returns { chart, fresh } — fresh=true means newly created (attach drag); false means updated in-place (skip)
  const mkDonut = (id, labels, data, colors, bw, bc, onClick, tooltipCb) => {
    const defaultTip = c => `  ${c.label}: ${Number(c.raw).toFixed(1)}%`;
    const canvas = document.getElementById(id);
    if (!canvas) return { chart: null, fresh: false };

    // ── Style presets ────────────────────────────────────────────
    const style = window.donutTweaks?.allocDonut || 'cozy';
    let cutout, borderRadius, spacing, layoutPad, borderWArr, borderCArr;

    if (style === 'thin') {
      cutout       = '74%';
      borderRadius = 2;
      spacing      = 3;
      layoutPad    = 36;
      borderWArr   = bw.map(b => b ? 2.5 : 0.5);
      borderCArr   = bc.map((c, i) => bw[i] ? css('--card') : css('--line-soft'));
    } else if (style === 'bold') {
      cutout       = '38%';
      borderRadius = 10;
      spacing      = 4;
      layoutPad    = 28;
      borderWArr   = bw.map(b => b ? 3 : 1);
      borderCArr   = bc.map((c, i) => bw[i] ? css('--card') : 'rgba(255,255,255,.25)');
    } else {
      // "cozy" (default) — warm, rounded, medium ring
      cutout       = '56%';
      borderRadius = 6;
      spacing      = 2;
      layoutPad    = 32;
      borderWArr   = bw;
      borderCArr   = bc;
    }

    const existing = allocChartInsts[id];
    if (existing && JSON.stringify(existing.data.labels) === JSON.stringify(labels)) {
      existing.data.datasets[0].data             = data;
      existing.data.datasets[0].backgroundColor  = colors;
      existing.data.datasets[0].borderColor      = borderCArr;
      existing.data.datasets[0].borderWidth      = borderWArr;
      existing.data.datasets[0].borderRadius      = borderRadius;
      existing.data.datasets[0].spacing            = spacing;
      existing.options.cutout                      = cutout;
      existing.options.layout.padding              = layoutPad;
      if (tooltipCb) existing.options.plugins.tooltip.callbacks.label = tooltipCb;
      existing.update('none');
      return { chart: existing, fresh: false };
    }
    if (existing) existing.destroy();
    const plugins = [allocLabelPlugin];
    if (style === 'cozy')  plugins.push(allocCozyPlugin);
    if (style === 'thin')  plugins.push(allocThinPlugin);
    if (style === 'bold')  plugins.push(allocBoldPlugin);
    const chart = new Chart(canvas.getContext('2d'), {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: colors, borderColor: borderCArr, borderWidth: borderWArr, hoverBorderWidth: 0, borderRadius, spacing }] },
      options: {
        responsive: true, maintainAspectRatio: false, cutout,
        animation: false,
        layout: { padding: layoutPad },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: tooltipCb || defaultTip },
            backgroundColor: css('--tooltip-bg'), bodyColor: '#faf3e0', padding: 8, cornerRadius: 8 }
        },
        onClick: onClick,
      },
      plugins,
    });
    allocChartInsts[id] = chart;
    return { chart, fresh: true };
  };

  // Chart 1: Category Breakdown
  (() => {
    const cats = {};
    Object.values(allocMgmtState.targets).forEach(x => { cats[x.category] = (cats[x.category] || 0) + x.target * 100; });
    const labels = Object.keys(cats);
    const data   = labels.map(c => cats[c]);
    const selCat = t?.category;
    const colors = labels.map(c => { const b = CAT_COLORS[c] || '#9ca85a'; return c === selCat ? b : b + '55'; });
    const bw = labels.map(c => c === selCat ? 2 : 0);
    const bc = labels.map(c => c === selCat ? css('--card') : 'transparent');
    mkDonut('allocCatChart', labels, data, colors, bw, bc, (_, els) => {
      if (!els.length) return;
      const cat = labels[els[0].index];
      const first = Object.entries(allocMgmtState.targets).find(([, x]) => x.category === cat);
      if (first) setTimeout(() => selectAllocSym(first[0]), 0);
    });
  })();

  // Chart 2: Sector Breakdown
  (() => {
    const secs = {};
    Object.values(allocMgmtState.targets).forEach(x => { secs[x.sector] = (secs[x.sector] || 0) + x.target * 100; });
    const labels = Object.keys(secs);
    const data   = labels.map(s => secs[s]);
    const selSec = t?.sector;
    const colors = labels.map(s => { const b = sectorColorMap[s]; return s === selSec ? b : b + '55'; });
    const bw = labels.map(s => s === selSec ? 2 : 0);
    const bc = labels.map(s => s === selSec ? css('--card') : 'transparent');
    mkDonut('allocSecChart', labels, data, colors, bw, bc, (_, els) => {
      if (!els.length) return;
      const sec = labels[els[0].index];
      const first = Object.entries(allocMgmtState.targets).find(([, x]) => x.sector === sec);
      if (first) setTimeout(() => selectAllocSym(first[0]), 0);
    });
  })();

  // Chart 3: Symbol vs All Stocks
  (() => {
    const title = document.getElementById('allocAllTitle');
    if (title) title.textContent = sym ? `${sym} · All Stocks` : t('all_stocks_label');
    const syms   = allocMgmtState.symOrder || Object.keys(allocMgmtState.targets);
    const data   = syms.map(s => allocMgmtState.targets[s].target * 100);
    const colors = syms.map(s => s === sym ? colorFor(s) : colorFor(s) + '55');
    const bw     = syms.map(s => s === sym ? 2 : 0);
    const bc     = syms.map(s => s === sym ? css('--card') : 'transparent');
    const { chart, fresh } = mkDonut('allocAllChart', syms, data, colors, bw, bc, (_, els) => {
      if (els.length) setTimeout(() => selectAllocSym(syms[els[0].index]), 0);
    });
    if (chart && fresh) attachAllocDrag(chart, syms);
  })();

  // Chart 4: Symbol vs Category
  (() => {
    const selCat = t?.category || '';
    const title  = document.getElementById('allocCatSymTitle');
    if (title) title.textContent = sym ? `${sym} · ${selCat}` : selCat;
    const catSyms = allocMgmtState.catOrders?.[selCat]?.filter(s => allocMgmtState.targets[s])
      || Object.entries(allocMgmtState.targets).filter(([,x])=>x.category===selCat).map(([s])=>s);
    const data   = catSyms.map(s => allocMgmtState.targets[s].target * 100);
    const colors = catSyms.map(s => s === sym ? colorFor(s) : colorFor(s) + '55');
    const bw     = catSyms.map(s => s === sym ? 2 : 0);
    const bc     = catSyms.map(s => s === sym ? css('--card') : 'transparent');
    const catTotal = data.reduce((s, v) => s + v, 0);
    const { chart: chart4, fresh: fresh4 } = mkDonut('allocCatSymChart', catSyms, data, colors, bw, bc, (_, els) => {
      if (els.length) setTimeout(() => selectAllocSym(catSyms[els[0].index]), 0);
    }, c => `  ${c.label}: ${catTotal > 0 ? (c.raw / catTotal * 100).toFixed(1) : 0}%`);
    if (chart4 && fresh4) attachAllocDrag(chart4, catSyms);
  })();

  // Flash labels
  const totalPct = Object.values(allocMgmtState.targets).reduce((s, x) => s + x.target * 100, 0);
  const diff = 100 - totalPct;
  const isOver  = diff < -0.05;
  const isAvail = diff >  0.05;
  ['cat','sec','all','sym'].forEach(id => {
    const el = document.getElementById(`allocFL_${id}`);
    if (!el) return;
    if (isOver || isAvail) {
      el.textContent   = isOver ? `Over ${Math.abs(diff).toFixed(1)}%` : `Available ${diff.toFixed(1)}%`;
      el.style.color   = isOver ? 'var(--loss)' : 'var(--gain)';
      el.style.display = '';
      el.className     = 'alloc-flash';
    } else {
      el.style.display = 'none';
      el.className     = '';
    }
  });
}

function attachAllocDrag(chart, labels) {
  const canvas = chart.canvas;
  let dragging = false, dragSym = null, startY = 0, startTarget = 0, lastStep = 0;
  let _raf = null, _pendingT = null;

  canvas.addEventListener('mousedown', e => {
    const els = chart.getElementsAtEventForMode(e, 'nearest', { intersect: true }, false);
    if (!els.length) return;
    dragSym = labels[els[0].index];
    if (!dragSym || !allocMgmtState?.targets[dragSym]) return;
    setTimeout(() => selectAllocSym(dragSym), 0);
    dragging = true; startY = e.clientY;
    startTarget = allocMgmtState.targets[dragSym].target;
    lastStep = 0; _pendingT = null;
    const _td = allocMgmtState.targets[dragSym];
    const _sumBy = fn => Object.values(allocMgmtState.targets).filter(fn).reduce((s, x) => s + x.target * 100, 0);
    window._allocDragInfo = {
      sym: dragSym, pct: startTarget * 100,
      category: _td.category, categoryPct: _sumBy(x => x.category === _td.category),
      sector:   _td.sector,   sectorPct:   _sumBy(x => x.sector   === _td.sector),
    };
    e.preventDefault();
  });
  canvas.addEventListener('mousemove', e => {
    if (!dragging || !dragSym) return;
    const delta = startY - e.clientY;
    const DEAD = 12, PX = 20; // 12px deadzone, 8px per 0.5% step
    const effective = (Math.abs(delta) < DEAD) ? 0 : (Math.abs(delta) - DEAD) * Math.sign(delta);
    const steps = Math.floor(Math.abs(effective) / PX) * Math.sign(effective);
    if (steps === lastStep) return;
    lastStep = steps;
    _pendingT = Math.max(0.01, Math.round((startTarget + steps * 0.005) * 10000) / 10000);
    window._allocDragInfo = { sym: dragSym, pct: _pendingT * 100 };
    if (!_raf) {
      _raf = requestAnimationFrame(() => {
        _raf = null;
        if (_pendingT !== null && allocMgmtState) updateAllocTarget(dragSym, _pendingT, null);
      });
    }
  });
  const stop = () => {
    if (!dragging) return;
    dragging = false;
    if (_raf) { cancelAnimationFrame(_raf); _raf = null; }
    if (_pendingT !== null && allocMgmtState) updateAllocTarget(dragSym, _pendingT, null);
    _pendingT = null;
    window._allocDragInfo = null;
    Object.values(allocChartInsts).forEach(c => { try { c.update('none'); } catch(_) {} });
  };
  canvas.addEventListener('mouseup', stop);
  canvas.addEventListener('mouseleave', stop);

  canvas.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    const touch = e.touches[0];
    const els = chart.getElementsAtEventForMode(e, 'nearest', { intersect: true }, false);
    if (!els.length) return;
    dragSym = labels[els[0].index];
    if (!dragSym || !allocMgmtState?.targets[dragSym]) return;
    setTimeout(() => selectAllocSym(dragSym), 0);
    dragging = true; startY = touch.clientY;
    startTarget = allocMgmtState.targets[dragSym].target;
    lastStep = 0; _pendingT = null;
    const _td = allocMgmtState.targets[dragSym];
    const _sumBy = fn => Object.values(allocMgmtState.targets).filter(fn).reduce((s, x) => s + x.target * 100, 0);
    window._allocDragInfo = {
      sym: dragSym, pct: startTarget * 100,
      category: _td.category, categoryPct: _sumBy(x => x.category === _td.category),
      sector:   _td.sector,   sectorPct:   _sumBy(x => x.sector   === _td.sector),
    };
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    if (!dragging || !dragSym || e.touches.length !== 1) return;
    const delta = startY - e.touches[0].clientY;
    const DEAD = 12, PX = 20;
    const effective = (Math.abs(delta) < DEAD) ? 0 : (Math.abs(delta) - DEAD) * Math.sign(delta);
    const steps = Math.floor(Math.abs(effective) / PX) * Math.sign(effective);
    if (steps === lastStep) return;
    lastStep = steps;
    _pendingT = Math.max(0.01, Math.round((startTarget + steps * 0.005) * 10000) / 10000);
    window._allocDragInfo = { sym: dragSym, pct: _pendingT * 100 };
    if (!_raf) {
      _raf = requestAnimationFrame(() => {
        _raf = null;
        if (_pendingT !== null && allocMgmtState) updateAllocTarget(dragSym, _pendingT, null);
      });
    }
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', stop);
  canvas.addEventListener('touchcancel', stop);
  canvas.style.cursor = 'ns-resize';
}

window.saveAllocToSheet = async function() {
  if (!allocMgmtState) return;
  const entries = Object.entries(allocMgmtState.targets)
    .filter(([sym, t]) => Math.abs(t.target - (allocMgmtState.origTargets[sym] ?? 0)) > 0.00001);
  if (!entries.length) {
    const status = document.getElementById('allocSaveStatus');
    if (status) { status.textContent = t('nothing_changed_msg'); setTimeout(() => { if(status) status.textContent=''; }, 2000); }
    return;
  }
  const status  = document.getElementById('allocSaveStatus');
  if (status) status.textContent = `Saving 0 / ${entries.length}…`;
  let saved = 0, failed = 0;
  for (const [sym, t] of entries) {
    try {
      const params = new URLSearchParams({ action: 'updateSymbol', symbol: sym, target: t.target });
      await recordFetch(params, true);
      const pos = currentModel?.positions.find(p => p.symbol === sym)
               || (currentModel?.sgovPos?.symbol === sym ? currentModel.sgovPos : null);
      if (pos) pos.target = t.target;
      allocMgmtState.origTargets[sym] = t.target; // mark as saved
      saved++;
    } catch { failed++; }
    if (status) status.textContent = `Saving ${saved + failed} / ${entries.length}…`;
  }
  if (status) {
    status.textContent = failed ? `Saved ${saved}, ${failed} failed` : `All ${saved} saved ✓`;
    setTimeout(() => { if (status) status.textContent = ''; }, 3000);
  }
  renderTable(currentModel);
  renderDonut(currentModel);
};

async function init() {
  if (init._running) return;
  init._running = true;

  if (!_cfg) {
    showSetupModal();
    init._running = false;
    return;
  }

  searchTerm = '';
  if (!shellBuilt) txCache = null;
  const isFirstLoad = !shellBuilt;

  if (isFirstLoad) {
    document.getElementById('root').innerHTML = `<div class="loading">${t('loading_portfolio_msg')}</div>`;
  } else {
    setRefreshing(true);
  }

  Chart.helpers.each(Chart.instances, c => c.destroy());

  try {
    const [table, rate] = await Promise.all([fetchSheet(), fetchFxRate()]);
    fxRate = rate;
    const rows  = parseRows(table);
    const model = buildModel(rows);
    currentModel = model;

    // Fetch live quotes for day change + pre/post market (non-blocking)
    fetchQuotes([...model.positions.map(p=>p.symbol), ...model.watchlist.map(w=>w.symbol), ...(model.sgovPos?['SGOV']:[])])
      .then(quotes => { attachQuotes(model, quotes); renderStatCards(model, lastTxData); renderTable(model); });

    if (isFirstLoad) {
      buildShell();
      shellBuilt = true;
      initCollapsibleCards();
      applyCurrencyBtn();
      initMarketClock();
      // Global floating close button for all modals
      const gfc = document.createElement('button');
      gfc.id = 'globalFloatClose';
      gfc.className = 'tw-float-close';
      gfc.title = 'Close';
      gfc.textContent = '×';
      gfc.addEventListener('click', () => {
        const modals = [
          { id: 'allocMgmtModal',    close: () => closeAllocMgmt() },
          { id: 'actionModal',       close: () => { destroyActionCharts(); document.getElementById('actionModal').classList.remove('open'); } },
          { id: 'symbolDetailModal', close: () => closeSymbolDetail() },
          { id: 'txModal',           close: () => closeTx() },
          { id: 'txHistoryModal',    close: () => document.getElementById('txHistoryModal').classList.remove('open') },
          { id: 'editCashModal',     close: () => document.getElementById('editCashModal').classList.remove('open') },
          { id: 'addSymbolModal',    close: () => document.getElementById('addSymbolModal').classList.remove('open') },
          { id: 'planModal',         close: () => closePlan() },
        ];
        for (const m of modals) {
          const el = document.getElementById(m.id);
          if (el?.classList.contains('open')) { m.close(); break; }
        }
      });
      document.body.appendChild(gfc);
      new MutationObserver(() => {
        const anyOpen = document.querySelector('.tx-overlay.open, .plan-overlay.open');
        gfc.classList.toggle('open', !!anyOpen);
      }).observe(document.body, { subtree: true, attributes: true, attributeFilter: ['class'] });

      // Click-outside-to-close with deadzone around modal content
      const DEADZONE = 24;
      function setupOverlayDismiss(overlayId, closeFn) {
        const overlay = document.getElementById(overlayId);
        if (!overlay) return;
        overlay.addEventListener('click', e => {
          if (!overlay.classList.contains('open')) return;
          const modal = overlay.querySelector('.tx-modal, .plan-modal');
          if (!modal) return;
          const rect = modal.getBoundingClientRect();
          const inDeadzone =
            e.clientX >= rect.left   - DEADZONE &&
            e.clientX <= rect.right  + DEADZONE &&
            e.clientY >= rect.top    - DEADZONE &&
            e.clientY <= rect.bottom + DEADZONE;
          if (!inDeadzone) closeFn();
        });
      }
      setupOverlayDismiss('allocMgmtModal',    () => closeAllocMgmt());
      setupOverlayDismiss('planModal',          () => closePlan());
      setupOverlayDismiss('txModal',            () => closeTx());
      setupOverlayDismiss('txHistoryModal',     () => document.getElementById('txHistoryModal').classList.remove('open'));
      setupOverlayDismiss('editCashModal',      () => document.getElementById('editCashModal').classList.remove('open'));
      setupOverlayDismiss('actionModal',        () => { destroyActionCharts(); document.getElementById('actionModal').classList.remove('open'); });
      setupOverlayDismiss('addSymbolModal',     () => document.getElementById('addSymbolModal').classList.remove('open'));
      setupOverlayDismiss('symbolDetailModal',  () => closeSymbolDetail());
    }

    document.getElementById('lastUpdated').textContent =
      t('updated') + ' ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    renderStatCards(model, null);
    renderGauge(model);
    renderPosList(model);
    renderCategoryFilters(model);
    renderSectorFilters(model);
    renderTable(model);
    renderDonut(model);
    renderCategoryDonut(model);
    renderSectorDonut(model);
    renderSectorBar(model);
    renderWatchlist(model);
    loadCalendar(model);
    await loadAllPlansFromSheet();
    renderPlansPanel();
    renderTable(model);
    if (TRANSACTION_URL) {
      if (!benchmarkLoaded) {
        loadBenchmark();
      } else if (benchmarkData) {
        const bw = document.getElementById('benchmarkChartWrap');
        const bs = document.getElementById('benchmarkStatus');
        if (bw) bw.style.display = 'block';
        if (bs) bs.style.display = 'none';
        renderBenchmarkChartFiltered(benchmarkData, chartTimeFilter);
      }
    }
    if (TRANSACTION_URL) loadPnLChart();
    if (TRANSACTION_URL) refreshTxPanel();
    if (TRANSACTION_URL) {
      (async () => {
        try {
          const txs = txCache || (txCache = await fetchTransactions());
          if (!txs?.length) return;
          // historyCache may not be ready yet — skip dividends so the card shows — instead of 0
          const dividends = historyCache ? computeDividends(txs) : null;
          renderStatCards(model, {
            realizedPnl: computeRealizedPnlTotal(txs),
            dividends,
            irr: computeIRR(txs, model.totalCurrent, model.totalInvested),
          });
          renderDividendBreakdown(txs);
          const card = document.getElementById('divBreakdownCard');
          if (card && dividends?.gross > 0) card.style.display = '';
          renderHoldingsPerformance();
        } catch(e) { console.error('stat cards:', e); }
      })();
    }
  } catch(e) {
    if (isFirstLoad) {
      document.getElementById('root').innerHTML =
        `<div style="padding:20px"><div class="error-banner">Failed to load: ${e.message}<br><small>Check the sheet is public.</small></div></div>`;
    } else {
      const el = document.getElementById('lastUpdated');
      if (el) { el.textContent = t('refresh_failed'); el.style.color = 'var(--loss)'; }
    }
    console.error(e);
  } finally {
    setRefreshing(false);
    init._running = false;
  }
}

document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

init();
function isMarketOpen() {
  const parts = Object.fromEntries(
    new Intl.DateTimeFormat('en-US', {
      timeZone: 'America/New_York',
      weekday: 'short', hour: 'numeric', minute: 'numeric', hour12: false,
    }).formatToParts(new Date()).map(p => [p.type, p.value])
  );
  const days = { Mon:1, Tue:2, Wed:3, Thu:4, Fri:5 };
  const day = days[parts.weekday] ?? 0;
  const min = (+parts.hour % 24) * 60 + (+parts.minute);
  return day >= 1 && day <= 5 && min >= 570 && min < 960; // 9:30 AM–4:00 PM ET
}
// ── Tweaks panel (donut design) ──────────────────────────────────────────────
(function setupTweaksPanel() {
  let panelEl = null;

  function rerenderDonuts() {
    if (!currentModel) return;
    if (typeof donutChartInst !== 'undefined' && donutChartInst)   { donutChartInst.destroy();   donutChartInst   = null; }
    if (typeof sectorDonutInst !== 'undefined' && sectorDonutInst) { sectorDonutInst.destroy(); sectorDonutInst = null; }
    if (typeof catDonutInst !== 'undefined' && catDonutInst)       { catDonutInst.destroy();    catDonutInst    = null; }
    renderDonut(currentModel);
    renderSectorDonut(currentModel);
    renderCategoryDonut(currentModel);
  }

  function setTweak(key, val) {
    window.donutTweaks[key] = val;
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*'); } catch(_) {}
    if (key === 'planBtnStyle') {
      document.body.dataset.planBtn = val;
      if (panelEl) renderPanelBody();
      return;
    }
    if (key === 'gaugeLabels') {
      if (panelEl) renderPanelBody();
      if (typeof currentModel !== 'undefined' && currentModel) renderGauge(currentModel);
      return;
    }
    if (key === 'allocDonut') {
      if (panelEl) renderPanelBody();
      destroyAllocCharts();
      if (typeof allocMgmtState !== 'undefined' && allocMgmtState) renderAllocDonuts();
      return;
    }
    rerenderDonuts();
  }

  function resetTweaks() {
    Object.assign(window.donutTweaks, DONUT_DEFAULTS);
    document.body.dataset.planBtn = DONUT_DEFAULTS.planBtnStyle;
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { ...DONUT_DEFAULTS } }, '*'); } catch(_) {}
    if (panelEl) renderPanelBody();
    rerenderDonuts();
  }

  function row(html) { return `<div class="tw-row">${html}</div>`; }
  function slider(key, label, min, max, step, unit = '') {
    const v = window.donutTweaks[key];
    return row(`
      <div class="tw-label-row">
        <span>${label}</span>
        <span class="tw-val">${v}${unit}</span>
      </div>
      <input type="range" min="${min}" max="${max}" step="${step}" value="${v}"
        oninput="this.parentNode.querySelector('.tw-val').textContent=this.value+'${unit}';window.__tw_setTweak('${key}', Number(this.value))">
    `);
  }
  function toggle(key, label) {
    const v = window.donutTweaks[key];
    return row(`
      <label class="tw-toggle">
        <span>${label}</span>
        <input type="checkbox" ${v ? 'checked' : ''}
          onchange="window.__tw_setTweak('${key}', this.checked)">
        <span class="tw-switch"></span>
      </label>
    `);
  }
  window.__tw_setTweak = setTweak;

  function radio(key, label, options) {
    const cur = window.donutTweaks[key];
    const btns = options.map(o => {
      const active = o.value === cur;
      return `<button class="tw-radio-btn${active ? ' active' : ''}" onclick="window.__tw_setTweak('${key}','${o.value}')">${o.label}</button>`;
    }).join('');
    return row(`<div class="tw-label-row"><span>${label}</span></div><div class="tw-radio-group">${btns}</div>`);
  }

  function renderPanelBody() {
    if (!panelEl) return;
    panelEl.querySelector('.tw-body').innerHTML = [
      `<div class="tw-section">Action button</div>`,
      radio('planBtnStyle', 'Style', [
        { value: 'compact', label: 'Compact' },
        { value: 'pill',    label: 'Pill' },
        { value: 'badge',   label: 'Badge' },
      ]),
      `<div class="tw-section">Gauge labels</div>`,
      radio('gaugeLabels', 'Style', [
        { value: 'stacked', label: 'Stacked' },
        { value: 'inline',  label: 'Inline' },
        { value: 'badge',   label: 'Badge' },
      ]),
      `<div class="tw-section">Alloc donuts</div>`,
      radio('allocDonut', 'Style', [
        { value: 'cozy',  label: 'Cozy' },
        { value: 'thin',  label: 'Thin' },
        { value: 'bold',  label: 'Bold' },
      ]),
      `<div class="tw-section">Geometry</div>`,
      slider('cutout',       'Ring thickness',   30, 85, 1, '%'),
      slider('spacing',      'Segment gap',       0, 10, 1, ''),
      slider('borderWidth',  'Border width',      0,  6, 1, ''),
      slider('borderRadius', 'Corner radius',     0, 20, 1, ''),
      slider('hoverOffset',  'Hover lift',        0, 25, 1, ''),
      `<div class="tw-section">Outer labels</div>`,
      toggle('showLabels',    'Show labels'),
      slider('labelDistance', 'Label distance',   8, 32, 1, ''),
      slider('labelMinPct',   'Hide below',       0, 15, 1, '%'),
      `<div class="tw-section">Effects</div>`,
      toggle('showInnerRing', 'Decorative ring'),
      toggle('showShadow',    'Soft shadow'),
      `<div class="tw-section">Motion</div>`,
      slider('animationMs',   'Spin duration',    0, 2000, 50, 'ms'),
      `<div class="tw-section">Account</div>`,
      row(`<div style="font-size:11px;color:var(--muted);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
        ${(_cfg?.profiles||[]).map(p=>`<span style="display:inline-flex;align-items:center;gap:4px;margin-right:8px"><span style="width:7px;height:7px;border-radius:50%;background:${colorFor(p.profileName)};display:inline-block"></span><strong style="color:${p.id===_cfg?.activeProfileId?'var(--terracotta)':'var(--ink)'}">${p.profileName}</strong></span>`).join('')}
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="tw-reset" onclick="window.__tw_addAccount()" style="flex:1">+ Add account</button>
        <button class="tw-reset" onclick="window.__tw_editConfig()" style="flex:1">Edit config</button>
      </div>`),
    ].join('');
  }

  let floatCloseEl = null;
  function buildPanel() {
    if (panelEl) return;
    panelEl = document.createElement('div');
    panelEl.id = 'tweaksPanel';
    panelEl.className = 'tw-panel';
    panelEl.innerHTML = `
      <div class="tw-head">
        <div class="tw-head-titles">
          <div class="tw-title">Tweaks</div>
          <div class="tw-sub">Donut design</div>
        </div>
        <div class="tw-head-actions">
          <button class="tw-reset" onclick="window.__tw_reset()">Reset</button>
        </div>
      </div>
      <div class="tw-body"></div>`;
    document.body.appendChild(panelEl);
    floatCloseEl = document.createElement('button');
    floatCloseEl.className = 'tw-float-close';
    floatCloseEl.title = 'Close';
    floatCloseEl.textContent = '×';
    floatCloseEl.addEventListener('click', () => window.__tw_close());
    document.body.appendChild(floatCloseEl);
    renderPanelBody();
    // Drag handle on the head
    let dragOff = null;
    const head = panelEl.querySelector('.tw-head');
    head.addEventListener('mousedown', e => {
      if (e.target.closest('button')) return;
      const r = panelEl.getBoundingClientRect();
      dragOff = { x: e.clientX - r.left, y: e.clientY - r.top };
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!dragOff) return;
      panelEl.style.left   = (e.clientX - dragOff.x) + 'px';
      panelEl.style.top    = (e.clientY - dragOff.y) + 'px';
      panelEl.style.right  = 'auto';
      panelEl.style.bottom = 'auto';
    });
    document.addEventListener('mouseup', () => { dragOff = null; });
  }
  function showPanel() { buildPanel(); panelEl.classList.add('open'); floatCloseEl?.classList.add('open'); }
  function hidePanel() { if (panelEl) panelEl.classList.remove('open'); floatCloseEl?.classList.remove('open'); }

  window.__tw_close = () => {
    hidePanel();
    try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch(_) {}
  };
  window.__tw_reset = resetTweaks;
  window.__tw_addAccount = () => { hidePanel(); showSetupModal('add'); };
  window.__tw_editConfig = () => { hidePanel(); showSetupModal('edit'); };

  // Edit-mode protocol — listener FIRST, then announce
  window.addEventListener('message', e => {
    const d = e.data;
    if (!d || typeof d !== 'object') return;
    if (d.type === '__activate_edit_mode')   showPanel();
    if (d.type === '__deactivate_edit_mode') hidePanel();
  });
  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(_) {}
})();

setInterval(() => {
  if (!_cfg) return;
  if (!isMarketOpen()) return;
  const anyOpen = document.querySelector('.tx-overlay.open, .plan-overlay.open');
  if (anyOpen) return;
  init();
}, 60_000);
</script>
